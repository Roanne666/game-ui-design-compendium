<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>战术军事 — 瞄准辅助</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="../../components/styles/tactical-military.css" />
  <style>
    .game-world {
      background: #0c100c center top / cover no-repeat;
      background-image: url("../../assets/project/09-tactical-military/ops-bg.png");
    }
    .game-world.has-grid::before { opacity: 0.12; }
    .game-world::after {
      box-shadow: inset 0 0 80px 24px rgba(0, 0, 0, 0.45);
    }

    .target {
      position: absolute; left: 58%; top: 38%;
      width: 56px; height: 96px;
      transform: translate(-50%, -50%);
      border: 1px dashed color-mix(in srgb, var(--border) 55%, transparent);
      background: transparent;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0; margin: 0;
      pointer-events: auto; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .target img {
      width: 100%; height: 100%; object-fit: contain;
      object-position: bottom center;
      opacity: 0.95;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.65));
      pointer-events: none;
    }
    .target.locked {
      border-style: solid; border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 18px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .target.locked::before {
      content: ""; position: absolute; inset: -6px;
      border: 1px solid var(--accent); opacity: 0.5;
      clip-path: polygon(0 0,12px 0,12px 1px,1px 1px,1px 12px,0 12px,0 0,100% 0,100% 12px,calc(100% - 1px) 12px,calc(100% - 1px) 1px,calc(100% - 12px) 1px,calc(100% - 12px) 0,100% 0,100% 100%,calc(100% - 12px) 100%,calc(100% - 12px) calc(100% - 1px),calc(100% - 1px) calc(100% - 1px),calc(100% - 1px) calc(100% - 12px),100% calc(100% - 12px),100% 100%,0 100%,0 calc(100% - 12px),1px calc(100% - 12px),1px calc(100% - 1px),12px calc(100% - 1px),12px 100%,0 100%);
    }
    .target.down { opacity: 0.3; pointer-events: none; }

    .reticle {
      position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%);
      width: 88px; height: 88px; pointer-events: none; z-index: 3;
    }
    .reticle svg { width: 100%; height: 100%; }
    .reticle .ring { fill: none; stroke: var(--accent); stroke-width: 2; opacity: 0.35; }
    .reticle .arc {
      fill: none; stroke: var(--accent); stroke-width: 3;
      stroke-linecap: butt; stroke-dasharray: 220; stroke-dashoffset: 220;
      transition: stroke-dashoffset 80ms linear;
    }
    .reticle.hot .ring { opacity: 0.7; }

    .compass {
      width: 64px; height: 64px; border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; position: relative;
      font-family: var(--font-mono); background: color-mix(in srgb, var(--surface) 70%, transparent);
      margin: 0 auto;
    }
    .compass .deg { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; }
    .compass .n { position: absolute; top: 4px; font-size: 8px; color: var(--text-muted); letter-spacing: 0.12em; }

    .short-msg {
      margin-top: 6px; text-align: center;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted);
    }

    .zone-l, .zone-r {
      position: absolute; bottom: 36px; width: 42%; max-width: 160px;
    }
    .zone-l { left: 10px; }
    .zone-r { right: 10px; }
    .pad {
      background: color-mix(in srgb, var(--surface) 78%, transparent);
      border: 1px solid var(--border);
      padding: 8px;
    }
    .pad .lab {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em;
      color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;
    }
    .pad .t-btn {
      appearance: none; -webkit-appearance: none;
      box-sizing: border-box;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 0 8px; margin: 0; outline: none; overflow: hidden;
      background: transparent; border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .pad .t-btn img {
      width: 22px; height: 22px; max-width: 22px; max-height: 22px;
      object-fit: contain; flex-shrink: 0; pointer-events: none;
    }
    .stance-row { display: flex; gap: 4px; }
    .stance-row .t-btn {
      flex: 1; min-height: 44px; padding: 0;
      flex-direction: column; gap: 2px;
      font-size: 9px; letter-spacing: 0.06em;
    }
    .stance-row .t-btn img { width: 20px; height: 20px; max-width: 20px; max-height: 20px; opacity: 0.9; }
    .stance-row .t-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
    .stance-row .t-btn:active { transform: scale(0.94); }

    .stm { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .stm .hud-bar-track { flex: 1; height: 6px; }
    .stm .badge { font-size: 10px; }

    #btn-sprint {
      width: 100%; margin-top: 8px; min-height: 44px;
    }
    #btn-sprint:active { transform: scale(0.94); background: var(--accent-soft); }

    .fire-stack { display: flex; flex-direction: column; gap: 6px; }
    .fire-stack .t-btn {
      min-height: 48px;
    }
    .fire-stack .t-btn.primary { border-color: var(--accent); color: var(--accent); min-height: 56px; }
    .fire-stack .t-btn img { width: 26px; height: 18px; max-width: 26px; max-height: 18px; }
    .fire-stack .t-btn:active { transform: scale(0.94); background: var(--accent-soft); }
    .fire-stack .t-btn:disabled { opacity: 0.35; }

    .ammo {
      font-family: var(--font-mono); font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em; margin-bottom: 6px; text-align: center;
    }

    .feed {
      position: absolute; top: 100px; left: 12px; width: 48%;
      z-index: 8; pointer-events: none;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;
    }
    .feed div {
      margin-bottom: 3px; padding: 3px 6px;
      background: rgba(0,0,0,.55); border: 1px solid var(--border);
      animation: fadeFeed 2s ease-out forwards;
    }
    @keyframes fadeFeed { 0%,70%{opacity:1} 100%{opacity:0} }

    .help-toggle {
      position: absolute; top: 52px; right: 12px; z-index: 16;
      width: 32px; height: 32px; padding: 0; border-radius: 2px;
      border: 1px solid var(--border); background: rgba(0,0,0,.5);
      color: var(--text-muted); font-size: 12px; cursor: pointer;
    }
    .help-toggle:active { transform: scale(0.94); }
    .help {
      position: absolute; top: 90px; left: 12px; right: 12px; z-index: 15;
      padding: 8px 10px; text-align: center; font-size: 10px; line-height: 1.45;
      letter-spacing: 0.06em; color: var(--text-muted);
      background: rgba(0,0,0,.88); border: 1px solid var(--border); pointer-events: none;
      font-family: var(--font-mono);
    }
    .help[hidden] { display: none !important; }

    .radar {
      position: absolute; top: 52px; left: 12px; width: 48px; height: 48px;
      border: 1px solid var(--border); border-radius: 50%;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
      pointer-events: none;
    }
    .radar::after {
      content: ""; position: absolute; left: 62%; top: 38%; width: 5px; height: 5px;
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-world has-grid"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="radar" aria-hidden="true"></div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>点目标锁定（环进度）· 左姿态/冲刺 · 右换弹/点射 · 未锁定时点射精度下降</div>

      <div class="hud-anchor-tc" style="top:52px">
        <button type="button" class="compass" id="btn-compass" aria-label="调整方位">
          <span class="n">北</span>
          <span class="deg" id="compass-deg">274°</span>
        </button>
        <div class="short-msg" id="short-msg">扇区静默</div>
      </div>

      <button type="button" class="target" id="tgt" aria-label="锁定目标">
        <img src="../../assets/project/09-tactical-military/hostile.png" alt="" draggable="false" />
      </button>
      <div class="reticle" id="reticle" aria-hidden="true">
        <svg viewBox="0 0 88 88">
          <circle class="ring" cx="44" cy="44" r="35" />
          <circle class="arc" id="lock-arc" cx="44" cy="44" r="35" transform="rotate(-90 44 44)" />
        </svg>
      </div>

      <div class="zone-l">
        <div class="pad">
          <div class="lab">姿态</div>
          <div class="stance-row" id="stance-group">
            <button type="button" class="t-btn active" data-stance="STAND" aria-label="站立"><img src="../../assets/project/09-tactical-military/icons/icon-stand.png" alt="" draggable="false" /><span>立</span></button>
            <button type="button" class="t-btn" data-stance="CROUCH" aria-label="蹲伏"><img src="../../assets/project/09-tactical-military/icons/icon-crouch.png" alt="" draggable="false" /><span>蹲</span></button>
            <button type="button" class="t-btn" data-stance="PRONE" aria-label="卧倒"><img src="../../assets/project/09-tactical-military/icons/icon-prone.png" alt="" draggable="false" /><span>卧</span></button>
          </div>
          <div class="lab" style="margin-top:8px">耐力</div>
          <div class="stm">
            <div class="hud-bar-track"><div id="stm-fill" class="hud-bar-fill success" style="width:100%"></div></div>
            <span id="stm-val" class="badge">100</span>
          </div>
          <button type="button" class="t-btn" id="btn-sprint" aria-label="冲刺">
            <img src="../../assets/project/09-tactical-military/icons/icon-sprint.png" alt="" draggable="false" /><span>冲刺</span>
          </button>
        </div>
      </div>

      <div class="zone-r">
        <div class="pad">
          <div class="lab">武器</div>
          <div class="ammo" id="ammo-val">24 / 120</div>
          <div class="fire-stack">
            <button type="button" class="t-btn" id="btn-reload" aria-label="换弹">
              <img src="../../assets/project/09-tactical-military/icons/icon-reload.png" alt="" draggable="false" /><span>换弹</span>
            </button>
            <button type="button" class="t-btn primary" id="btn-fire" aria-label="点射">
              <img src="../../assets/project/09-tactical-military/icons/icon-fire.png" alt="" draggable="false" /><span>点射</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let mag = 24, reserve = 120, stamina = 100, bearing = 274;
    let locked = false, lockPct = 0, lockTimer = 0, tgtHp = 3;
    const stanceLabels = { STAND: "站立", CROUCH: "蹲伏", PRONE: "卧倒" };
    const CIRC = 2 * Math.PI * 35;

    function feed(msg) {
      const el = document.createElement("div");
      el.textContent = msg;
      sk.$("#feed").prepend(el);
      setTimeout(() => el.remove(), 2000);
    }

    function syncAmmo() { sk.setText(sk.$("#ammo-val"), mag + " / " + reserve); }
    function syncStamina() {
      sk.setFill(sk.$("#stm-fill"), stamina);
      sk.setText(sk.$("#stm-val"), String(stamina));
      sk.$("#stm-fill").className = "hud-bar-fill " + (stamina > 40 ? "success" : stamina > 15 ? "warning" : "danger");
    }
    function syncBearing() {
      sk.setText(sk.$("#compass-deg"), bearing + "°");
    }
    function syncLock() {
      const arc = sk.$("#lock-arc");
      arc.style.strokeDasharray = String(CIRC);
      arc.style.strokeDashoffset = String(CIRC * (1 - lockPct / 100));
      sk.$("#reticle").classList.toggle("hot", locked || lockPct > 0);
      sk.$("#tgt").classList.toggle("locked", locked);
    }

    function clearLock() {
      locked = false;
      lockPct = 0;
      clearInterval(lockTimer);
      lockTimer = 0;
      syncLock();
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.on(sk.$("#tgt"), "click", () => {
      if (sk.$("#tgt").classList.contains("down")) return;
      if (locked) { feed("目标已锁定"); return; }
      clearInterval(lockTimer);
      lockPct = 0;
      const stance = sk.$("[data-stance].active").dataset.stance;
      const speed = stance === "PRONE" ? 14 : stance === "CROUCH" ? 10 : 7;
      sk.setText(sk.$("#short-msg"), "锁定中…");
      lockTimer = setInterval(() => {
        lockPct = Math.min(100, lockPct + speed);
        syncLock();
        if (lockPct >= 100) {
          locked = true;
          clearInterval(lockTimer);
          sk.setText(sk.$("#short-msg"), "目标锁定");
          feed("锁定完成");
        }
      }, 120);
    });

    sk.$all("[data-stance]").forEach((btn) => {
      sk.on(btn, "click", () => {
        sk.$all("[data-stance]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        feed("姿态：" + stanceLabels[btn.dataset.stance]);
        if (lockPct > 0 && !locked) clearLock();
      });
    });

    sk.on(sk.$("#btn-reload"), "click", () => {
      if (reserve <= 0) { feed("备用弹耗尽"); return; }
      const need = 30 - mag;
      const take = Math.min(need, reserve);
      mag += take; reserve -= take;
      syncAmmo();
      feed("换弹 +" + take);
      sk.pulse(sk.$("#btn-reload"));
    });

    sk.on(sk.$("#btn-compass"), "click", () => {
      bearing = (bearing + 15) % 360;
      syncBearing();
      sk.setText(sk.$("#short-msg"), "方位 " + bearing + "°");
    });

    sk.on(sk.$("#btn-sprint"), "click", () => {
      if (stamina < 12) { feed("力竭"); return; }
      stamina = Math.max(0, stamina - 12);
      syncStamina();
      clearLock();
      sk.setText(sk.$("#short-msg"), "机动中");
      feed("冲刺 −12");
    });

    sk.on(sk.$("#btn-fire"), "click", () => {
      if (mag <= 0) { feed("弹匣空 — 换弹"); return; }
      const burst = Math.min(3, mag);
      mag -= burst;
      syncAmmo();
      const hit = locked ? true : Math.random() < 0.35;
      if (hit) {
        tgtHp -= 1;
        feed("命中 ×" + burst + (locked ? "" : "（盲射）"));
        sk.pulse(sk.$("#tgt"));
        if (tgtHp <= 0) {
          sk.$("#tgt").classList.add("down");
          clearLock();
          sk.setText(sk.$("#short-msg"), "目标失效");
          feed("目标清除");
        }
      } else {
        feed("偏射 ×" + burst);
        sk.$("#vignette").classList.add("on");
        setTimeout(() => sk.$("#vignette").classList.remove("on"), 180);
      }
    });

    syncAmmo(); syncStamina(); syncBearing(); syncLock();
  </script>
</body>
</html>
