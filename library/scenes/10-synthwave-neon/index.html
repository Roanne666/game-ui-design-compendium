<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>合成波霓虹 — 标题</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="../../components/styles/synthwave-neon.css" />
  <style>
    .title-block {
      position:absolute; top:22%; left:50%; transform:translateX(-50%);
      text-align:center; display:flex; flex-direction:column; align-items:center; gap:20px;
      pointer-events:none;
    }
    .logo { font-family:var(--font-display); font-size:clamp(36px,8vw,72px); letter-spacing:.2em; text-shadow:0 0 20px var(--glow),0 0 40px var(--accent-2); margin:0; pointer-events:auto; }
    .logo img { width:48px; height:48px; vertical-align:middle; margin-right:12px; filter:drop-shadow(0 0 8px var(--accent)); }
    .menu { display:flex; flex-direction:column; gap:10px; min-width:260px; pointer-events:auto; }
    .menu .btn { width:100%; letter-spacing:.15em; }
    .side-stack { width:min(300px,38vw); max-height:80vh; overflow:auto; }
    [data-sk-panel] { margin-bottom:12px; }
    .score-list { list-style:none; margin:0; padding:0; }
    .score-list li { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--border); font-family:var(--font-mono); font-size:12px; }
    .score-list li.top { color:var(--accent); text-shadow:0 0 8px var(--glow); }
    .vol-row { display:flex; align-items:center; gap:8px; margin:10px 0; }
    .vol-row span { flex:1; font-size:12px; }
    #loading-bar-wrap { width:min(400px,90vw); opacity:0; transition:opacity .2s; pointer-events:auto; }
    #loading-bar-wrap.visible { opacity:1; }
    .hint { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--text-muted); pointer-events:none; }
  </style>
</head>
<body>
  <div class="game-root letterbox">
    <div class="game-world has-grid"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="title-block">
        <h1 class="logo">
          <img src="../../assets/_shared/kenney/icons/star.png" alt="" />霓虹漂移
        </h1>
        <div id="loading-bar-wrap">
          <div class="progress progress-linear" style="height:12px">
            <div id="title-load-bar" class="progress-fill" style="width:0%;background:var(--accent-2)"></div>
          </div>
          <div style="text-align:center;margin-top:8px"><span class="badge" id="load-label">投币开始</span></div>
        </div>
      </div>

      <div class="hud-anchor-bc menu">
        <button type="button" class="btn btn-primary menu-item-large primary" id="btn-start">开始</button>
        <button type="button" class="btn menu-item-large" id="btn-scores">高分榜</button>
        <button type="button" class="btn menu-item-large" id="btn-options">选项</button>
        <button type="button" class="btn btn-danger menu-item-large" id="btn-quit">退出</button>
      </div>

      <div class="hud-anchor-tr side-stack">
        <div id="scores-panel" class="panel frame-brackets" data-sk-panel hidden>
          <div class="panel-title">高分榜</div>
          <div class="panel-body">
            <ul class="score-list">
              <li class="top"><span>1. VAPOR_KID</span><span>984,200</span></li>
              <li><span>2. RETRO_FOX</span><span>812,050</span></li>
              <li><span>3. SYNTH_RON</span><span>640,880</span></li>
              <li><span>4. 你</span><span id="your-score">000,000</span></li>
            </ul>
            <button type="button" class="btn btn-ghost" id="scores-close" style="margin-top:12px;width:100%">关闭</button>
          </div>
        </div>

        <div id="options-panel" class="panel frame-brackets" data-sk-panel hidden>
          <div class="panel-title">选项</div>
          <div class="panel-body">
            <div class="vol-row">
              <span>主音量</span>
              <button type="button" class="btn btn-ghost" data-vol="master" data-delta="-10">−</button>
              <span id="vol-master" class="badge">70</span>
              <button type="button" class="btn btn-ghost" data-vol="master" data-delta="10">+</button>
            </div>
            <div class="vol-row">
              <span>音乐音量</span>
              <button type="button" class="btn btn-ghost" data-vol="music" data-delta="-10">−</button>
              <span id="vol-music" class="badge">80</span>
              <button type="button" class="btn btn-ghost" data-vol="music" data-delta="10">+</button>
            </div>
            <div class="vol-row">
              <span>音效音量</span>
              <button type="button" class="btn btn-ghost" data-vol="sfx" data-delta="-10">−</button>
              <span id="vol-sfx" class="badge">90</span>
              <button type="button" class="btn btn-ghost" data-vol="sfx" data-delta="10">+</button>
            </div>
            <button type="button" class="btn btn-ghost" id="options-close" style="margin-top:12px;width:100%">关闭</button>
          </div>
        </div>
      </div>

      <p class="hint">开始填充进度条 · 高分榜 · 选项音量 · 退出 · Esc 关闭</p>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    const vol = { master: 70, music: 80, sfx: 90 };
    const volLabels = { master: "主音量", music: "音乐音量", sfx: "音效音量" };

    function syncVol(key) {
      sk.setText(sk.$("#vol-" + key), String(vol[key]));
    }

    sk.on(sk.$("#btn-start"), "click", () => {
      const wrap = sk.$("#loading-bar-wrap");
      wrap.classList.add("visible");
      sk.setText(sk.$("#load-label"), "加载中…");
      let pct = 0;
      const bar = sk.$("#title-load-bar");
      const timer = setInterval(() => {
        pct += 4 + Math.floor(Math.random() * 5);
        if (pct >= 100) {
          pct = 100;
          clearInterval(timer);
          sk.setFill(bar, pct);
          sk.setText(sk.$("#load-label"), "就绪");
          sk.toast("第一关 — 午夜公路", "success");
          sk.pulse(wrap);
        } else {
          sk.setFill(bar, pct);
        }
      }, 80);
    });

    sk.on(sk.$("#btn-scores"), "click", () => {
      sk.closePanel("#options-panel");
      sk.togglePanel("#scores-panel");
    });
    sk.on(sk.$("#scores-close"), "click", () => sk.closePanel("#scores-panel"));

    sk.on(sk.$("#btn-options"), "click", () => {
      sk.closePanel("#scores-panel");
      sk.togglePanel("#options-panel");
    });
    sk.on(sk.$("#options-close"), "click", () => sk.closePanel("#options-panel"));

    sk.$all("[data-vol]").forEach((btn) => {
      if (!btn.dataset.delta) return;
      sk.on(btn, "click", () => {
        const key = btn.dataset.vol;
        vol[key] = Math.max(0, Math.min(100, vol[key] + parseInt(btn.dataset.delta, 10)));
        syncVol(key);
        sk.toast(volLabels[key] + " " + vol[key]);
      });
    });

    sk.on(sk.$("#btn-quit"), "click", () => {
      sk.modal({
        title: "退出到桌面？",
        body: "你的高分已本地保存。",
        onConfirm: () => sk.toast("网格上再见！", "warning"),
      });
    });

    Object.keys(vol).forEach(syncVol);
  </script>
</body>
</html>
