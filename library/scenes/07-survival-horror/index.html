<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生存恐怖 — 稀疏探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="../../components/styles/survival-horror.css" />
  <style>
    .game-root {
      --bg: #070605;
      --surface: rgba(14, 12, 11, 0.94);
      --text: #d8d0bc;
      --text-muted: #6a6660;
      --accent: #3b5570;
      --accent-2: #d89830;
      --border: #4a6480;
      --font-display: "Allerta Stencil", sans-serif;
      --font-body: "Courier Prime", monospace;
      --phone-border-color: rgba(59, 85, 112, 0.45);
      --phone-shadow-inset: inset 0 0 0 1px rgba(59, 85, 112, 0.2);
    }

    .game-world {
      background: #050403;
    }
    .game-world::before {
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }
    .game-world::after {
      box-shadow: inset 0 0 90px 28px rgba(0, 0, 0, 0.75);
    }

    /* 透视走廊：世界纵深，不是空黑底 */
    .corridor {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
      overflow: hidden;
    }
    .ceil {
      position: absolute; left: 0; right: 0; top: 0; height: 28%;
      background:
        linear-gradient(180deg, #1a1614 0%, #0e0c0a 70%, transparent 100%),
        repeating-linear-gradient(90deg, transparent 0 36px, rgba(0,0,0,.35) 36px 38px);
      clip-path: polygon(0 0, 100% 0, 72% 100%, 28% 100%);
      border-bottom: 1px solid rgba(74, 100, 128, 0.15);
    }
    .floor {
      position: absolute; left: 0; right: 0; bottom: 0; height: 42%;
      background:
        linear-gradient(180deg, transparent 0%, rgba(20, 16, 12, 0.5) 18%, #0c0a08 55%, #060504 100%),
        repeating-linear-gradient(90deg, #12100e 0 28px, #0e0c0a 28px 56px);
      clip-path: polygon(28% 0, 72% 0, 100% 100%, 0 100%);
      box-shadow: inset 0 40px 60px rgba(0, 0, 0, 0.45);
    }
    .floor::after {
      content: "";
      position: absolute; left: 50%; top: 8%; transform: translateX(-50%);
      width: 44%; height: 70%;
      background: linear-gradient(180deg, rgba(216, 152, 48, 0.07), transparent 55%);
      filter: blur(8px);
    }
    .wall-l, .wall-r {
      position: absolute; top: 0; bottom: 0; width: 38%;
    }
    .wall-l {
      left: 0;
      background:
        linear-gradient(90deg, #181412 0%, #100e0c 70%, transparent 100%),
        repeating-linear-gradient(180deg, transparent 0 52px, rgba(59,85,112,0.07) 52px 53px);
      clip-path: polygon(0 0, 100% 22%, 100% 68%, 0 100%);
      box-shadow: inset -20px 0 40px rgba(0, 0, 0, 0.5);
    }
    .wall-r {
      right: 0;
      background:
        linear-gradient(270deg, #181412 0%, #100e0c 70%, transparent 100%),
        repeating-linear-gradient(180deg, transparent 0 52px, rgba(59,85,112,0.07) 52px 53px);
      clip-path: polygon(0 22%, 100% 0, 100% 100%, 0 68%);
      box-shadow: inset 20px 0 40px rgba(0, 0, 0, 0.5);
    }
    .wall-pipe {
      position: absolute; width: 7px;
      background: linear-gradient(90deg, #1a222c, #3a4a58 45%, #121820);
      box-shadow: 2px 0 0 rgba(0,0,0,.5), inset 1px 0 0 rgba(216,208,188,.12);
    }
    .wall-pipe.l1 { left: 7%; top: 20%; height: 48%; }
    .wall-pipe.l2 { left: 12%; top: 28%; height: 36%; width: 4px; opacity: 0.7; }
    .wall-pipe.r1 { right: 8%; top: 18%; height: 52%; }
    .hazard {
      position: absolute; left: 4%; bottom: 26%; width: 18%; height: 10px;
      background: repeating-linear-gradient(90deg, #d89830 0 8px, #0a0a08 8px 16px);
      opacity: 0.35; transform: skewY(-8deg);
    }
    .hazard.r { left: auto; right: 4%; transform: skewY(8deg); }
    .stain {
      position: absolute; width: 40px; height: 70px; border-radius: 40% 40% 50% 50%;
      background: radial-gradient(ellipse, rgba(90, 30, 28, 0.35), transparent 70%);
      filter: blur(1px); opacity: 0.55;
    }
    .stain.a { left: 14%; top: 42%; }
    .stain.b { right: 16%; top: 48%; width: 28px; height: 50px; opacity: 0.4; }
    .back-wall {
      position: absolute; left: 28%; right: 28%; top: 22%; bottom: 38%;
      background:
        linear-gradient(180deg, #161310 0%, #0c0a08 100%);
      border: 1px solid rgba(74, 100, 128, 0.2);
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.65);
    }
    .back-wall::before {
      content: "B-07";
      position: absolute; left: 10px; top: 8px;
      font-family: var(--font-display); font-size: 10px; letter-spacing: 0.2em;
      color: rgba(74, 100, 128, 0.45);
    }
    .lamp {
      position: absolute; left: 50%; top: 8%; transform: translateX(-50%);
      width: 64px; height: 10px;
      background: #1a1814;
      border: 1px solid rgba(74, 100, 128, 0.35);
      z-index: 2;
    }
    .lamp::after {
      content: "";
      position: absolute; left: 8%; right: 8%; top: 100%;
      height: 160px;
      background: linear-gradient(180deg, rgba(216, 152, 48, 0.18), transparent 70%);
      animation: lampFlicker 3.6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes lampFlicker {
      0%, 100% { opacity: 0.75; }
      48% { opacity: 0.9; }
      50% { opacity: 0.35; }
      52% { opacity: 0.85; }
      78% { opacity: 0.7; }
      80% { opacity: 0.95; }
    }
    .mist {
      position: absolute; left: 0; right: 0; bottom: 18%; height: 28%;
      background: radial-gradient(ellipse at 50% 80%, rgba(40, 48, 55, 0.35), transparent 65%);
      animation: mistDrift 7s ease-in-out infinite alternate;
      z-index: 2;
    }
    @keyframes mistDrift {
      from { transform: translateY(0); opacity: 0.5; }
      to { transform: translateY(-10px); opacity: 0.75; }
    }

    .door-hotspot {
      appearance: none; -webkit-appearance: none;
      position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%);
      width: 96px; height: 168px; padding: 0; margin: 0; outline: none;
      border: 2px solid rgba(90, 70, 45, 0.55);
      background:
        linear-gradient(90deg, rgba(0,0,0,.35) 0%, transparent 12%, transparent 88%, rgba(0,0,0,.35) 100%),
        linear-gradient(180deg, #2a221c 0%, #1a1510 40%, #120e0c 78%, #1c1612 100%);
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.75),
        inset 0 20px 30px rgba(255, 220, 160, 0.03),
        inset 12px 0 24px rgba(0, 0, 0, 0.4),
        0 16px 40px rgba(0, 0, 0, 0.65);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 3;
    }
    .door-hotspot::before {
      content: "";
      position: absolute; left: 8px; right: 8px; top: 10px; bottom: 10px;
      border: 1px solid rgba(74, 100, 128, 0.25);
      pointer-events: none;
    }
    .door-hotspot .plate {
      width: 22px; height: 34px;
      border: 1px solid rgba(120, 100, 60, 0.7);
      background: linear-gradient(180deg, #1c1814, #0a0908);
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.5);
    }
    .door-hotspot .plate::after {
      content: "";
      position: absolute; right: 4px; top: 14px;
      width: 6px; height: 6px; border-radius: 50%;
      background: #d89830; box-shadow: 0 0 10px rgba(216, 152, 48, 0.7);
      animation: lampFlicker 4.2s ease-in-out infinite;
    }
    .door-hotspot img { width: 28px; height: 28px; opacity: 0.5; filter: grayscale(0.35) brightness(0.9); }
    .door-hotspot:active { transform: translate(-50%, -50%) scale(0.97); }
    .door-hotspot.near {
      border-color: rgba(216, 152, 48, 0.55);
      box-shadow:
        inset 0 0 0 1px rgba(216, 152, 48, 0.18),
        inset 12px 0 24px rgba(0, 0, 0, 0.4),
        0 0 36px rgba(216, 152, 48, 0.14),
        0 16px 40px rgba(0, 0, 0, 0.65);
    }

    .ctx-prompt {
      position: absolute; left: 50%; top: 58%; transform: translateX(-50%);
      opacity: 0; transition: opacity 200ms ease-out;
      font-family: var(--font-display); font-size: 11px; letter-spacing: 0.28em;
      color: rgba(216, 208, 188, 0.62); text-shadow: 0 1px 8px #000;
      pointer-events: none; z-index: 4; text-transform: uppercase;
    }
    .ctx-prompt.show { opacity: 1; }

    .place-tag {
      position: absolute; left: 50%; top: 52px; transform: translateX(-50%);
      z-index: 4; pointer-events: none;
      font-family: var(--font-display); font-size: 10px; letter-spacing: 0.32em;
      color: rgba(74, 100, 128, 0.55); text-transform: uppercase;
    }

    /* 底中：工程挂件入口，不是网页方钮 */
    .bag-entry {
      appearance: none; -webkit-appearance: none;
      position: absolute; left: 50%; bottom: 32px; transform: translateX(-50%);
      width: 56px; height: 56px; min-width: 48px; min-height: 48px;
      padding: 0; margin: 0; outline: none;
      display: flex; align-items: center; justify-content: center;
      background:
        linear-gradient(165deg, rgba(28, 32, 38, 0.95), rgba(10, 10, 8, 0.95));
      border: 1px solid rgba(74, 100, 128, 0.65);
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.5),
        0 6px 18px rgba(0, 0, 0, 0.55);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 6;
    }
    .bag-entry img { width: 24px; height: 24px; opacity: 0.75; filter: grayscale(0.25); }
    .bag-entry .dot {
      position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; border-radius: 50%;
      background: var(--danger); box-shadow: 0 0 8px var(--danger);
    }
    .bag-entry:active { transform: translateX(-50%) scale(0.94); }
    .bag-entry::before,
    .bag-entry::after {
      content: ""; position: absolute; width: 6px; height: 6px;
      border-color: rgba(74, 100, 128, 0.8); border-style: solid; pointer-events: none;
    }
    .bag-entry::before { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .bag-entry::after { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

    #inv-modal[hidden] { display: none !important; }
    #inv-modal {
      position: absolute; inset: 0; z-index: 25;
      background: rgba(0, 0, 0, 0.82);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 12px 10px 24px;
    }
    .rig {
      width: min(94%, 360px); max-height: 80%; overflow: auto;
      background:
        linear-gradient(180deg, rgba(22, 26, 30, 0.98), rgba(10, 10, 8, 0.98));
      border: 1px solid rgba(74, 100, 128, 0.7);
      box-shadow:
        inset 0 0 0 1px rgba(59, 85, 112, 0.25),
        0 18px 48px rgba(0, 0, 0, 0.75);
      padding: 14px 12px 12px;
    }
    .rig-title {
      font-family: var(--font-display); font-size: 12px; letter-spacing: 0.32em;
      color: rgba(216, 208, 188, 0.7); text-align: center;
      padding-bottom: 10px; margin-bottom: 12px;
      border-bottom: 1px solid rgba(74, 100, 128, 0.35);
      text-transform: uppercase;
    }
    .spine-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      padding: 8px 6px;
      border: 1px solid rgba(74, 100, 128, 0.28);
      background: rgba(0, 0, 0, 0.28);
    }
    .spine-row img { width: 20px; height: 20px; opacity: 0.55; }
    .spine-row .spine-bar-vertical { transform: scale(0.95); transform-origin: center left; }
    .spine-row .hp-read {
      margin-left: auto;
      font-family: var(--font-display); font-size: 11px; letter-spacing: 0.14em;
      color: var(--text-muted);
    }
    .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .slot {
      appearance: none; -webkit-appearance: none;
      min-height: 56px; padding: 0; margin: 0; outline: none;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(74, 100, 128, 0.4);
      color: var(--text);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .slot.has { border-color: rgba(91, 125, 160, 0.55); }
    .slot.selected {
      border-color: rgba(216, 152, 48, 0.7);
      box-shadow: inset 0 0 0 1px rgba(216, 152, 48, 0.25);
    }
    .slot img { width: 24px; height: 24px; opacity: 0.85; }
    .slot .qty {
      position: absolute; right: 4px; bottom: 3px;
      font-size: 10px; letter-spacing: 0.04em; color: var(--text-muted);
    }
    .detail { margin-top: 12px; }
    .sel-line {
      font-family: var(--font-body); font-size: 12px; letter-spacing: 0.06em;
      color: var(--text-muted); margin-bottom: 10px;
      min-height: 1.2em;
    }
    .sel-line strong { color: var(--text); font-weight: 400; letter-spacing: 0.12em; }
    .rig-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .rig-line {
      appearance: none; -webkit-appearance: none;
      width: 100%; min-height: 46px; padding: 10px 8px; margin: 0; outline: none;
      background: transparent;
      border: 1px solid rgba(74, 100, 128, 0.45);
      color: var(--text);
      font-family: var(--font-display); font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .rig-line:active {
      border-color: rgba(216, 208, 188, 0.55);
      background: rgba(59, 85, 112, 0.18);
    }
    .rig-line.hazard { border-color: rgba(160, 56, 56, 0.55); color: #c06060; }
    .rig-line.ghost { grid-column: 1 / -1; color: var(--text-muted); margin-top: 2px; }

    .feed {
      position: absolute; top: 48px; left: 12px; width: 58%;
      z-index: 8; pointer-events: none;
      font-family: var(--font-body); font-size: 12px; letter-spacing: 0.04em;
      color: rgba(216, 208, 188, 0.7); text-shadow: 0 1px 6px #000;
    }
    .feed div {
      margin-bottom: 3px; padding: 0;
      background: none; border: none;
      animation: fadeFeed 2.4s ease-out forwards;
    }
    @keyframes fadeFeed { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }

    .help-toggle {
      appearance: none; -webkit-appearance: none;
      position: absolute; top: 46px; right: 12px; z-index: 16;
      width: 30px; height: 30px; padding: 0; margin: 0; outline: none;
      border: 1px solid rgba(74, 100, 128, 0.5);
      background: rgba(8, 6, 6, 0.7);
      color: var(--text-muted);
      font-family: var(--font-display); font-size: 13px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .help-toggle:active { transform: scale(0.94); color: var(--text); }
    .help {
      position: absolute; top: 86px; left: 12px; right: 12px; z-index: 15;
      padding: 10px 12px; text-align: center;
      font-family: var(--font-body); font-size: 11px; line-height: 1.5;
      letter-spacing: 0.04em; color: var(--text-muted);
      background: rgba(8, 6, 6, 0.92);
      border: 1px solid rgba(74, 100, 128, 0.4);
      pointer-events: none;
    }
    .help[hidden] { display: none !important; }

    .exit-note {
      position: absolute; left: 50%; top: 34%; transform: translate(-50%, -50%);
      width: min(86%, 300px); z-index: 30;
      padding: 18px 16px 14px;
      background: rgba(12, 12, 10, 0.96);
      border: 1px solid rgba(74, 100, 128, 0.65);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
      text-align: center;
    }
    .exit-note[hidden] { display: none !important; }
    .exit-note h3 {
      margin: 0 0 10px; font-family: var(--font-display);
      font-size: 12px; letter-spacing: 0.28em; color: var(--accent-2);
      font-weight: 400; text-transform: uppercase;
    }
    .exit-note p {
      margin: 0 0 14px; font-family: var(--font-body);
      font-size: 13px; line-height: 1.5; color: var(--text);
    }
    .exit-note .rig-line { width: 100%; }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="corridor" aria-hidden="true">
      <div class="ceil"></div>
      <div class="floor"></div>
      <div class="wall-l">
        <div class="wall-pipe l1"></div>
        <div class="wall-pipe l2"></div>
        <div class="hazard"></div>
        <div class="stain a"></div>
      </div>
      <div class="wall-r">
        <div class="wall-pipe r1"></div>
        <div class="hazard r"></div>
        <div class="stain b"></div>
      </div>
      <div class="back-wall"></div>
      <div class="lamp"></div>
      <div class="mist"></div>
    </div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="place-tag">维修通道 · B-07</div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>几乎无常驻界面 · 点门锁检查 · 底中打开脊骨背包 · 钥匙在包内 · 受伤时角标闪红</div>

      <button type="button" class="door-hotspot near" id="btn-world-door" aria-label="检查门锁">
        <span class="plate" aria-hidden="true"></span>
        <img src="../../assets/_shared/rpg-icons/door.png" alt="" draggable="false" />
      </button>
      <div class="ctx-prompt show" id="ctx">检查门锁</div>

      <button type="button" class="bag-entry" id="btn-bag" aria-label="打开脊骨背包">
        <img src="../../assets/_shared/rpg-icons/box.png" alt="" draggable="false" />
        <span class="dot" id="bag-dot" hidden></span>
      </button>

      <div id="inv-modal" hidden>
        <div class="rig" role="dialog" aria-label="脊骨背包">
          <div class="rig-title">脊骨背包 · 8 格</div>
          <div class="spine-row">
            <img src="../../assets/_shared/rpg-icons/darkness.png" alt="" draggable="false" />
            <div class="spine-bar-vertical" id="spine-bar"></div>
            <span class="hp-read" id="hp-label">72%</span>
          </div>
          <div class="inv-grid" id="inv">
            <button type="button" class="slot has" data-item="med" data-qty="2" data-label="医疗包">
              <img src="../../assets/_shared/rpg-icons/medicine.png" alt="" draggable="false" /><span class="qty">×2</span>
            </button>
            <button type="button" class="slot has" data-item="key" data-qty="1" data-label="黄铜钥匙">
              <img src="../../assets/_shared/rpg-icons/key.png" alt="" draggable="false" /><span class="qty">×1</span>
            </button>
            <button type="button" class="slot has" data-item="knife" data-qty="1" data-label="生存刀">
              <img src="../../assets/_shared/rpg-icons/knife.png" alt="" draggable="false" />
            </button>
            <button type="button" class="slot has" data-item="ammo" data-qty="12" data-label="9mm 子弹">
              <img src="../../assets/_shared/rpg-icons/gun.png" alt="" draggable="false" /><span class="qty">×12</span>
            </button>
            <button type="button" class="slot has" data-item="shield" data-qty="1" data-label="破损护板">
              <img src="../../assets/_shared/rpg-icons/shield.png" alt="" draggable="false" />
            </button>
            <button type="button" class="slot" aria-label="空槽"></button>
            <button type="button" class="slot" aria-label="空槽"></button>
            <button type="button" class="slot" aria-label="空槽"></button>
          </div>
          <div class="detail">
            <div class="sel-line">已选 <strong id="sel-name">—</strong></div>
            <div class="rig-actions">
              <button type="button" class="rig-line" id="btn-use">使用</button>
              <button type="button" class="rig-line" id="btn-door">开门</button>
              <button type="button" class="rig-line hazard" id="btn-hurt">受伤</button>
              <button type="button" class="rig-line ghost" id="btn-close-bag">合上</button>
            </div>
          </div>
        </div>
      </div>

      <div class="exit-note" id="exit-note" hidden>
        <h3>维修通道出口</h3>
        <p>钥匙湿漉漉地转动了。冷空气涌了进来。</p>
        <button type="button" class="rig-line" id="btn-exit-ok">确认</button>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let hp = 72;
    let selectedSlot = null;
    const SEGMENTS = 10;

    function feed(msg) {
      const el = document.createElement("div");
      el.textContent = msg;
      sk.$("#feed").prepend(el);
      setTimeout(() => el.remove(), 2400);
    }

    function flashVignette() {
      const v = sk.$("#vignette");
      v.classList.add("on");
      setTimeout(() => v.classList.remove("on"), 400);
    }

    function renderSpine() {
      const bar = sk.$("#spine-bar");
      bar.innerHTML = "";
      const lit = Math.round((hp / 100) * SEGMENTS);
      for (let i = 0; i < SEGMENTS; i++) {
        const seg = document.createElement("div");
        seg.className = "spine-seg vertical";
        const idx = SEGMENTS - 1 - i;
        if (idx < lit) {
          if (hp <= 25) seg.classList.add("danger");
          else if (hp <= 50) seg.classList.add("warn");
          else seg.classList.add("on");
        }
        bar.appendChild(seg);
      }
      sk.setText(sk.$("#hp-label"), hp + "%");
      sk.$("#bag-dot").hidden = hp > 35;
    }

    function openBag() {
      sk.$("#inv-modal").hidden = false;
      sk.$("#ctx").classList.remove("show");
      renderSpine();
    }

    function closeBag() {
      sk.$("#inv-modal").hidden = true;
      selectedSlot = null;
      sk.$all(".slot").forEach((s) => s.classList.remove("selected"));
      sk.setText(sk.$("#sel-name"), "—");
      sk.$("#ctx").classList.add("show");
    }

    function tryDoor() {
      const hasKey = sk.$('.slot[data-item="key"].has');
      if (hasKey) {
        feed("锁芯转动了");
        sk.$("#exit-note").hidden = false;
      } else {
        feed("上锁 — 需要黄铜钥匙");
        flashVignette();
      }
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.on(sk.$("#btn-bag"), "click", openBag);
    sk.on(sk.$("#btn-close-bag"), "click", closeBag);
    sk.on(sk.$("#inv-modal"), "click", (e) => {
      if (e.target === sk.$("#inv-modal")) closeBag();
    });
    sk.on(sk.$("#btn-world-door"), "click", tryDoor);
    sk.on(sk.$("#btn-exit-ok"), "click", () => {
      sk.$("#exit-note").hidden = true;
      feed("检查点已写入");
    });

    sk.bindSlots("#inv", (slot) => {
      sk.$all(".slot").forEach((s) => s.classList.remove("selected"));
      if (!slot.classList.contains("has")) {
        sk.setText(sk.$("#sel-name"), "空槽位");
        selectedSlot = null;
        return;
      }
      slot.classList.add("selected");
      selectedSlot = slot;
      sk.setText(sk.$("#sel-name"), slot.dataset.label + (slot.dataset.qty ? " ×" + slot.dataset.qty : ""));
    });

    function consumeOne(slot) {
      let q = parseInt(slot.dataset.qty || "1", 10);
      q -= 1;
      if (q <= 0) {
        slot.classList.remove("has", "selected");
        slot.innerHTML = "";
        slot.removeAttribute("data-item");
        slot.removeAttribute("data-qty");
        slot.removeAttribute("data-label");
        selectedSlot = null;
        sk.setText(sk.$("#sel-name"), "—");
      } else {
        slot.dataset.qty = String(q);
        const qtyEl = slot.querySelector(".qty");
        if (qtyEl) qtyEl.textContent = "×" + q;
      }
    }

    sk.on(sk.$("#btn-use"), "click", () => {
      if (!selectedSlot || !selectedSlot.dataset.item) { feed("先选一格"); return; }
      if (selectedSlot.dataset.item === "med") {
        hp = Math.min(100, hp + 18);
        renderSpine();
        consumeOne(selectedSlot);
        feed("包扎 +18");
        sk.pulse(sk.$("#spine-bar"));
      } else if (selectedSlot.dataset.item === "key") {
        feed("钥匙留着开门用");
      } else {
        feed("现在用不了");
      }
    });

    sk.on(sk.$("#btn-door"), "click", tryDoor);

    sk.on(sk.$("#btn-hurt"), "click", () => {
      hp = Math.max(0, hp - 15);
      renderSpine();
      flashVignette();
      feed(hp <= 0 ? "生命体征衰竭" : "剧痛 −15%");
    });

    renderSpine();
  </script>
</body>
</html>
