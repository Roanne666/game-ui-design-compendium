<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手绘风 — 恩赐选择</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="../../components/styles/hand-drawn.css" />
  <style>
    .game-world {
      background:
        radial-gradient(ellipse 70% 50% at 50% 28%, color-mix(in srgb, var(--accent) 16%, #2a2218), transparent 70%),
        linear-gradient(180deg, #1c1812 0%, #0e0c09 55%, #16120e 100%);
    }
    .altar {
      position: absolute; left: 50%; top: 10%; transform: translateX(-50%);
      width: min(70%, 220px); text-align: center; pointer-events: none;
    }
    .altar .flame {
      width: 40px; height: 40px; margin: 0 auto 8px;
      filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 60%, transparent));
    }
    .altar .place {
      font-family: var(--font-display); font-size: 13px; letter-spacing: 0.22em;
      color: var(--text-muted); text-shadow: 1px 1px 0 var(--shadow-color);
    }
    .prompt {
      position: absolute; left: 50%; top: 22%; transform: translateX(-50%);
      opacity: 0; transition: opacity 180ms ease-out;
      font-family: var(--font-display); font-size: 15px; letter-spacing: 0.14em;
      text-shadow: 2px 2px 0 var(--shadow-color); pointer-events: none; z-index: 6;
    }
    .prompt.show { opacity: 1; }

    .boon-col {
      position: absolute; left: 50%; top: 28%; bottom: 22%;
      transform: translateX(-50%);
      width: min(88%, 300px);
      display: flex; flex-direction: column; gap: 10px;
      overflow: auto; padding: 4px 2px;
    }
    .boon-card {
      display: grid; grid-template-columns: 56px 1fr; gap: 10px; align-items: center;
      border: 2px solid var(--border); background: color-mix(in srgb, var(--surface) 92%, transparent);
      border-radius: var(--radius-lg); padding: 12px 14px; cursor: pointer; text-align: left;
      min-height: 72px; transition: transform 100ms ease-out, border-color 100ms ease-out, box-shadow 100ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .boon-card img { width: 48px; height: 48px; }
    .boon-card h3 { margin: 0 0 4px; font-size: 15px; font-family: var(--font-display); letter-spacing: 0.06em; }
    .boon-card p { margin: 0; font-size: 11px; color: var(--text-muted); line-height: 1.35; }
    .boon-card:active { transform: scale(0.98) rotate(-0.4deg); }
    .boon-card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 4px 4px 0 var(--shadow-color);
    }

    .action-bar {
      position: absolute; left: 12px; right: 12px; bottom: 28px;
      display: grid; grid-template-columns: 1.4fr 1fr; gap: 10px;
    }
    .action-bar .btn {
      min-height: 52px; font-family: var(--font-display); letter-spacing: 0.1em;
    }
    .action-bar .btn:active { transform: scale(0.96); }
    .pick-chip {
      position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.12em; color: var(--text-muted);
      pointer-events: none;
    }

    [data-sk-panel] {
      position: absolute; left: 50%; top: 36%; transform: translate(-50%, 0);
      width: min(320px, 90%); z-index: 20;
    }

    .feed {
      position: absolute; top: 52px; left: 12px; width: 48%;
      z-index: 8; pointer-events: none; font-size: 11px;
    }
    .feed div {
      margin-bottom: 4px; padding: 4px 8px;
      background: rgba(14,12,9,.75); border: 1px solid var(--border);
      animation: fadeFeed 2.2s ease-out forwards;
    }
    @keyframes fadeFeed { 0%,70%{opacity:1} 100%{opacity:0} }

    .help-toggle {
      position: absolute; top: 52px; right: 12px; z-index: 16;
      width: 36px; height: 36px; border-radius: 50%; padding: 0;
      border: 1px solid var(--border); background: rgba(14,12,9,.7);
      color: var(--text-muted); cursor: pointer; font-size: 14px;
    }
    .help-toggle:active { transform: scale(0.94); }
    .help {
      position: absolute; top: 96px; left: 12px; right: 12px; z-index: 15;
      padding: 8px 10px; text-align: center; font-size: 11px; line-height: 1.45;
      letter-spacing: 0.06em; color: var(--text-muted);
      background: rgba(14,12,9,.88); border: 1px solid var(--border);
      pointer-events: none;
    }
    .help[hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="altar">
        <img class="flame" src="../../assets/_shared/rpg-icons/fire.png" alt="" />
        <div class="place">祭坛 · 三择一</div>
      </div>
      <div class="prompt show" id="prompt">诸神注视着你</div>

      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>点选一张恩赐卡 · 底栏确认带走 · 可重抽一次选项 · 无悬停，靠选中态辨认</div>

      <div class="boon-col" id="boon-nodes">
        <button type="button" class="boon-card" data-boon="strike" data-next="你的利刃渴求鲜血 — 冲刺斩击攻速 +15%。" aria-label="赫尔墨斯之击">
          <img src="../../assets/_shared/rpg-icons/sword.png" alt="" />
          <div>
            <h3>赫尔墨斯之击</h3>
            <p>冲刺攻击造成额外伤害并留下墨迹轨迹。</p>
          </div>
        </button>
        <button type="button" class="boon-card selected" data-boon="ward" data-next="神盾绽放 — 完美格挡每次恢复 8 生命。" aria-label="神盾守护">
          <img src="../../assets/_shared/rpg-icons/shield.png" alt="" />
          <div>
            <h3>神盾守护</h3>
            <p>完美格挡治疗并击退附近敌人。</p>
          </div>
        </button>
        <button type="button" class="boon-card" data-boon="flux" data-next="混沌涌动 — 特技冷却 −20%，每次施放随机元素。" aria-label="混沌余烬">
          <img src="../../assets/_shared/rpg-icons/fire.png" alt="" />
          <div>
            <h3>混沌余烬</h3>
            <p>特技轮换元素，击杀返还魔力。</p>
          </div>
        </button>
      </div>

      <div class="pick-chip" id="pick-label">已选：神盾守护</div>

      <div class="action-bar">
        <button type="button" class="btn btn-primary" id="btn-confirm" aria-label="确认恩赐">确认恩赐</button>
        <button type="button" class="btn" id="btn-reroll" aria-label="重新抽取">重抽</button>
      </div>

      <div id="boon-result" class="panel panel-clipped frame-brackets" data-sk-panel hidden>
        <div class="panel-title">下一恩赐 · 尾声</div>
        <div class="panel-body" id="boon-text">—</div>
        <button type="button" class="btn btn-success" id="btn-continue" style="margin-top:12px;width:100%;min-height:48px">继续征程</button>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let selected = sk.$(".boon-card.selected");
    const rerollPool = [
      { icon: "potion.png", name: "花蜜啜饮", desc: "药水持续恢复生命。", next: "活力滴注 — 使用药水后 8 秒内每秒恢复 2 生命。" },
      { icon: "bow.png", name: "阿尔忒弥斯之触", desc: "远程暴击穿透一名敌人。", next: "穿透射击 — 暴击以 50% 伤害连锁第二名目标。" },
      { icon: "key.png", name: "万能钥匙", desc: "解锁隐藏密室。", next: "本区域地图显示秘密通道。" },
    ];

    function feed(msg) {
      const el = document.createElement("div");
      el.textContent = msg;
      sk.$("#feed").prepend(el);
      setTimeout(() => el.remove(), 2200);
    }

    function setPrompt(text, ms) {
      const p = sk.$("#prompt");
      sk.setText(p, text);
      p.classList.add("show");
      clearTimeout(setPrompt._t);
      if (ms) setPrompt._t = setTimeout(() => p.classList.remove("show"), ms);
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.$all(".boon-card").forEach((card) => {
      sk.on(card, "click", () => {
        sk.$all(".boon-card").forEach((c) => c.classList.remove("selected"));
        card.classList.add("selected");
        selected = card;
        const name = card.querySelector("h3").textContent;
        sk.setText(sk.$("#pick-label"), "已选：" + name);
        sk.pulse(card);
        feed("注视：" + name);
        setPrompt(name, 1400);
      });
    });

    sk.on(sk.$("#btn-confirm"), "click", () => {
      if (!selected) { feed("请先选择恩赐"); return; }
      sk.setText(sk.$("#boon-text"), selected.dataset.next);
      sk.openPanel("#boon-result");
      feed("恩赐已铭刻");
      setPrompt("命运已定", 1600);
      sk.pulse(selected);
    });

    sk.on(sk.$("#btn-reroll"), "click", () => {
      const cards = sk.$all(".boon-card");
      cards.forEach((card, i) => {
        const pick = rerollPool[i % rerollPool.length];
        card.querySelector("img").src = "../../assets/_shared/rpg-icons/" + pick.icon;
        card.querySelector("h3").textContent = pick.name;
        card.querySelector("p").textContent = pick.desc;
        card.dataset.boon = "r" + i;
        card.dataset.next = pick.next;
        card.setAttribute("aria-label", pick.name);
      });
      sk.$all(".boon-card").forEach((c) => c.classList.remove("selected"));
      cards[1].classList.add("selected");
      selected = cards[1];
      sk.setText(sk.$("#pick-label"), "已选：" + selected.querySelector("h3").textContent);
      sk.closePanel("#boon-result");
      feed("祭坛重抽");
      setPrompt("新的道路", 1400);
    });

    sk.on(sk.$("#btn-continue"), "click", () => {
      sk.closePanel("#boon-result");
      feed("进入下一密室…");
      setPrompt("前路未明", 1800);
    });
  </script>
</body>
</html>
