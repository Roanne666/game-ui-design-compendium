<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手绘风 — 恩赐选择</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="../../components/styles/hand-drawn.css" />
  <style>
    /* 冥府献礼台：去网页卡片/按钮栏，改羊皮纸 + 火漆印 */
    .game-root {
      --bg: #0a0908;
      --surface: #2a2218;
      --text: #e8dcc4;
      --text-muted: #7a6e5a;
      --accent: #d9b36c;
      --accent-2: #8b3a2e;
      --ink: #1a1410;
      --parchment: #c4a574;
      --parchment-deep: #8a6a3e;
      --phone-border-color: rgba(196, 165, 116, 0.3);
      --phone-shadow-inset: inset 0 0 0 1px rgba(196, 165, 116, 0.12);
    }

    .game-world {
      background:
        radial-gradient(ellipse 90% 50% at 50% 12%, rgba(139, 58, 46, 0.28), transparent 60%),
        radial-gradient(ellipse 70% 35% at 50% 100%, rgba(40, 28, 14, 0.9), transparent 55%),
        linear-gradient(180deg, #120e0b 0%, #070605 42%, #100c09 100%);
    }
    .game-world::before {
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }
    .game-world::after {
      box-shadow: inset 0 0 100px 36px rgba(0, 0, 0, 0.65);
    }

    /* 石台：世界物件，不是 UI chrome */
    .stone-ledge {
      position: absolute; left: 0; right: 0; bottom: 0; height: 22%;
      pointer-events: none; z-index: 2;
      background:
        linear-gradient(180deg, transparent 0%, rgba(12, 9, 6, 0.55) 40%, rgba(8, 6, 4, 0.92) 100%);
    }

    .altar {
      position: absolute; left: 50%; top: 4%; transform: translateX(-50%);
      width: min(82%, 280px); text-align: center; pointer-events: none; z-index: 4;
    }
    .altar .flame {
      width: 52px; height: 52px; margin: 0 auto 4px;
      filter: drop-shadow(0 0 14px rgba(217, 179, 108, 0.5));
      animation: flameIdle 1.15s ease-in-out infinite alternate;
    }
    @keyframes flameIdle {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-4px) scale(1.07); }
    }
    .altar .place {
      font-family: "IM Fell English", var(--font-display); font-size: 13px;
      letter-spacing: 0.32em; color: var(--text-muted); text-shadow: 1px 1px 0 #000;
    }
    .altar .room {
      margin-top: 2px;
      font-family: "Caveat", cursive; font-size: 18px; color: var(--accent);
    }

    .prompt {
      position: absolute; left: 50%; top: 15.5%; transform: translateX(-50%) rotate(-1deg);
      opacity: 0; transition: opacity 200ms ease-out;
      font-family: "IM Fell English", serif; font-size: 17px; font-style: italic;
      letter-spacing: 0.08em; color: var(--text); text-shadow: 2px 2px 0 #000;
      pointer-events: none; z-index: 6; white-space: nowrap;
    }
    .prompt.show { opacity: 1; }

    /* 三张献礼纸：不规则剪裁，不像列表卡片 */
    .boon-col {
      position: absolute; left: 50%; top: 19%; bottom: 24%;
      transform: translateX(-50%);
      width: min(92%, 340px);
      display: flex; flex-direction: column; gap: 14px; justify-content: center;
      z-index: 5; padding: 0 6px;
    }

    .offering {
      position: relative;
      display: block; width: 100%;
      padding: 0; margin: 0; border: none; background: transparent;
      cursor: pointer; text-align: left;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(3px 5px 0 rgba(0, 0, 0, 0.7));
      transition: filter 80ms step-end, transform 80ms ease-out;
    }
    .offering:nth-child(1) { transform: rotate(-1.8deg) translateX(-2%); }
    .offering:nth-child(2) { transform: rotate(1.2deg) translateX(3%); }
    .offering:nth-child(3) { transform: rotate(-0.9deg) translateX(-1%); }

    .offering .sheet {
      position: relative;
      display: grid; grid-template-columns: 58px 1fr; gap: 10px; align-items: start;
      padding: 14px 18px 16px 14px;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 20% 10%, rgba(255, 240, 210, 0.35), transparent 45%),
        linear-gradient(145deg, #d8b888 0%, #c4a574 42%, #a88752 100%);
      clip-path: polygon(
        1% 6%, 4% 1%, 18% 3%, 36% 0%, 55% 4%, 72% 1%, 88% 5%, 97% 2%, 100% 10%,
        98% 28%, 100% 48%, 97% 68%, 100% 86%, 94% 100%, 70% 97%, 48% 100%, 28% 96%, 8% 100%, 0% 88%,
        2% 70%, 0% 48%, 3% 28%
      );
      box-shadow: inset 0 0 0 2px #1a1410;
    }
    .offering .sheet::after {
      content: "";
      position: absolute; inset: 0; pointer-events: none; opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.1' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }
    /* 胶带角 */
    .offering .tape {
      position: absolute; top: -4px; right: 18%;
      width: 36px; height: 14px;
      background: rgba(232, 220, 180, 0.55);
      transform: rotate(8deg);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
      pointer-events: none; z-index: 2;
    }
    .offering:nth-child(2) .tape { left: 12%; right: auto; transform: rotate(-12deg); }
    .offering:nth-child(3) .tape { right: 28%; transform: rotate(18deg); top: -2px; }

    .offering .stamp {
      width: 52px; height: 52px;
      display: grid; place-items: center;
      background: rgba(26, 20, 16, 0.12);
      border: 2px dashed rgba(26, 20, 16, 0.55);
      transform: rotate(-3deg);
    }
    .offering img { width: 36px; height: 36px; filter: contrast(1.05) sepia(0.15); }
    .offering .god {
      display: block;
      font-family: "Caveat", cursive; font-size: 15px; font-weight: 700;
      color: #6b2a22; line-height: 1;
      margin-bottom: 2px;
    }
    .offering h3 {
      margin: 0 0 4px;
      font-family: "IM Fell English", serif; font-size: 17px; font-weight: 600;
      color: var(--ink); letter-spacing: 0.02em;
    }
    .offering p {
      margin: 0;
      font-family: "Cormorant Garamond", serif; font-size: 13px;
      color: #3a3024; line-height: 1.35;
    }
    .offering .ink-mark {
      position: absolute; bottom: 10px; right: 14px;
      font-family: "Caveat", cursive; font-size: 13px;
      color: rgba(107, 42, 34, 0.7); transform: rotate(6deg);
    }
    .offering[data-rarity="rare"] .ink-mark { color: #2a4a6e; }
    .offering[data-rarity="epic"] .ink-mark { color: #5a2a6e; }

    .offering:active { filter: drop-shadow(1px 2px 0 rgba(0, 0, 0, 0.7)); }
    .offering:active:nth-child(1) { transform: rotate(-1.8deg) translateX(-2%) scale(0.98); }
    .offering:active:nth-child(2) { transform: rotate(1.2deg) translateX(3%) scale(0.98); }
    .offering:active:nth-child(3) { transform: rotate(-0.9deg) translateX(-1%) scale(0.98); }

    .offering.selected {
      filter: drop-shadow(0 0 0 #d9b36c) drop-shadow(4px 6px 0 rgba(0, 0, 0, 0.85));
      z-index: 2;
    }
    .offering.selected .sheet {
      background:
        radial-gradient(ellipse at 30% 0%, rgba(255, 230, 160, 0.45), transparent 50%),
        linear-gradient(145deg, #e2c898 0%, #d4b06a 50%, #b89248 100%);
      box-shadow: inset 0 0 0 3px #6b2a22;
    }
    .offering.selected .cursor {
      position: absolute; left: -6px; top: 40%;
      font-size: 14px; color: #8b3a2e;
      text-shadow: 1px 1px 0 #e8dcc4;
      pointer-events: none;
    }

    /* 底栏：两张撕纸，与献礼同语汇；不要光泽圆钮 */
    .rite-bar {
      position: absolute; left: 0; right: 0; bottom: 5%;
      display: flex; align-items: flex-end; justify-content: center;
      gap: 18px; z-index: 8; pointer-events: none;
    }
    .rite-bar > * { pointer-events: auto; }

    .scrap {
      border: none; padding: 0; cursor: pointer;
      color: var(--ink);
      font-family: "Caveat", cursive; font-weight: 700;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(3px 4px 0 rgba(0, 0, 0, 0.75));
      transition: transform 80ms ease-out, filter 80ms step-end;
    }
    .scrap .face {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255, 240, 210, 0.3), transparent 50%),
        linear-gradient(150deg, #d8b888 0%, #c4a574 50%, #a88752 100%);
      box-shadow: inset 0 0 0 2px #1a1410;
      position: relative;
    }
    .scrap .face::after {
      content: "";
      position: absolute; inset: 0; pointer-events: none; opacity: 0.16;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }
    .scrap .label {
      position: relative; z-index: 1;
      line-height: 1.05; text-align: center;
    }
    .scrap .label em {
      display: block; font-style: normal;
      font-family: "IM Fell English", serif; font-size: 11px;
      letter-spacing: 0.14em; color: #5c4030; margin-top: 2px;
    }
    .scrap:active { filter: drop-shadow(1px 2px 0 rgba(0, 0, 0, 0.75)); }
    .scrap:disabled {
      opacity: 0.38; pointer-events: none; filter: grayscale(0.8);
    }

    /* 重抽：小撕角 */
    .scrap-reroll { transform: rotate(5deg); }
    .scrap-reroll .face {
      width: 64px; height: 58px;
      clip-path: polygon(6% 0%, 94% 5%, 100% 22%, 96% 90%, 78% 100%, 10% 96%, 0% 74%, 3% 14%);
    }
    .scrap-reroll .label { font-size: 22px; }
    .scrap-reroll:active { transform: rotate(5deg) scale(0.96); }

    /* 接受：大撕纸 + 暗红墨印，扁平手绘 */
    .scrap-accept { transform: rotate(-3deg); }
    .scrap-accept .face {
      width: 118px; min-height: 70px; padding: 10px 14px 12px;
      clip-path: polygon(
        2% 8%, 8% 0%, 40% 4%, 70% 0%, 94% 6%, 100% 18%,
        98% 78%, 92% 100%, 58% 96%, 28% 100%, 4% 92%, 0% 70%, 3% 30%
      );
    }
    .scrap-accept .ink-blot {
      position: absolute; left: 50%; top: 50%;
      width: 54px; height: 54px; transform: translate(-50%, -52%);
      border-radius: 42% 58% 50% 50% / 48% 42% 58% 52%;
      background: #6b2a22;
      opacity: 0.88;
      box-shadow: inset 0 0 0 2px rgba(26, 20, 16, 0.45);
      z-index: 0;
    }
    .scrap-accept .label {
      font-family: "IM Fell English", serif;
      font-size: 18px; letter-spacing: 0.18em;
      color: #f0e0c8; text-shadow: 1px 1px 0 #1a1410;
    }
    .scrap-accept .label em { color: rgba(240, 224, 200, 0.75); }
    .scrap-accept:active { transform: rotate(-3deg) scale(0.97); }

    /* 铭刻卷轴，不是 modal panel */
    .scroll {
      position: absolute; left: 50%; top: 30%; transform: translateX(-50%) rotate(-0.6deg);
      width: min(300px, 86%); z-index: 20;
      padding: 22px 20px 18px;
      background:
        linear-gradient(180deg, #e8d4a8 0%, #d2b888 100%);
      color: var(--ink);
      clip-path: polygon(
        0% 4%, 6% 0%, 94% 2%, 100% 8%, 98% 92%, 94% 100%, 6% 98%, 0% 90%
      );
      box-shadow: 6px 10px 0 rgba(0, 0, 0, 0.75);
      border: none;
    }
    .scroll[hidden] { display: none !important; }
    .scroll .scroll-title {
      font-family: "IM Fell English", serif; font-style: italic;
      font-size: 16px; color: #6b2a22; margin-bottom: 10px;
      border-bottom: 1px solid rgba(26, 20, 16, 0.25);
      padding-bottom: 6px;
    }
    .scroll .scroll-body {
      font-family: "Cormorant Garamond", serif; font-size: 15px; line-height: 1.5;
      white-space: pre-wrap;
    }
    .scroll .path-mark {
      margin-top: 16px; width: 100%; border: none; padding: 12px 8px;
      background: transparent;
      font-family: "Caveat", cursive; font-size: 22px; font-weight: 700;
      color: #6b2a22; cursor: pointer;
      text-decoration: underline; text-underline-offset: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .scroll .path-mark:active { opacity: 0.7; }

    .whisper {
      position: absolute; top: 48px; left: 10px; width: 44%;
      z-index: 8; pointer-events: none;
      font-family: "Caveat", cursive; font-size: 15px; color: var(--accent);
      text-shadow: 1px 1px 0 #000; transform: rotate(-3deg);
    }
    .whisper div {
      margin-bottom: 2px;
      animation: fadeWhisper 2s ease-out forwards;
    }
    @keyframes fadeWhisper { 0%, 65% { opacity: 1; } 100% { opacity: 0; } }

    .help-toggle {
      position: absolute; top: 48px; right: 10px; z-index: 16;
      width: auto; min-width: 40px; height: 28px; padding: 2px 10px;
      border: none; cursor: pointer;
      background: #c4a574; color: #1a1410;
      font-family: "Caveat", cursive; font-size: 16px; font-weight: 700;
      clip-path: polygon(0 18%, 12% 0, 100% 8%, 94% 100%, 8% 92%);
      box-shadow: 2px 2px 0 #000;
      transform: rotate(4deg);
      -webkit-tap-highlight-color: transparent;
    }
    .help-toggle:active { transform: rotate(4deg) scale(0.95); }
    .help {
      position: absolute; top: 84px; left: 14px; right: 14px; z-index: 15;
      padding: 10px 12px;
      font-family: "Cormorant Garamond", serif; font-size: 13px; line-height: 1.45;
      color: #2a2218; text-align: center;
      background: #d8b888;
      clip-path: polygon(2% 0, 100% 4%, 98% 100%, 0 94%);
      box-shadow: 3px 4px 0 #000;
      pointer-events: none; transform: rotate(-0.8deg);
    }
    .help[hidden] { display: none !important; }

    body.boon-locked .offering { pointer-events: none; opacity: 0.42; filter: grayscale(0.4); }
    body.boon-locked .offering.selected { opacity: 1; filter: drop-shadow(4px 6px 0 rgba(0, 0, 0, 0.85)); }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="stone-ledge" aria-hidden="true"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="altar">
        <img class="flame" src="../../assets/_shared/rpg-icons/fire.png" alt="" draggable="false" />
        <div class="place">冥府祭坛</div>
        <div class="room" id="room-label">密室 · 第 1 间</div>
      </div>
      <div class="prompt show" id="prompt">诸神注视着你</div>

      <div class="whisper" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">指引</button>
      <div class="help" id="help" hidden>点按一张羊皮纸献礼 · 按下墨印纸带走 · 撕角可重抽一次</div>

      <div class="boon-col" id="boon-nodes" role="listbox" aria-label="恩赐献礼"></div>

      <div class="rite-bar">
        <button type="button" class="scrap scrap-reroll" id="btn-reroll" aria-label="重新抽取，剩余 1 次">
          <span class="face"><span class="label">重抽<em>一次</em></span></span>
        </button>
        <button type="button" class="scrap scrap-accept" id="btn-confirm" aria-label="确认恩赐">
          <span class="face">
            <span class="ink-blot" aria-hidden="true"></span>
            <span class="label">接受<em>带走</em></span>
          </span>
        </button>
      </div>

      <div id="boon-result" class="scroll" hidden>
        <div class="scroll-title">恩赐铭刻</div>
        <div class="scroll-body" id="boon-text">—</div>
        <button type="button" class="path-mark" id="btn-continue">—— 踏入下一密室 ——</button>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    const ICON = "../../assets/_shared/rpg-icons/";
    const RARITY_MARK = { common: "凡赐", rare: "稀珍", epic: "神谕" };

    const POOL = [
      { god: "赫尔墨斯", name: "赫尔墨斯之击", desc: "冲刺攻击留下墨迹轨迹并追加伤害。", next: "利刃渴血 — 冲刺斩击攻速 +15%。", icon: "sword.png", rarity: "common" },
      { god: "雅典娜", name: "神盾守护", desc: "完美格挡治疗并击退附近敌人。", next: "神盾绽放 — 完美格挡每次恢复 8 生命。", icon: "shield.png", rarity: "rare" },
      { god: "混沌", name: "混沌余烬", desc: "特技轮换元素，击杀返还魔力。", next: "混沌涌动 — 特技冷却 −20%。", icon: "fire.png", rarity: "epic" },
      { god: "得墨忒耳", name: "花蜜啜饮", desc: "药水持续恢复生命。", next: "活力滴注 — 用药后 8 秒内每秒恢复 2 生命。", icon: "potion.png", rarity: "common" },
      { god: "阿尔忒弥斯", name: "月神之触", desc: "远程暴击穿透一名敌人。", next: "穿透射击 — 暴击以 50% 伤害连锁次目标。", icon: "bow.png", rarity: "rare" },
      { god: "赫淮斯托斯", name: "万能钥匙", desc: "解锁隐藏密室。", next: "本区域地图显示秘密通道。", icon: "key.png", rarity: "common" },
      { god: "阿瑞斯", name: "血债刀锋", desc: "受伤后短时攻速提升。", next: "怒血 — 受击后 3 秒内伤害 +20%。", icon: "sword.png", rarity: "rare" },
      { god: "波塞冬", name: "潮汐护符", desc: "冲刺溅起浪潮击退敌人。", next: "裂浪 — 冲刺命中回复 1 点魔力。", icon: "potion.png", rarity: "epic" },
    ];

    let room = 1;
    let rerollsLeft = 1;
    let selectedId = null;
    let locked = false;
    let currentIds = [];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function feed(msg) {
      const el = document.createElement("div");
      el.textContent = msg;
      sk.$("#feed").prepend(el);
      setTimeout(() => el.remove(), 2000);
    }

    function setPrompt(text, ms) {
      const p = sk.$("#prompt");
      sk.setText(p, text);
      p.classList.add("show");
      clearTimeout(setPrompt._t);
      if (ms) setPrompt._t = setTimeout(() => p.classList.remove("show"), ms);
    }

    function updateRerollBtn() {
      const btn = sk.$("#btn-reroll");
      const label = btn.querySelector(".label");
      if (rerollsLeft <= 0) {
        btn.disabled = true;
        if (label) label.innerHTML = "用尽<em>无</em>";
        btn.setAttribute("aria-label", "重抽已用尽");
      } else {
        btn.disabled = locked;
        if (label) label.innerHTML = "重抽<em>一次</em>";
        btn.setAttribute("aria-label", "重新抽取，剩余 " + rerollsLeft + " 次");
      }
    }

    function selectCard(btn) {
      if (locked || !btn) return;
      sk.$all(".offering").forEach((c) => {
        c.classList.remove("selected");
        const cur = c.querySelector(".cursor");
        if (cur) cur.remove();
      });
      btn.classList.add("selected");
      const mark = document.createElement("span");
      mark.className = "cursor";
      mark.setAttribute("aria-hidden", "true");
      mark.textContent = "❧";
      btn.appendChild(mark);
      selectedId = btn.dataset.id;
      const name = btn.querySelector("h3").textContent;
      sk.pulse(btn);
      feed(name);
      setPrompt(name, 1400);
    }

    function renderBoons(ids) {
      const col = sk.$("#boon-nodes");
      col.innerHTML = "";
      ids.forEach((id, i) => {
        const b = POOL[id];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "offering";
        btn.dataset.id = String(id);
        btn.dataset.rarity = b.rarity;
        btn.setAttribute("role", "option");
        btn.setAttribute("aria-label", b.god + " · " + b.name);
        btn.innerHTML =
          '<span class="tape" aria-hidden="true"></span>' +
          '<span class="sheet">' +
            '<span class="stamp"><img src="' + ICON + b.icon + '" alt="" draggable="false" /></span>' +
            '<span class="meta"><span class="god">' + b.god + "</span><h3>" + b.name + "</h3><p>" + b.desc + "</p></span>" +
            '<span class="ink-mark">' + RARITY_MARK[b.rarity] + "</span>" +
          "</span>";
        sk.on(btn, "click", () => selectCard(btn));
        col.appendChild(btn);
        if (i === 1) selectCard(btn);
      });
    }

    function dealRoom() {
      locked = false;
      document.body.classList.remove("boon-locked");
      sk.$("#btn-confirm").disabled = false;
      sk.$("#boon-result").hidden = true;
      rerollsLeft = 1;
      currentIds = shuffle([...POOL.keys()]).slice(0, 3);
      sk.setText(sk.$("#room-label"), "密室 · 第 " + room + " 间");
      renderBoons(currentIds);
      updateRerollBtn();
      setPrompt(room === 1 ? "诸神注视着你" : "新的道路", 1600);
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.on(sk.$("#btn-confirm"), "click", () => {
      if (locked) return;
      if (selectedId == null) { feed("先择一纸"); return; }
      const b = POOL[parseInt(selectedId, 10)];
      locked = true;
      document.body.classList.add("boon-locked");
      sk.$("#btn-confirm").disabled = true;
      updateRerollBtn();
      sk.setText(sk.$("#boon-text"), b.god + " 赐予「" + b.name + "」。\n" + b.next);
      sk.$("#boon-result").hidden = false;
      feed("已铭刻");
      setPrompt("命运已定", 1600);
      sk.$("#vignette").classList.add("on");
      setTimeout(() => sk.$("#vignette").classList.remove("on"), 400);
    });

    sk.on(sk.$("#btn-reroll"), "click", () => {
      if (locked || rerollsLeft <= 0) return;
      rerollsLeft -= 1;
      currentIds = shuffle([...POOL.keys()]).slice(0, 3);
      renderBoons(currentIds);
      updateRerollBtn();
      feed("撕角重抽");
      setPrompt("新的道路", 1400);
    });

    sk.on(sk.$("#btn-continue"), "click", () => {
      room += 1;
      dealRoom();
      feed("第 " + room + " 间");
    });

    dealRoom();
  </script>
</body>
</html>
