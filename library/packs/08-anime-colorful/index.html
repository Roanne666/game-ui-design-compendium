<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>动漫彩色 — 菜单与战斗指令</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Noto+Sans+SC:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>斜切菜单进战斗 · 底栏点指令 · 设置/读档用屏幕按钮关闭</div>
      <div class="whisper" id="whisper" aria-live="polite"></div>

      <div id="menu-root">
        <div class="brand">
          <div class="mark"><span>CHAPTER 04</span></div>
          <h1>幻影之刃</h1>
          <div class="chap">怪盗 · 菜单栈</div>
        </div>
        <div class="menu-stack">
          <button type="button" class="slash primary" id="btn-start" aria-label="开始">
            <img src="./assets/icons/icon-start.png" alt="" draggable="false" /><span>开始</span>
          </button>
          <button type="button" class="slash" id="btn-load" aria-label="读取">
            <img src="./assets/icons/icon-load.png" alt="" draggable="false" /><span>读取</span>
          </button>
          <button type="button" class="slash" id="btn-config" aria-label="设置">
            <img src="./assets/icons/icon-gear.png" alt="" draggable="false" /><span>设置</span>
          </button>
          <button type="button" class="slash" id="btn-exit" aria-label="退出">
            <img src="./assets/icons/icon-exit.png" alt="" draggable="false" /><span>退出</span>
          </button>
        </div>
      </div>

      <div id="battle-layer" hidden>
        <div class="log-line" id="battle-log">点按指令条行动</div>
        <div class="battle-stage">
          <div class="foe-plate" id="foe-card">
            <img src="./assets/foe-shadow.png" alt="" draggable="false" />
            <div class="name" id="foe-name">影狼</div>
            <div class="hp"><i id="foe-hp-fill" style="width:100%"></i></div>
          </div>
          <div class="party-board">
            <div class="row">
              <span class="lab">幻影</span>
              <div class="trk"><i id="hero-hp-fill" style="width:100%"></i></div>
              <span class="val" id="hero-hp-val">72</span>
            </div>
            <div class="row">
              <span class="lab">技力</span>
              <div class="trk mp"><i id="hero-mp-fill" style="width:55%"></i></div>
              <span class="val" id="hero-mp-val">22</span>
            </div>
          </div>
        </div>
        <div class="cmd-rail">
          <button type="button" class="cmd primary" id="cmd-atk" aria-label="攻击">
            <img src="./assets/icons/icon-atk.png" alt="" draggable="false" /><span>攻击</span>
          </button>
          <button type="button" class="cmd" id="cmd-skill" aria-label="技能">
            <img src="./assets/icons/icon-skill.png" alt="" draggable="false" /><span>技能</span>
          </button>
          <button type="button" class="cmd" id="cmd-item" aria-label="道具">
            <img src="./assets/icons/icon-item.png" alt="" draggable="false" /><span>道具</span>
          </button>
          <button type="button" class="cmd danger" id="cmd-run" aria-label="逃跑">
            <img src="./assets/icons/icon-run.png" alt="" draggable="false" /><span>逃跑</span>
          </button>
        </div>
      </div>

      <div id="config-panel" class="slash-sheet" hidden>
        <div class="sheet-title">设置</div>
        <div class="toggle-row"><span>语音台词</span><button type="button" class="tog on" data-toggle="voice" data-on="true">开</button></div>
        <div class="toggle-row"><span>战斗动画</span><button type="button" class="tog" data-toggle="anim" data-on="false">关</button></div>
        <div class="toggle-row"><span>自动保存</span><button type="button" class="tog on" data-toggle="save" data-on="true">开</button></div>
        <button type="button" class="sheet-line ghost" id="config-close" style="margin-top:12px">关闭</button>
      </div>

      <div id="load-overlay" hidden>
        <div class="slash-sheet">
          <div class="sheet-title">读取存档</div>
          <button type="button" class="sheet-line" data-slot="1">槽位 1 · 米德加 14:32</button>
          <button type="button" class="sheet-line" data-slot="2">槽位 2 · 空</button>
          <button type="button" class="sheet-line ghost" id="load-close">取消</button>
        </div>
      </div>

      <div id="loading-overlay" hidden>
        <div class="slash-sheet" style="text-align:center">
          <div class="sheet-title">加载中</div>
          <div class="load-bar"><i id="load-bar"></i></div>
          <span class="load-status" id="load-status">正在准备资源…</span>
        </div>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    const state = { heroHp: 72, heroHpMax: 72, heroMp: 22, heroMpMax: 40, foeHp: 40, foeHpMax: 40, busy: false, potions: 2 };

    function whisper(msg) {
      const el = sk.$("#whisper");
      sk.setText(el, msg);
      clearTimeout(whisper._t);
      whisper._t = setTimeout(() => sk.setText(el, ""), 1600);
    }

    function syncBars() {
      sk.$("#hero-hp-fill").style.width = ((state.heroHp / state.heroHpMax) * 100) + "%";
      sk.setText(sk.$("#hero-hp-val"), String(state.heroHp));
      sk.$("#hero-mp-fill").style.width = ((state.heroMp / state.heroMpMax) * 100) + "%";
      sk.setText(sk.$("#hero-mp-val"), String(state.heroMp));
      sk.$("#foe-hp-fill").style.width = ((state.foeHp / state.foeHpMax) * 100) + "%";
    }
    function setLog(msg) { sk.setText(sk.$("#battle-log"), msg); }
    function setBusy(on) {
      state.busy = on;
      sk.$all(".cmd").forEach((c) => { c.disabled = on; });
    }

    function enterBattle() {
      Object.assign(state, { heroHp: 72, heroMp: 22, foeHp: 40, potions: 2, busy: false });
      sk.$("#menu-root").hidden = true;
      sk.$("#battle-layer").hidden = false;
      setBusy(false);
      syncBars();
      setLog("遭遇影狼！选择指令");
    }
    function returnMenu(msg) {
      sk.$("#battle-layer").hidden = true;
      sk.$("#menu-root").hidden = false;
      setBusy(false);
      if (msg) whisper(msg);
    }
    function foeTurn() {
      if (state.foeHp <= 0) return;
      const dmg = 6 + Math.floor(Math.random() * 5);
      state.heroHp = Math.max(0, state.heroHp - dmg);
      syncBars();
      setLog("影狼反击 −" + dmg);
      sk.$("#vignette").classList.add("on");
      setTimeout(() => sk.$("#vignette").classList.remove("on"), 280);
      if (state.heroHp <= 0) {
        setBusy(true);
        setLog("幻影倒下了…");
        setTimeout(() => returnMenu("战斗失败，回到标题"), 700);
      } else setBusy(false);
    }
    function afterPlayerAct(msg) {
      setLog(msg); syncBars();
      if (state.foeHp <= 0) {
        setBusy(true);
        setLog("影狼倒下！胜利");
        setTimeout(() => returnMenu("章节继续…"), 800);
        return;
      }
      setTimeout(foeTurn, 420);
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.on(sk.$("#cmd-atk"), "click", () => {
      if (state.busy || sk.$("#battle-layer").hidden) return;
      setBusy(true);
      const dmg = 9 + Math.floor(Math.random() * 6);
      state.foeHp = Math.max(0, state.foeHp - dmg);
      sk.pulse(sk.$("#foe-card"));
      afterPlayerAct("攻击命中 −" + dmg);
    });
    sk.on(sk.$("#cmd-skill"), "click", () => {
      if (state.busy || sk.$("#battle-layer").hidden) return;
      if (state.heroMp < 8) { whisper("技力不足"); return; }
      setBusy(true); state.heroMp -= 8;
      const dmg = 16 + Math.floor(Math.random() * 5);
      state.foeHp = Math.max(0, state.foeHp - dmg);
      sk.pulse(sk.$("#foe-card"));
      afterPlayerAct("幻影斩 −" + dmg);
    });
    sk.on(sk.$("#cmd-item"), "click", () => {
      if (state.busy || sk.$("#battle-layer").hidden) return;
      if (state.potions <= 0) { whisper("没有恢复药"); return; }
      setBusy(true); state.potions -= 1;
      state.heroHp = Math.min(state.heroHpMax, state.heroHp + 18);
      afterPlayerAct("使用恢复药 +18（剩 " + state.potions + "）");
    });
    sk.on(sk.$("#cmd-run"), "click", () => {
      if (state.busy || sk.$("#battle-layer").hidden) return;
      if (Math.random() < 0.55) returnMenu("成功逃跑");
      else { setBusy(true); setLog("逃跑失败！"); setTimeout(foeTurn, 380); }
    });

    sk.on(sk.$("#btn-config"), "click", () => { sk.$("#config-panel").hidden = false; });
    sk.on(sk.$("#config-close"), "click", () => { sk.$("#config-panel").hidden = true; });
    sk.$all("[data-toggle]").forEach((btn) => {
      sk.on(btn, "click", () => {
        const on = btn.dataset.on !== "true";
        btn.dataset.on = String(on);
        btn.textContent = on ? "开" : "关";
        btn.classList.toggle("on", on);
      });
    });
    sk.on(sk.$("#btn-load"), "click", () => { sk.$("#load-overlay").hidden = false; });
    sk.on(sk.$("#load-close"), "click", () => { sk.$("#load-overlay").hidden = true; });
    sk.$all("[data-slot]").forEach((btn) => {
      sk.on(btn, "click", () => {
        sk.$("#load-overlay").hidden = true;
        if (btn.dataset.slot === "2") whisper("空槽位");
        else enterBattle();
      });
    });
    sk.on(sk.$("#btn-start"), "click", () => {
      const overlay = sk.$("#loading-overlay");
      const bar = sk.$("#load-bar");
      overlay.hidden = false;
      let pct = 0;
      bar.style.width = "0%";
      const tick = setInterval(() => {
        pct += 10 + Math.floor(Math.random() * 8);
        if (pct >= 100) {
          clearInterval(tick);
          bar.style.width = "100%";
          overlay.hidden = true;
          enterBattle();
        } else bar.style.width = pct + "%";
      }, 100);
    });
    sk.on(sk.$("#btn-exit"), "click", () => {
      sk.modal({ title: "退出游戏？", body: "未保存进度将会丢失。", onConfirm: () => whisper("感谢游玩！") });
    });
  </script>
</body>
</html>
