<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生存恐怖 — 稀疏探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <style>
    .game-root {
      --bg: #070605;
      --surface: rgba(14, 12, 11, 0.94);
      --text: #d8d0bc;
      --text-muted: #6a6660;
      --accent: #3b5570;
      --accent-2: #d89830;
      --border: #4a6480;
      --font-display: "Allerta Stencil", sans-serif;
      --font-body: "Courier Prime", monospace;
      --phone-border-color: rgba(59, 85, 112, 0.45);
      --phone-shadow-inset: inset 0 0 0 1px rgba(59, 85, 112, 0.2);
    }

    .game-world {
      background: var(--bg) center top / cover no-repeat;
      background-image: url("./assets/corridor-bg.png");
    }
    .game-world::before {
      opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }
    .game-world::after {
      box-shadow: inset 0 0 90px 28px rgba(0, 0, 0, 0.62);
    }

    .door-hotspot {
      appearance: none; -webkit-appearance: none;
      position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
      width: min(38%, 118px); height: min(34%, 210px);
      padding: 0; margin: 0; outline: none;
      border: 1px solid transparent;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 3;
    }
    .door-hotspot img {
      display: none;
    }
    .door-hotspot:active { transform: translate(-50%, -50%) scale(0.98); }
    .door-hotspot.near {
      border-color: rgba(216, 152, 48, 0.4);
      box-shadow: 0 0 28px rgba(216, 152, 48, 0.14);
    }

    .ctx-prompt {
      position: absolute; left: 50%; top: 58%; transform: translateX(-50%);
      opacity: 0; transition: opacity 200ms ease-out;
      font-family: var(--font-display); font-size: 11px; letter-spacing: 0.28em;
      color: rgba(216, 208, 188, 0.62); text-shadow: 0 1px 8px #000;
      pointer-events: none; z-index: 4; text-transform: uppercase;
    }
    .ctx-prompt.show { opacity: 1; }

    .place-tag {
      position: absolute; left: 50%; top: 52px; transform: translateX(-50%);
      z-index: 4; pointer-events: none;
      font-family: var(--font-display); font-size: 10px; letter-spacing: 0.32em;
      color: rgba(140, 165, 185, 0.72); text-transform: uppercase;
      text-shadow: 0 1px 10px #000;
    }

    /* 底中：RIG 挂件 */
    .bag-entry {
      appearance: none; -webkit-appearance: none;
      position: absolute; left: 50%; bottom: 28px; transform: translateX(-50%);
      width: 58px; height: 58px; min-width: 48px; min-height: 48px;
      padding: 0; margin: 0; outline: none;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 6;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.7));
    }
    .bag-entry img {
      width: 100%; height: 100%; object-fit: contain;
      pointer-events: none;
    }
    .bag-entry .dot {
      position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; border-radius: 50%;
      background: var(--danger); box-shadow: 0 0 8px var(--danger);
    }
    .bag-entry:active { transform: translateX(-50%) scale(0.94); }

    #inv-modal[hidden] { display: none !important; }
    #inv-modal {
      position: absolute; inset: 0; z-index: 25;
      background:
        radial-gradient(ellipse at 50% 70%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.88));
      display: flex; align-items: flex-end; justify-content: center;
      padding: 8px 8px 18px;
    }

    /* diegetic 公文包：材质来自生成板，不是网页 .panel */
    .rig-wrap {
      width: min(94%, 340px);
      display: flex; flex-direction: column; gap: 8px;
      max-height: 92%;
    }
    .rig {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      flex: 0 0 auto;
      padding: 0;
      overflow: visible;
      background: url("./assets/rig-case.png") center / contain no-repeat;
      border: none;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
    }
    .rig-stamp {
      position: absolute; left: 18%; right: 18%; top: 7%;
      z-index: 2; pointer-events: none;
      font-family: var(--font-display); font-size: 10px; letter-spacing: 0.34em;
      color: rgba(216, 208, 188, 0.55); text-align: center;
      text-transform: uppercase; text-shadow: 0 1px 6px #000;
    }
    .spine-row {
      position: absolute; left: 18%; right: 18%; top: 30%;
      z-index: 2;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 6px 8px;
      background: rgba(8, 8, 6, 0.45);
      border: 1px solid rgba(59, 85, 112, 0.3);
      clip-path: polygon(0 5px, 5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%);
    }
    .spine-row .spine-label {
      flex: 0 0 auto;
      font-family: var(--font-display); font-size: 9px; letter-spacing: 0.28em;
      color: rgba(91, 125, 160, 0.75);
      writing-mode: horizontal-tb;
    }
    .spine-row .spine-bar {
      flex: 1; max-width: 220px;
      display: flex; flex-direction: row; align-items: center; justify-content: center;
      gap: 3px;
    }
    .spine-row .spine-bar .spine-seg {
      flex: 1; width: auto; height: 8px; min-width: 0;
    }
    .spine-row .hp-read {
      flex: 0 0 auto;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em;
      color: rgba(216, 208, 188, 0.5);
    }

    /* 泡棉井坐标：对 rig-case.png 洪水填充实测（相对整图 %） */
    .inv-grid {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0; margin: 0;
    }
    .slot {
      appearance: none; -webkit-appearance: none;
      position: absolute;
      pointer-events: auto;
      padding: 2px; margin: 0; outline: none;
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
      color: var(--text);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    /* row0 */
    .slot:nth-child(1) { left: 14.65%; top: 47.98%; width: 15.72%; height: 12.70%; }
    .slot:nth-child(2) { left: 34.47%; top: 47.98%; width: 14.26%; height: 12.70%; }
    .slot:nth-child(3) { left: 52.83%; top: 47.98%; width: 14.75%; height: 12.70%; }
    .slot:nth-child(4) { left: 71.00%; top: 47.98%; width: 14.75%; height: 12.70%; }
    /* row1 */
    .slot:nth-child(5) { left: 12.79%; top: 63.22%; width: 16.41%; height: 16.28%; }
    .slot:nth-child(6) { left: 33.50%; top: 63.22%; width: 15.04%; height: 16.28%; }
    .slot:nth-child(7) { left: 53.03%; top: 63.28%; width: 15.53%; height: 16.21%; }
    .slot:nth-child(8) { left: 72.27%; top: 63.22%; width: 15.72%; height: 16.28%; }
    .slot.has { border-color: transparent; }
    .slot.selected {
      border-color: rgba(216, 152, 48, 0.75);
      box-shadow: inset 0 0 0 1px rgba(216, 152, 48, 0.3), 0 0 10px rgba(216, 152, 48, 0.15);
    }
    .slot img {
      width: 78%; height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.75));
      pointer-events: none;
    }
    .slot .qty {
      position: absolute; right: 4%; bottom: 4%;
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.04em;
      color: rgba(216, 208, 188, 0.9); text-shadow: 0 1px 3px #000;
      pointer-events: none;
    }

    .rig-deck {
      flex: 0 0 auto;
      padding: 8px 6px 4px;
      background: linear-gradient(180deg, rgba(22, 20, 18, 0.92), rgba(10, 10, 8, 0.96));
      border: 1px solid rgba(59, 85, 112, 0.45);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
      clip-path: polygon(0 6px, 6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%);
    }
    .sel-line {
      font-family: var(--font-display); font-size: 9px; letter-spacing: 0.22em;
      color: rgba(216, 208, 188, 0.42); margin-bottom: 6px;
      min-height: 1em; text-transform: uppercase; text-align: center;
    }
    .sel-line strong { color: rgba(216, 208, 188, 0.85); font-weight: 400; letter-spacing: 0.14em; }

    .rig-actions {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;
    }
    .rig-line {
      appearance: none; -webkit-appearance: none;
      width: 100%; min-height: 40px; padding: 7px 3px; margin: 0; outline: none;
      background:
        linear-gradient(180deg, rgba(52, 48, 42, 0.95) 0%, rgba(22, 20, 18, 0.98) 45%, rgba(12, 12, 10, 1) 100%);
      border: 1px solid rgba(90, 100, 110, 0.55);
      color: rgba(216, 208, 188, 0.88);
      font-family: var(--font-display); font-size: 10px; letter-spacing: 0.16em;
      text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      clip-path: polygon(0 5px, 5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%);
      box-shadow:
        inset 0 1px 0 rgba(216, 208, 188, 0.12),
        inset 0 -2px 0 rgba(0, 0, 0, 0.45),
        0 4px 10px rgba(0, 0, 0, 0.5);
    }
    .rig-line:active {
      border-color: rgba(216, 152, 48, 0.45);
      background: rgba(59, 85, 112, 0.4);
      transform: translateY(1px);
    }
    .rig-line.hazard {
      border-color: rgba(160, 56, 56, 0.65);
      color: #c87878;
      background: linear-gradient(180deg, rgba(48, 24, 22, 0.95), rgba(18, 10, 10, 0.98));
    }
    .rig-line.ghost {
      grid-column: 1 / -1;
      color: rgba(216, 208, 188, 0.42);
      background: linear-gradient(180deg, rgba(24, 22, 20, 0.75), rgba(8, 8, 6, 0.9));
      border-color: rgba(90, 90, 85, 0.4);
      min-height: 36px;
      letter-spacing: 0.28em;
    }

    .feed {
      position: absolute; top: 48px; left: 12px; width: 58%;
      z-index: 8; pointer-events: none;
      font-family: var(--font-body); font-size: 12px; letter-spacing: 0.04em;
      color: rgba(216, 208, 188, 0.7); text-shadow: 0 1px 6px #000;
    }
    .feed div {
      margin-bottom: 3px; padding: 0;
      background: none; border: none;
      animation: fadeFeed 2.4s ease-out forwards;
    }
    @keyframes fadeFeed { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }

    .help-toggle {
      appearance: none; -webkit-appearance: none;
      position: absolute; top: 46px; right: 12px; z-index: 16;
      width: 30px; height: 30px; padding: 0; margin: 0; outline: none;
      border: 1px solid rgba(74, 100, 128, 0.5);
      background: rgba(8, 6, 6, 0.7);
      color: var(--text-muted);
      font-family: var(--font-display); font-size: 13px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .help-toggle:active { transform: scale(0.94); color: var(--text); }
    .help {
      position: absolute; top: 86px; left: 12px; right: 12px; z-index: 15;
      padding: 10px 12px; text-align: center;
      font-family: var(--font-body); font-size: 11px; line-height: 1.5;
      letter-spacing: 0.04em; color: var(--text-muted);
      background: rgba(8, 6, 6, 0.92);
      border: 1px solid rgba(74, 100, 128, 0.4);
      pointer-events: none;
    }
    .help[hidden] { display: none !important; }

    .exit-note {
      position: absolute; left: 50%; top: 34%; transform: translate(-50%, -50%);
      width: min(86%, 300px); z-index: 30;
      padding: 18px 16px 14px;
      background: rgba(12, 12, 10, 0.96);
      border: 1px solid rgba(74, 100, 128, 0.65);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
      text-align: center;
    }
    .exit-note[hidden] { display: none !important; }
    .exit-note h3 {
      margin: 0 0 10px; font-family: var(--font-display);
      font-size: 12px; letter-spacing: 0.28em; color: var(--accent-2);
      font-weight: 400; text-transform: uppercase;
    }
    .exit-note p {
      margin: 0 0 14px; font-family: var(--font-body);
      font-size: 13px; line-height: 1.5; color: var(--text);
    }
    .exit-note .rig-line { width: 100%; }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="place-tag">维修通道 · B-07</div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>几乎无常驻界面 · 点门锁检查 · 底中打开脊骨背包 · 钥匙在包内 · 受伤时角标闪红</div>

      <button type="button" class="door-hotspot near" id="btn-world-door" aria-label="检查门锁"></button>
      <div class="ctx-prompt show" id="ctx">检查门锁</div>

      <button type="button" class="bag-entry" id="btn-bag" aria-label="打开脊骨背包">
        <img src="./assets/icons/icon-bag.png" alt="" draggable="false" />
        <span class="dot" id="bag-dot" hidden></span>
      </button>

      <div id="inv-modal" hidden>
        <div class="rig-wrap">
          <div class="rig" role="dialog" aria-label="脊骨背包">
            <div class="rig-stamp">RIG · 脊骨箱</div>
            <div class="spine-row" aria-label="脊骨体征">
              <span class="spine-label">脊骨</span>
              <div class="spine-bar" id="spine-bar"></div>
              <span class="hp-read" id="hp-label">72%</span>
            </div>
            <div class="inv-grid" id="inv">
              <button type="button" class="slot has" data-item="med" data-qty="2" data-label="医疗包">
                <img src="./assets/icons/icon-med.png" alt="" draggable="false" /><span class="qty">×2</span>
              </button>
              <button type="button" class="slot has" data-item="key" data-qty="1" data-label="黄铜钥匙">
                <img src="./assets/icons/icon-key.png" alt="" draggable="false" /><span class="qty">×1</span>
              </button>
              <button type="button" class="slot has" data-item="knife" data-qty="1" data-label="生存刀">
                <img src="./assets/icons/icon-knife.png" alt="" draggable="false" />
              </button>
              <button type="button" class="slot has" data-item="ammo" data-qty="12" data-label="9mm 子弹">
                <img src="./assets/icons/icon-ammo.png" alt="" draggable="false" /><span class="qty">×12</span>
              </button>
              <button type="button" class="slot has" data-item="shield" data-qty="1" data-label="破损护板">
                <img src="./assets/icons/icon-shield.png" alt="" draggable="false" />
              </button>
              <button type="button" class="slot" aria-label="空槽"></button>
              <button type="button" class="slot" aria-label="空槽"></button>
              <button type="button" class="slot" aria-label="空槽"></button>
            </div>
          </div>
          <div class="rig-deck">
            <div class="sel-line">已选 <strong id="sel-name">—</strong></div>
            <div class="rig-actions">
              <button type="button" class="rig-line" id="btn-use">使用</button>
              <button type="button" class="rig-line" id="btn-door">开门</button>
              <button type="button" class="rig-line hazard" id="btn-hurt">受伤</button>
              <button type="button" class="rig-line ghost" id="btn-close-bag">合上箱盖</button>
            </div>
          </div>
        </div>
      </div>

      <div class="exit-note" id="exit-note" hidden>
        <h3>维修通道出口</h3>
        <p>钥匙湿漉漉地转动了。冷空气涌了进来。</p>
        <button type="button" class="rig-line" id="btn-exit-ok">确认</button>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let hp = 72;
    let selectedSlot = null;
    const SEGMENTS = 10;

    function feed(msg) {
      const el = document.createElement("div");
      el.textContent = msg;
      sk.$("#feed").prepend(el);
      setTimeout(() => el.remove(), 2400);
    }

    function flashVignette() {
      const v = sk.$("#vignette");
      v.classList.add("on");
      setTimeout(() => v.classList.remove("on"), 400);
    }

    function renderSpine() {
      const bar = sk.$("#spine-bar");
      bar.innerHTML = "";
      const lit = Math.round((hp / 100) * SEGMENTS);
      for (let i = 0; i < SEGMENTS; i++) {
        const seg = document.createElement("div");
        seg.className = "spine-seg";
        if (i < lit) {
          if (hp <= 25) seg.classList.add("danger");
          else if (hp <= 50) seg.classList.add("warn");
          else seg.classList.add("on");
        }
        bar.appendChild(seg);
      }
      sk.setText(sk.$("#hp-label"), hp + "%");
      sk.$("#bag-dot").hidden = hp > 35;
    }

    function openBag() {
      sk.$("#inv-modal").hidden = false;
      sk.$("#ctx").classList.remove("show");
      renderSpine();
    }

    function closeBag() {
      sk.$("#inv-modal").hidden = true;
      selectedSlot = null;
      sk.$all(".slot").forEach((s) => s.classList.remove("selected"));
      sk.setText(sk.$("#sel-name"), "—");
      sk.$("#ctx").classList.add("show");
    }

    function tryDoor() {
      const hasKey = sk.$('.slot[data-item="key"].has');
      if (hasKey) {
        feed("锁芯转动了");
        sk.$("#exit-note").hidden = false;
      } else {
        feed("上锁 — 需要黄铜钥匙");
        flashVignette();
      }
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.on(sk.$("#btn-bag"), "click", openBag);
    sk.on(sk.$("#btn-close-bag"), "click", closeBag);
    sk.on(sk.$("#inv-modal"), "click", (e) => {
      if (e.target === sk.$("#inv-modal")) closeBag();
    });
    sk.on(sk.$("#btn-world-door"), "click", tryDoor);
    sk.on(sk.$("#btn-exit-ok"), "click", () => {
      sk.$("#exit-note").hidden = true;
      feed("检查点已写入");
    });

    sk.bindSlots("#inv", (slot) => {
      sk.$all(".slot").forEach((s) => s.classList.remove("selected"));
      if (!slot.classList.contains("has")) {
        sk.setText(sk.$("#sel-name"), "空槽位");
        selectedSlot = null;
        return;
      }
      slot.classList.add("selected");
      selectedSlot = slot;
      sk.setText(sk.$("#sel-name"), slot.dataset.label + (slot.dataset.qty ? " ×" + slot.dataset.qty : ""));
    });

    function consumeOne(slot) {
      let q = parseInt(slot.dataset.qty || "1", 10);
      q -= 1;
      if (q <= 0) {
        slot.classList.remove("has", "selected");
        slot.innerHTML = "";
        slot.removeAttribute("data-item");
        slot.removeAttribute("data-qty");
        slot.removeAttribute("data-label");
        selectedSlot = null;
        sk.setText(sk.$("#sel-name"), "—");
      } else {
        slot.dataset.qty = String(q);
        const qtyEl = slot.querySelector(".qty");
        if (qtyEl) qtyEl.textContent = "×" + q;
      }
    }

    sk.on(sk.$("#btn-use"), "click", () => {
      if (!selectedSlot || !selectedSlot.dataset.item) { feed("先选一格"); return; }
      if (selectedSlot.dataset.item === "med") {
        hp = Math.min(100, hp + 18);
        renderSpine();
        consumeOne(selectedSlot);
        feed("包扎 +18");
        sk.pulse(sk.$("#spine-bar"));
      } else if (selectedSlot.dataset.item === "key") {
        feed("钥匙留着开门用");
      } else {
        feed("现在用不了");
      }
    });

    sk.on(sk.$("#btn-door"), "click", tryDoor);

    sk.on(sk.$("#btn-hurt"), "click", () => {
      hp = Math.max(0, hp - 15);
      renderSpine();
      flashVignette();
      feed(hp <= 0 ? "生命体征衰竭" : "剧痛 −15%");
    });

    renderSpine();
  </script>
</body>
</html>
