<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生存恐怖 — 稀疏探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="place-tag">维修通道 · B-07</div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>几乎无常驻界面 · 点门锁检查 · 底中打开脊骨背包 · 钥匙在包内 · 受伤时角标闪红</div>

      <button type="button" class="door-hotspot near" id="btn-world-door" aria-label="检查门锁"></button>
      <div class="ctx-prompt show" id="ctx">检查门锁</div>

      <button type="button" class="bag-entry" id="btn-bag" aria-label="打开脊骨背包">
        <img src="./assets/icons/icon-bag.png" alt="" draggable="false" />
        <span class="dot" id="bag-dot" hidden></span>
      </button>

      <div id="inv-modal" hidden>
        <div class="rig-wrap">
          <div class="rig" role="dialog" aria-label="脊骨背包">
            <div class="rig-stamp">RIG · 脊骨箱</div>
            <div class="spine-row" aria-label="脊骨体征">
              <span class="spine-label">脊骨</span>
              <div class="spine-bar" id="spine-bar"></div>
              <span class="hp-read" id="hp-label">72%</span>
            </div>
            <div class="inv-grid" id="inv">
              <button type="button" class="slot has" data-item="med" data-qty="2" data-label="医疗包">
                <img src="./assets/icons/icon-med.png" alt="" draggable="false" /><span class="qty">×2</span>
              </button>
              <button type="button" class="slot has" data-item="key" data-qty="1" data-label="黄铜钥匙">
                <img src="./assets/icons/icon-key.png" alt="" draggable="false" /><span class="qty">×1</span>
              </button>
              <button type="button" class="slot has" data-item="knife" data-qty="1" data-label="生存刀">
                <img src="./assets/icons/icon-knife.png" alt="" draggable="false" />
              </button>
              <button type="button" class="slot has" data-item="ammo" data-qty="12" data-label="9mm 子弹">
                <img src="./assets/icons/icon-ammo.png" alt="" draggable="false" /><span class="qty">×12</span>
              </button>
              <button type="button" class="slot has" data-item="shield" data-qty="1" data-label="破损护板">
                <img src="./assets/icons/icon-shield.png" alt="" draggable="false" />
              </button>
              <button type="button" class="slot" aria-label="空槽"></button>
              <button type="button" class="slot" aria-label="空槽"></button>
              <button type="button" class="slot" aria-label="空槽"></button>
            </div>
          </div>
          <div class="rig-deck">
            <div class="sel-line">已选 <strong id="sel-name">—</strong></div>
            <div class="rig-actions">
              <button type="button" class="rig-line" id="btn-use">使用</button>
              <button type="button" class="rig-line" id="btn-door">开门</button>
              <button type="button" class="rig-line hazard" id="btn-hurt">受伤</button>
              <button type="button" class="rig-line ghost" id="btn-close-bag">合上箱盖</button>
            </div>
          </div>
        </div>
      </div>

      <div class="exit-note" id="exit-note" hidden>
        <h3>维修通道出口</h3>
        <p>钥匙湿漉漉地转动了。冷空气涌了进来。</p>
        <button type="button" class="rig-line" id="btn-exit-ok">确认</button>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script src="./scene.js"></script>
</body>
</html>
