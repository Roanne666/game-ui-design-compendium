<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>06 卡通漫画 — 单一大拍键</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root" id="root">
    <div class="game-world"></div>
    <div class="speed-lines" aria-hidden="true"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud" id="hud">
      <div class="stamp-bar">
        <div class="stamp combo" aria-label="连击">
          <span class="lab">连击</span>
          <span class="num" id="combo">0</span>
        </div>
        <div class="stamp score" aria-label="分数">
          <span class="lab">分数</span>
          <span class="num" id="score">000</span>
        </div>
      </div>

      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>目标驶入中线菱形区时猛拍大钮 · 命中涨连击 · 偏了断连</div>

      <div class="lane" id="lane">
        <div class="sweet" aria-hidden="true"></div>
      </div>

      <div class="fire-pad">
        <button type="button" class="punch hit" id="btn-punch" aria-label="出拳">
          <img src="../../assets/_shared/rpg-icons/hand.png" alt="" draggable="false" />
          <span class="boom">砰</span>
        </button>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script src="./scene.js"></script>
</body>
</html>
