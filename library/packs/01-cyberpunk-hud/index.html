<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>01 赛博朋克 — 植入 HUD · 扫描潜入</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="hud.css" />
  <link rel="stylesheet" href="layout-9x20.css" />
</head>
<body data-dialect="neo">
  <div class="dialect-bar hit" id="dialect-bar" title="点按切换方言">
    <span class="lab">方言 · 9:20</span>
    <button type="button" data-d="neo" class="on">新军</button>
    <button type="button" data-d="matrix">矩阵</button>
    <button type="button" data-d="amber">琥珀</button>
    <button type="button" data-d="noir">霓虹</button>
  </div>

  <div id="viewport" class="game-root">
    <div id="world">
      <div id="rain"></div>
      <div id="code-rain" aria-hidden="true"></div>
      <div class="fog"></div>

      <div class="entity hostile" data-id="guard" data-type="hostile" data-name="企业卫兵" data-dist="18m"
           style="left:72%; top:68%">
        <div class="tag">敌对 · 企业卫兵 · 12级</div>
        <img class="body" src="./assets/guard.png" alt="" draggable="false" />
      </div>
      <div class="entity" data-id="civ" data-type="neutral" data-name="平民" data-dist="12m"
           style="left:28%; top:70%">
        <div class="tag">中立 · 平民</div>
        <img class="body" src="./assets/civ.png" alt="" draggable="false" />
      </div>
      <div class="entity loot" data-id="shard" data-type="loot" data-name="数据芯片" data-dist="4m"
           style="left:50%; top:74%">
        <div class="tag">拾取 · 数据芯片</div>
        <div class="body"></div>
      </div>
      <div class="entity cam" data-id="cam" data-type="device" data-name="安保摄像头" data-dist="22m"
           style="left:78%; top:42%">
        <div class="tag">设备 · 安保摄像头 · 可黑客</div>
        <div class="body"></div>
      </div>
      <div class="entity door" data-id="door" data-type="door" data-name="来世门" data-dist="6m"
           style="left:18%; top:66%">
        <div class="tag">门 · 来世 · 锁定</div>
        <div class="body"></div>
      </div>
    </div>

    <div id="hurt"></div>

    <div id="hud">
      <div class="crosshair" id="crosshair">
        <i class="h"></i><i class="h2"></i><i class="v"></i><i class="v2"></i>
      </div>
      <div class="prompt" id="prompt"><span class="key" id="prompt-key">●</span><span id="prompt-text">互动</span></div>

      <div class="player-vitals">
        <div class="lvl">12</div>
        <div class="bars">
          <div class="hp-row">
            <div class="hp-trk"><div class="fill" id="hp-fill"></div></div>
            <span class="hp-num" id="hp-num">620</span>
          </div>
          <div class="ram-row" id="ram-ticks" aria-label="运算力"></div>
          <div class="xp-trk"><div class="fill" id="xp-fill"></div></div>
          <div class="scan-rail off" id="scan-flag">扫描关</div>
        </div>
      </div>

      <div class="nav-block">
        <div class="minimap">
          <div class="grid"></div>
          <div class="ring"></div>
          <div class="player" id="mm-player"></div>
          <div class="ping" style="left:70%;top:40%"></div>
          <div class="ping hostile" style="left:30%;top:60%"></div>
        </div>
        <div class="nav-meta">
          <span id="clock">00:00:00</span>
        </div>
      </div>

      <div class="quest" id="quest">
        <div class="q-main" id="q-main">在来世与中间人接头</div>
        <div class="q-sub" id="q-sub">入口 · 240米</div>
      </div>

      <div class="stamina" id="stamina">
        <span class="lab">耐力</span>
        <div class="trk"><div class="fill" id="st-fill"></div></div>
      </div>

      <div class="weapon-dock">
        <div class="weapon-hud">
          <div class="ammo"><span id="ammo-cur">24</span> <span>/ <span id="ammo-res">120</span></span></div>
        </div>
        <div class="pockets" id="pockets">
          <button type="button" class="pocket on hit" data-w="0" aria-label="团结">
            <span class="ico">1</span><span class="pn">团结</span>
          </button>
          <button type="button" class="pocket hit" data-w="1" aria-label="沙塔拉">
            <span class="ico">2</span><span class="pn">沙塔拉</span>
          </button>
          <button type="button" class="pocket hit" data-w="2" aria-label="悟">
            <span class="ico">3</span><span class="pn">悟</span>
          </button>
        </div>
      </div>

      <div class="ram" id="ram-menu">
        <div class="title">快速黑客 · 目标</div>
        <button type="button" data-hack="ping" data-cost="1">侦测 <span class="cost">1</span></button>
        <button type="button" data-hack="distract" data-cost="2">干扰 <span class="cost">2</span></button>
        <button type="button" data-hack="breach" data-cost="3">突破 <span class="cost">3</span></button>
        <button type="button" data-hack="suicide" data-cost="4">系统重置 <span class="cost">4</span></button>
      </div>

      <div id="feed"></div>

      <div class="touch-pad" id="touch-pad">
        <button type="button" class="t-btn t-sprint hit" id="btn-sprint" aria-label="冲刺">
          <img class="ico" src="./assets/icons/icon-sprint.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-scan hit" id="btn-scan" aria-label="扫描">
          <img class="ico" src="./assets/icons/icon-scan.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-reload hit" id="btn-reload" aria-label="换弹">
          <img class="ico" src="./assets/icons/icon-reload.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-hack hit" id="btn-hack" aria-label="黑客" disabled>
          <img class="ico" src="./assets/icons/icon-action.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-fire hit" id="btn-fire" aria-label="开火">
          <img class="ico" src="./assets/icons/icon-fire.png" alt="" draggable="false" />
        </button>
      </div>

      <button type="button" class="t-btn t-journal hit" id="btn-journal" aria-label="日志">
        <img class="ico" src="./assets/icons/icon-journal.png" alt="" draggable="false" />
      </button>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" title="操作指引">
        <img class="ico" src="./assets/icons/icon-help.png" alt="" draggable="false" />
      </button>
      <div class="help" id="help" hidden>左下开扫描 → 点敌/设备标记 → 底口袋切枪 → 右下开火或黑客 · 按住冲刺 · 顶角日志</div>
    </div>

    <div id="journal">
      <h2>日志 // 中间人网</h2>
      <div class="job active" data-job="0">
        <div class="t">来世握手</div>
        <div class="d">与萝格的联系人接头。带上芯片。别惹热度。</div>
      </div>
      <div class="job" data-job="1">
        <div class="t">镜头幽灵</div>
        <div class="d">在企业增援到达前，突破沃森巷摄像头。</div>
      </div>
      <div class="job" data-job="2">
        <div class="t">可选：放倒卫兵</div>
        <div class="d">解决企业卫兵——也可以让他继续喘气。</div>
      </div>
      <p style="font-size:12px;letter-spacing:.12em;color:rgba(242,242,242,.42);margin-top:16px">点日志关闭</p>
    </div>
  </div>

  <script>
(function () {
  const weapons = [
    { name: "团结", cur: 24, res: 120, mag: 24, dmg: 35 },
    { name: "DB-2 沙塔拉", cur: 6, res: 24, mag: 6, dmg: 90 },
    { name: "悟", cur: 1, res: 1, mag: 1, dmg: 120, melee: true },
  ];
  const jobs = [
    { main: "在来世与中间人接头", sub: "入口 · 240米" },
    { main: "幽灵掉安保摄像头", sub: "设备 · 22米" },
    { main: "可选：放倒卫兵", sub: "敌对 · 18米" },
  ];

  const dialects = ["neo", "matrix", "amber", "noir"];
  const dialectLabel = {
    neo: "新军国主义",
    matrix: "矩阵终端",
    amber: "琥珀义体",
    noir: "霓虹黑色电影",
  };

  const state = {
    hp: 620, hpMax: 1000,
    st: 100, ar: 40,
    ram: 6, ramMax: 6,
    w: 0,
    scan: false,
    lock: null,
    focus: null,
    lookX: 0, lookY: 0,
    keys: {},
    sprint: false,
    journal: false,
    shard: false,
    doorOpen: false,
    dialect: "neo",
    pocketTouched: false,
  };

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => Array.from(document.querySelectorAll(s));
  const world = $("#world");

  function setDialect(id) {
    if (!dialects.includes(id)) return;
    state.dialect = id;
    document.body.dataset.dialect = id;
    $$("#dialect-bar button").forEach((b) => b.classList.toggle("on", b.dataset.d === id));
    const hud = $("#hud");
    hud.classList.remove("dialect-flash");
    void hud.offsetWidth;
    hud.classList.add("dialect-flash");
    feed("方言 · " + dialectLabel[id]);
  }

  function feed(msg) {
    const el = document.createElement("div");
    el.textContent = msg;
    $("#feed").prepend(el);
    setTimeout(() => el.remove(), 2200);
  }

  function renderRamTicks() {
    const row = $("#ram-ticks");
    row.innerHTML = "";
    for (let i = 0; i < state.ramMax; i++) {
      const t = document.createElement("div");
      t.className = "tick" + (i < state.ram ? " on" : "");
      row.appendChild(t);
    }
  }

  function sync() {
    const w = weapons[state.w];
    $("#hp-fill").style.width = (state.hp / state.hpMax) * 100 + "%";
    $("#st-fill").style.width = state.st + "%";
    $("#hp-num").textContent = String(Math.round(state.hp));
    $("#ammo-cur").textContent = String(w.cur);
    $("#ammo-res").textContent = String(w.res);
    renderRamTicks();
    $$(".pockets .pocket[data-w]").forEach((s) => {
      const i = Number(s.dataset.w);
      s.classList.toggle("on", i === state.w);
    });
    document.body.classList.toggle("scan-on", state.scan);
    $("#scan-flag").textContent = state.scan ? "扫描开" : "扫描关";
    $("#scan-flag").classList.toggle("on", state.scan);
    $("#scan-flag").classList.toggle("off", !state.scan);
    $("#btn-scan").classList.toggle("on", state.scan);
    $("#crosshair").classList.toggle("hack", !!state.lock);
    $("#ram-menu").classList.toggle("show", !!state.lock);
    $("#journal").classList.toggle("open", state.journal);
    $("#stamina").classList.toggle("show", state.sprint || state.st < 99);
    $$(".entity").forEach((ent) => {
      const markable = ent.dataset.type === "hostile" || ent.dataset.type === "device";
      ent.classList.toggle("scan-dim", !state.scan && markable);
      ent.classList.toggle("marked", state.scan && markable && !ent.hidden);
    });
  }

  function setFocus(ent) {
    state.focus = ent;
    const prompt = $("#prompt");
    const hackBtn = $("#btn-hack");
    if (!ent) {
      prompt.classList.remove("show");
      hackBtn.setAttribute("aria-label", "黑客");
      hackBtn.disabled = true;
      return;
    }
    const type = ent.dataset.type;
    let key = "●", text = "点选 · " + ent.dataset.name;
    let act = "互动";
    if (type === "hostile") { key = "◆"; text = "黑客 · " + ent.dataset.name; act = "黑客"; }
    if (type === "loot") { key = "●"; text = "拾取 · " + ent.dataset.name; act = "拾取"; }
    if (type === "door") { key = "●"; text = state.doorOpen ? "进入 · 来世" : "开门 · 需要芯片"; act = "开门"; }
    if (type === "device") { key = "◆"; text = "入侵 · " + ent.dataset.name; act = "黑客"; }
    if (type === "neutral") { key = "○"; text = "平民 · " + ent.dataset.name; act = "观察"; }
    $("#prompt-key").textContent = key;
    $("#prompt-text").textContent = text;
    prompt.classList.add("show");
    hackBtn.setAttribute("aria-label", act);
    hackBtn.disabled = false;
  }

  function nearestEntity(clientX, clientY) {
    let best = null, bestD = 56;
    $$(".entity").forEach((ent) => {
      if (ent.hidden) return;
      const r = ent.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height * 0.55;
      const d = Math.hypot(clientX - cx, clientY - cy);
      if (d < bestD) { bestD = d; best = ent; }
    });
    return best;
  }

  function hurt(amount) {
    let dmg = amount;
    if (state.ar > 0) {
      const absorb = Math.min(state.ar, dmg * 0.5);
      state.ar -= absorb;
      dmg -= absorb;
    }
    state.hp = Math.max(0, state.hp - dmg);
    $("#hurt").classList.add("on");
    setTimeout(() => $("#hurt").classList.remove("on"), 280);
    feed(state.hp <= 0 ? "脑死亡 // 危急" : "损伤 −" + Math.round(amount));
    sync();
  }

  function reload() {
    const w = weapons[state.w];
    if (w.melee) return;
    const need = w.mag - w.cur;
    const take = Math.min(need, w.res);
    w.cur += take;
    w.res -= take;
    feed(take ? "已换弹 · " + w.name : "备弹不足");
    sync();
  }

  function useFocus() {
    const ent = state.focus;
    if (!ent) return;
    const type = ent.dataset.type;
    if (type === "loot") {
      state.shard = true;
      ent.hidden = true;
      setFocus(null);
      feed("获得 · 数据芯片");
      $("#q-sub").textContent = "门已开 · 6米";
    } else if (type === "door") {
      if (state.shard || state.doorOpen) {
        state.doorOpen = true;
        feed("门已开 · 来世");
        $("#q-main").textContent = "进入来世";
        $("#q-sub").textContent = "握手就绪";
      } else {
        feed("锁定 · 需要数据芯片");
        hurt(15);
      }
    } else if (type === "hostile" || type === "device") {
      lockEntity(ent);
    } else if (type === "neutral") {
      feed("无威胁 · 平民");
    }
  }

  function lockEntity(ent) {
    const markable = ent.dataset.type === "hostile" || ent.dataset.type === "device";
    if (markable && !state.scan) {
      feed("先开启扫描再标记目标");
      return;
    }
    $$(".entity").forEach((e) => e.classList.remove("locked"));
    if (state.lock === ent) {
      state.lock = null;
      sync();
      return;
    }
    state.lock = ent;
    ent.classList.add("locked");
    if (!ent.dataset.hp) ent.dataset.hp = ent.dataset.type === "hostile" ? "100" : "40";
    feed("标记 · " + ent.dataset.name);
    sync();
  }

  const hackName = {
    ping: "侦测",
    distract: "干扰",
    breach: "突破",
    suicide: "系统重置",
  };

  function hack(id, cost) {
    if (!state.lock) return;
    if (state.ram < cost) { feed("运算力不足"); return; }
    state.ram -= cost;
    const target = state.lock;
    feed("黑客 · " + (hackName[id] || id) + " · " + target.dataset.name);
    if (id === "distract" && target.dataset.type === "hostile") {
      feed("卫兵已被干扰");
    }
    if (id === "breach" && target.dataset.type === "device") {
      target.hidden = true;
      state.lock = null;
      feed("摄像头离线 · 已幽灵");
      $("#q-main").textContent = jobs[1].main;
      $("#q-sub").textContent = "完成";
    }
    if (id === "suicide" && target.dataset.type === "hostile") {
      target.hidden = true;
      state.lock = null;
      feed("系统重置 · 目标倒下");
    }
    if (id === "ping") {
      document.body.classList.add("scan-on");
      state.scan = true;
      feed("侦测 · 网络已揭示");
    }
    sync();
  }

  function applyLook() {
    world.style.transform = `translate(${-state.lookX}px, ${-state.lookY}px)`;
  }

  function fire() {
    if (state.journal) return;
    if (!state.scan) {
      feed("扫描离线 · 无法精确交火");
      return;
    }
    const w = weapons[state.w];
    if (!w.melee && w.cur <= 0) { feed("空仓 · 点换弹"); return; }
    if (!w.melee) w.cur -= 1;
    sync();
    if (state.lock && state.lock.dataset.type === "hostile") {
      const hp = Number(state.lock.dataset.hp || 100) - w.dmg;
      state.lock.dataset.hp = String(hp);
      feed("命中 · " + state.lock.dataset.name + " · " + Math.max(0, Math.round(hp)));
      if (hp <= 0) {
        feed("已放倒 · " + state.lock.dataset.name);
        state.lock.hidden = true;
        state.lock = null;
        setFocus(null);
      }
    } else {
      feed(state.lock ? (w.melee ? "挥砍" : "射击") : "未标记目标 · 弹药已耗");
    }
  }

  function doHackOrInteract() {
    const ent = state.focus;
    if (!ent) return;
    const type = ent.dataset.type;
    if (type === "hostile" || type === "device") {
      if (state.lock === ent) {
        /* already locked — ram menu visible */
        feed("选择快速黑客");
      } else {
        lockEntity(ent);
      }
    } else {
      useFocus();
    }
  }

  // —— Touch / pointer (mobile primary) ——
  const vp = $("#viewport");
  let drag = null;

  function onPointerDown(e) {
    if (e.target.closest(".hit") || e.target.closest("#journal") || e.target.closest(".ram")) return;
    if (e.target.closest(".entity")) {
      const ent = e.target.closest(".entity");
      setFocus(ent);
      if (ent.dataset.type === "hostile" || ent.dataset.type === "device") lockEntity(ent);
      return;
    }
    drag = {
      id: e.pointerId,
      x: e.clientX,
      y: e.clientY,
      moved: false,
      lookX: state.lookX,
      lookY: state.lookY,
    };
    try { vp.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function onPointerMove(e) {
    if (!drag || drag.id !== e.pointerId) return;
    const dx = e.clientX - drag.x;
    const dy = e.clientY - drag.y;
    if (Math.hypot(dx, dy) > 8) drag.moved = true;
    state.lookX = Math.max(-28, Math.min(28, drag.lookX - dx * 0.08));
    state.lookY = Math.max(-16, Math.min(16, drag.lookY - dy * 0.08));
    applyLook();
  }

  function onPointerUp(e) {
    if (!drag || drag.id !== e.pointerId) return;
    if (!drag.moved) {
      const ent = nearestEntity(e.clientX, e.clientY);
      if (ent) setFocus(ent);
    }
    drag = null;
  }

  vp.addEventListener("pointerdown", onPointerDown);
  vp.addEventListener("pointermove", onPointerMove);
  vp.addEventListener("pointerup", onPointerUp);
  vp.addEventListener("pointercancel", () => { drag = null; });
  vp.addEventListener("contextmenu", (e) => e.preventDefault());

  $("#btn-fire").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    fire();
  });
  $("#btn-hack").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    doHackOrInteract();
  });
  $("#btn-reload").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    reload();
  });
  $("#btn-scan").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    state.scan = !state.scan;
    if (!state.scan && state.lock) {
      state.lock = null;
      $$(".entity").forEach((x) => x.classList.remove("locked"));
    }
    feed(state.scan ? "扫描仪在线 · 可标记目标" : "扫描仪离线");
    sync();
  });
  $("#btn-journal").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    state.journal = !state.journal;
    sync();
  });
  const sprintBtn = $("#btn-sprint");
  function sprintStart(e) {
    e.preventDefault();
    e.stopPropagation();
    state.sprint = true;
    sprintBtn.classList.add("pressed");
    sync();
  }
  function sprintEnd(e) {
    e.preventDefault();
    e.stopPropagation();
    state.sprint = false;
    sprintBtn.classList.remove("pressed");
    sync();
  }
  sprintBtn.addEventListener("pointerdown", sprintStart);
  sprintBtn.addEventListener("pointerup", sprintEnd);
  sprintBtn.addEventListener("pointerleave", sprintEnd);
  sprintBtn.addEventListener("pointercancel", sprintEnd);

  $$("#dialect-bar button").forEach((b) => {
    b.addEventListener("click", () => setDialect(b.dataset.d));
  });
  $$(".pockets .pocket[data-w]").forEach((s) => {
    s.addEventListener("click", () => {
      state.w = Number(s.dataset.w);
      state.pocketTouched = true;
      feed("已装备 · " + weapons[state.w].name);
      sync();
    });
  });
  $$("#ram-menu button").forEach((b) => {
    b.addEventListener("click", () => hack(b.dataset.hack, Number(b.dataset.cost)));
  });
  $$("#journal .job").forEach((j) => {
    j.addEventListener("click", () => {
      $$("#journal .job").forEach((x) => x.classList.remove("active"));
      j.classList.add("active");
      const job = jobs[Number(j.dataset.job)];
      $("#q-main").textContent = job.main;
      $("#q-sub").textContent = job.sub;
      feed("已钉选委托 · " + job.main);
      state.journal = false;
      sync();
    });
  });

  // Desktop debug only (not shown in help)
  window.addEventListener("keydown", (e) => {
    if (e.code === "BracketLeft" || e.code === "BracketRight") {
      const i = dialects.indexOf(state.dialect);
      const next = e.code === "BracketRight"
        ? dialects[(i + 1) % dialects.length]
        : dialects[(i - 1 + dialects.length) % dialects.length];
      setDialect(next);
    }
    if (e.code === "Escape") {
      if (state.lock) {
        state.lock = null;
        $$(".entity").forEach((x) => x.classList.remove("locked"));
      }
      state.journal = false;
      sync();
    }
    if (e.code === "KeyH") {
      const help = $("#help");
      help.hidden = !help.hidden;
      document.body.classList.toggle("help-open", !help.hidden);
    }
  });

  const helpEl = $("#help");
  $("#btn-help").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    const open = helpEl.hidden;
    helpEl.hidden = !open;
    document.body.classList.toggle("help-open", open);
  });

  // Ambient loop
  let t = 0;
  setInterval(() => {
    t += 1;
    const now = new Date();
    $("#clock").textContent = now.toTimeString().slice(0, 8);
    if (state.sprint) state.st = Math.max(0, state.st - 1.2);
    else state.st = Math.min(100, state.st + 0.4);
    if (state.ram < state.ramMax && t % 40 === 0) state.ram += 1;
    if (t % 120 === 0 && !state.journal && Math.random() < 0.35) {
      feed("附近有枪声");
      if (Math.random() < 0.4) hurt(25 + Math.random() * 40);
    }
    const ang = (t / 20) % 360;
    $("#mm-player").style.transform = `translate(-50%,-50%) rotate(${ang}deg)`;
    sync();
  }, 100);

  feed("链路已建立 · 先开扫描再标记");
  setFocus(null);
  sync();
})();
  </script>
  <script src="../../components/scene-kit.js" defer></script>
</body>
</html>
