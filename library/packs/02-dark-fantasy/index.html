<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>02 黑暗奇幻 — 极简魂类</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div id="viewport" class="game-root">
    <div id="world">
      <div class="fog"></div>

      <div class="bonfire hit" id="bonfire" data-type="bonfire">
        <img src="./assets/bonfire.png" alt="" draggable="false" />
      </div>

      <div class="enemy hit" id="enemy" data-type="enemy" data-name="废墟守卫">
        <img class="body" src="./assets/hollow.png" alt="" draggable="false" />
      </div>

      <div class="loot hit" id="loot" data-type="loot" hidden></div>
    </div>

    <div id="hurt"></div>

    <div id="hud">
      <div class="place" id="place">
        <div>宁姆格福 · 废墟</div>
        <div class="rest-hint">篝火近前 · 点按休息</div>
      </div>

      <div class="vitals" id="vitals" aria-label="状态">
        <div class="vital hp" id="hp-row" aria-label="生命">
          <div class="trk"><div class="fill" id="hp-fill"></div></div>
        </div>
        <div class="vital fp" aria-label="集中">
          <div class="trk"><div class="fill" id="fp-fill"></div></div>
        </div>
        <div class="vital st" aria-label="耐力">
          <div class="trk"><div class="fill" id="st-fill"></div></div>
        </div>
      </div>

      <button type="button" class="estus-slot hit" id="btn-estus" aria-label="黄金种子露滴">
        <img class="ico" src="./assets/icons/icon-estus.png" alt="" draggable="false" />
        <span class="n" id="estus-n">3</span>
      </button>

      <div class="prompt" id="prompt"></div>
      <div id="feed"></div>

      <div class="slate" id="slate" role="dialog" aria-label="篝火">
        <div class="slate-title">篝火</div>
        <button type="button" class="slate-line" id="slate-rest">休息</button>
        <button type="button" class="slate-line" id="slate-leave">离开</button>
      </div>

      <div class="touch-pad">
        <button type="button" class="t-btn t-lock hit" id="btn-lock" aria-label="锁定">
          <img class="ico" src="./assets/icons/icon-lock.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-roll hit" id="btn-roll" aria-label="翻滚">
          <img class="ico" src="./assets/icons/icon-roll.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-attack hit" id="btn-attack" aria-label="攻击">
          <img class="ico" src="./assets/icons/icon-attack.png" alt="" draggable="false" />
        </button>
      </div>

      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" title="操作指引">
        <img class="ico" src="./assets/icons/icon-help.png" alt="" draggable="false" />
      </button>
      <div class="help" id="help" hidden>拖动环视 · 点敌人锁定 · 右下攻击/翻滚 · 左下按住锁定 · 点露滴回血 · 点篝火休息（无口袋、无小地图）</div>
    </div>
  </div>

  <script src="../../components/scene-kit.js"></script>
  <script src="./scene.js"></script>
</body>
</html>
