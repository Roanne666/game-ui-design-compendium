<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>战术军事 — 瞄准辅助</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root">
    <div class="game-world has-grid"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="radar" aria-hidden="true"></div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>点目标锁定（环进度）· 左姿态/冲刺 · 右换弹/点射 · 未锁定时点射精度下降</div>

      <div class="hud-anchor-tc" style="top:52px">
        <button type="button" class="compass" id="btn-compass" aria-label="调整方位">
          <span class="n">北</span>
          <span class="deg" id="compass-deg">274°</span>
        </button>
        <div class="short-msg" id="short-msg">扇区静默</div>
      </div>

      <button type="button" class="target" id="tgt" aria-label="锁定目标">
        <img src="./assets/hostile.png" alt="" draggable="false" />
      </button>
      <div class="reticle" id="reticle" aria-hidden="true">
        <svg viewBox="0 0 88 88">
          <circle class="ring" cx="44" cy="44" r="35" />
          <circle class="arc" id="lock-arc" cx="44" cy="44" r="35" transform="rotate(-90 44 44)" />
        </svg>
      </div>

      <div class="zone-l">
        <div class="pad">
          <div class="lab">姿态</div>
          <div class="stance-row" id="stance-group">
            <button type="button" class="t-btn active" data-stance="STAND" aria-label="站立"><img src="./assets/icons/icon-stand.png" alt="" draggable="false" /><span>立</span></button>
            <button type="button" class="t-btn" data-stance="CROUCH" aria-label="蹲伏"><img src="./assets/icons/icon-crouch.png" alt="" draggable="false" /><span>蹲</span></button>
            <button type="button" class="t-btn" data-stance="PRONE" aria-label="卧倒"><img src="./assets/icons/icon-prone.png" alt="" draggable="false" /><span>卧</span></button>
          </div>
          <div class="lab" style="margin-top:8px">耐力</div>
          <div class="stm">
            <div class="hud-bar-track"><div id="stm-fill" class="hud-bar-fill success" style="width:100%"></div></div>
            <span id="stm-val" class="badge">100</span>
          </div>
          <button type="button" class="t-btn" id="btn-sprint" aria-label="冲刺">
            <img src="./assets/icons/icon-sprint.png" alt="" draggable="false" /><span>冲刺</span>
          </button>
        </div>
      </div>

      <div class="zone-r">
        <div class="pad">
          <div class="lab">武器</div>
          <div class="ammo" id="ammo-val">24 / 120</div>
          <div class="fire-stack">
            <button type="button" class="t-btn" id="btn-reload" aria-label="换弹">
              <img src="./assets/icons/icon-reload.png" alt="" draggable="false" /><span>换弹</span>
            </button>
            <button type="button" class="t-btn primary" id="btn-fire" aria-label="点射">
              <img src="./assets/icons/icon-fire.png" alt="" draggable="false" /><span>点射</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let mag = 24, reserve = 120, stamina = 100, bearing = 274;
    let locked = false, lockPct = 0, lockTimer = 0, tgtHp = 3;
    const stanceLabels = { STAND: "站立", CROUCH: "蹲伏", PRONE: "卧倒" };
    const CIRC = 2 * Math.PI * 35;

    function feed(msg) {
      const el = document.createElement("div");
      el.textContent = msg;
      sk.$("#feed").prepend(el);
      setTimeout(() => el.remove(), 2000);
    }

    function syncAmmo() { sk.setText(sk.$("#ammo-val"), mag + " / " + reserve); }
    function syncStamina() {
      sk.setFill(sk.$("#stm-fill"), stamina);
      sk.setText(sk.$("#stm-val"), String(stamina));
      sk.$("#stm-fill").className = "hud-bar-fill " + (stamina > 40 ? "success" : stamina > 15 ? "warning" : "danger");
    }
    function syncBearing() {
      sk.setText(sk.$("#compass-deg"), bearing + "°");
    }
    function syncLock() {
      const arc = sk.$("#lock-arc");
      arc.style.strokeDasharray = String(CIRC);
      arc.style.strokeDashoffset = String(CIRC * (1 - lockPct / 100));
      sk.$("#reticle").classList.toggle("hot", locked || lockPct > 0);
      sk.$("#tgt").classList.toggle("locked", locked);
    }

    function clearLock() {
      locked = false;
      lockPct = 0;
      clearInterval(lockTimer);
      lockTimer = 0;
      syncLock();
    }

    sk.on(sk.$("#btn-help"), "click", () => {
      const help = sk.$("#help");
      const open = help.hidden;
      help.hidden = !open;
      sk.$("#btn-help").setAttribute("aria-expanded", String(open));
    });

    sk.on(sk.$("#tgt"), "click", () => {
      if (sk.$("#tgt").classList.contains("down")) return;
      if (locked) { feed("目标已锁定"); return; }
      clearInterval(lockTimer);
      lockPct = 0;
      const stance = sk.$("[data-stance].active").dataset.stance;
      const speed = stance === "PRONE" ? 14 : stance === "CROUCH" ? 10 : 7;
      sk.setText(sk.$("#short-msg"), "锁定中…");
      lockTimer = setInterval(() => {
        lockPct = Math.min(100, lockPct + speed);
        syncLock();
        if (lockPct >= 100) {
          locked = true;
          clearInterval(lockTimer);
          sk.setText(sk.$("#short-msg"), "目标锁定");
          feed("锁定完成");
        }
      }, 120);
    });

    sk.$all("[data-stance]").forEach((btn) => {
      sk.on(btn, "click", () => {
        sk.$all("[data-stance]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        feed("姿态：" + stanceLabels[btn.dataset.stance]);
        if (lockPct > 0 && !locked) clearLock();
      });
    });

    sk.on(sk.$("#btn-reload"), "click", () => {
      if (reserve <= 0) { feed("备用弹耗尽"); return; }
      const need = 30 - mag;
      const take = Math.min(need, reserve);
      mag += take; reserve -= take;
      syncAmmo();
      feed("换弹 +" + take);
      sk.pulse(sk.$("#btn-reload"));
    });

    sk.on(sk.$("#btn-compass"), "click", () => {
      bearing = (bearing + 15) % 360;
      syncBearing();
      sk.setText(sk.$("#short-msg"), "方位 " + bearing + "°");
    });

    sk.on(sk.$("#btn-sprint"), "click", () => {
      if (stamina < 12) { feed("力竭"); return; }
      stamina = Math.max(0, stamina - 12);
      syncStamina();
      clearLock();
      sk.setText(sk.$("#short-msg"), "机动中");
      feed("冲刺 −12");
    });

    sk.on(sk.$("#btn-fire"), "click", () => {
      if (mag <= 0) { feed("弹匣空 — 换弹"); return; }
      const burst = Math.min(3, mag);
      mag -= burst;
      syncAmmo();
      const hit = locked ? true : Math.random() < 0.35;
      if (hit) {
        tgtHp -= 1;
        feed("命中 ×" + burst + (locked ? "" : "（盲射）"));
        sk.pulse(sk.$("#tgt"));
        if (tgtHp <= 0) {
          sk.$("#tgt").classList.add("down");
          clearLock();
          sk.setText(sk.$("#short-msg"), "目标失效");
          feed("目标清除");
        }
      } else {
        feed("偏射 ×" + burst);
        sk.$("#vignette").classList.add("on");
        setTimeout(() => sk.$("#vignette").classList.remove("on"), 180);
      }
    });

    syncAmmo(); syncStamina(); syncBearing(); syncLock();
  </script>
</body>
</html>
