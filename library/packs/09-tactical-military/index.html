<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>战术军事 — 瞄准辅助</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root">
    <div class="game-world has-grid"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="radar" aria-hidden="true"></div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>点目标锁定（环进度）· 左姿态/冲刺 · 右换弹/点射 · 未锁定时点射精度下降</div>

      <div class="hud-anchor-tc" style="top:52px">
        <button type="button" class="compass" id="btn-compass" aria-label="调整方位">
          <span class="n">北</span>
          <span class="deg" id="compass-deg">274°</span>
        </button>
        <div class="short-msg" id="short-msg">扇区静默</div>
      </div>

      <button type="button" class="target" id="tgt" aria-label="锁定目标">
        <img src="./assets/hostile.png" alt="" draggable="false" />
      </button>
      <div class="reticle" id="reticle" aria-hidden="true">
        <svg viewBox="0 0 88 88">
          <circle class="ring" cx="44" cy="44" r="35" />
          <circle class="arc" id="lock-arc" cx="44" cy="44" r="35" transform="rotate(-90 44 44)" />
        </svg>
      </div>

      <div class="zone-l">
        <div class="pad">
          <div class="lab">姿态</div>
          <div class="stance-row" id="stance-group">
            <button type="button" class="t-btn active" data-stance="STAND" aria-label="站立"><img src="./assets/icons/icon-stand.png" alt="" draggable="false" /><span>立</span></button>
            <button type="button" class="t-btn" data-stance="CROUCH" aria-label="蹲伏"><img src="./assets/icons/icon-crouch.png" alt="" draggable="false" /><span>蹲</span></button>
            <button type="button" class="t-btn" data-stance="PRONE" aria-label="卧倒"><img src="./assets/icons/icon-prone.png" alt="" draggable="false" /><span>卧</span></button>
          </div>
          <div class="lab" style="margin-top:8px">耐力</div>
          <div class="stm">
            <div class="hud-bar-track"><div id="stm-fill" class="hud-bar-fill success" style="width:100%"></div></div>
            <span id="stm-val" class="badge">100</span>
          </div>
          <button type="button" class="t-btn" id="btn-sprint" aria-label="冲刺">
            <img src="./assets/icons/icon-sprint.png" alt="" draggable="false" /><span>冲刺</span>
          </button>
        </div>
      </div>

      <div class="zone-r">
        <div class="pad">
          <div class="lab">武器</div>
          <div class="ammo" id="ammo-val">24 / 120</div>
          <div class="fire-stack">
            <button type="button" class="t-btn" id="btn-reload" aria-label="换弹">
              <img src="./assets/icons/icon-reload.png" alt="" draggable="false" /><span>换弹</span>
            </button>
            <button type="button" class="t-btn primary" id="btn-fire" aria-label="点射">
              <img src="./assets/icons/icon-fire.png" alt="" draggable="false" /><span>点射</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script src="./scene.js"></script>
</body>
</html>
