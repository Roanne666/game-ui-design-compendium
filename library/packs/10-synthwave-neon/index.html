<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>合成波霓虹 — 街机一局</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root">
    <div class="game-world has-grid"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>投币开始一局 · 光球进门时点按圆键 · 结束可再来或回标题 · 高分/选项在侧钮</div>

      <div id="title-layer">
        <div class="crt-title">
          <h1 class="logo">霓虹漂移</h1>
          <div class="sub">投币开始 · 9:20</div>
          <div class="load-bar" id="loading-bar-wrap">
            <div class="progress progress-linear" style="height:10px">
              <div id="title-load-bar" class="progress-fill" style="width:0%;background:var(--accent-2)"></div>
            </div>
            <div style="margin-top:6px"><span class="badge" id="load-label">投币中</span></div>
          </div>
        </div>
        <div class="coin-slot">
          <button type="button" class="insert" id="btn-start" aria-label="投币开始">
            <img src="./assets/icons/icon-start.png" alt="" draggable="false" /><span>投币</span>
          </button>
          <div class="side">
            <button type="button" class="ghost" id="btn-scores" aria-label="高分榜">高分</button>
            <button type="button" class="ghost" id="btn-options" aria-label="选项">选项</button>
            <button type="button" class="ghost" id="btn-quit" aria-label="退出">退出</button>
          </div>
        </div>
        <div class="side-stack">
          <div id="scores-panel" class="panel frame-brackets" data-sk-panel hidden>
            <div class="panel-title">高分榜</div>
            <div class="panel-body">
              <ul class="score-list">
                <li class="top"><span>1. 雾汽小子</span><span>984,200</span></li>
                <li><span>2. 复古狐</span><span>812,050</span></li>
                <li><span>3. 合成浪人</span><span>640,880</span></li>
                <li><span>4. 你</span><span id="your-score">000,000</span></li>
              </ul>
              <button type="button" class="neon-line ghost" id="scores-close" style="margin-top:12px">关闭</button>
            </div>
          </div>
          <div id="options-panel" class="panel frame-brackets" data-sk-panel hidden>
            <div class="panel-title">选项</div>
            <div class="panel-body">
              <div class="vol-row"><span>主音量</span><button type="button" class="neon-line ghost" data-vol="master" data-delta="-10" style="min-height:36px;min-width:44px;width:auto;padding:0 10px">−</button><span id="vol-master" class="badge">70</span><button type="button" class="neon-line ghost" data-vol="master" data-delta="10" style="min-height:36px;min-width:44px;width:auto;padding:0 10px">+</button></div>
              <div class="vol-row"><span>音乐</span><button type="button" class="neon-line ghost" data-vol="music" data-delta="-10" style="min-height:36px;min-width:44px;width:auto;padding:0 10px">−</button><span id="vol-music" class="badge">80</span><button type="button" class="neon-line ghost" data-vol="music" data-delta="10" style="min-height:36px;min-width:44px;width:auto;padding:0 10px">+</button></div>
              <div class="vol-row"><span>音效</span><button type="button" class="neon-line ghost" data-vol="sfx" data-delta="-10" style="min-height:36px;min-width:44px;width:auto;padding:0 10px">−</button><span id="vol-sfx" class="badge">90</span><button type="button" class="neon-line ghost" data-vol="sfx" data-delta="10" style="min-height:36px;min-width:44px;width:auto;padding:0 10px">+</button></div>
              <button type="button" class="neon-line ghost" id="options-close" style="margin-top:12px">关闭</button>
            </div>
          </div>
        </div>
      </div>

      <div id="play-layer" hidden>
        <div class="run-hud">
          <div class="chip"><span class="lab">得分</span><span class="num" id="run-score">0</span></div>
          <div class="chip"><span class="lab">剩余</span><span class="num" id="run-time">20</span></div>
          <div class="chip"><span class="lab">连击</span><span class="num" id="run-combo">0</span></div>
        </div>
        <div class="road" id="lane">
          <div class="horizon" aria-hidden="true"></div>
          <div class="gate"></div>
          <div class="orb" id="orb">
            <img src="./assets/orb.png" alt="" draggable="false" />
          </div>
        </div>
        <button type="button" class="tap-btn" id="btn-tap" aria-label="点按得分">
          <img src="./assets/icons/icon-tap.png" alt="" draggable="false" /><span>拍</span>
        </button>
      </div>

      <div id="over-layer" hidden>
        <div class="over-card panel frame-brackets">
          <div class="panel-title">本局结束</div>
          <div class="panel-body">
            <div class="final" id="final-score">0</div>
            <div class="over-actions">
              <button type="button" class="neon-line primary" id="btn-again">再来一局</button>
              <button type="button" class="neon-line" id="btn-title">返回标题</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script src="./scene.js"></script>
</body>
</html>
