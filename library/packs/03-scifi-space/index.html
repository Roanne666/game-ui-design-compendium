<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>03 科幻太空 — 竖屏舰桥仪表</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="hud.css" />
</head>
<body>
  <div id="viewport" class="game-root">
    <div id="world">
      <div class="grid-overlay" aria-hidden="true"></div>
      <div class="target hit" id="target" aria-label="敌方目标">
        <img src="./assets/hostile-ship.png" alt="" draggable="false" />
      </div>
    </div>
    <div id="hurt"></div>

    <div id="hud">
      <div class="top-strip">
        <div class="place">
          <div class="sys">LHS 3447</div>
          <div><span id="nav-mode">超巡航</span> · 燃料 16.2 T</div>
        </div>
        <div class="top-actions">
          <button type="button" class="icon-btn hit" id="btn-nav" aria-label="导航面板">
            <img class="ico" src="./assets/icons/icon-nav.png" alt="" draggable="false" />
          </button>
          <button type="button" class="icon-btn hit" id="btn-mode" aria-label="驱动模式">
            <img class="ico" src="./assets/icons/icon-mode.png" alt="" draggable="false" />
          </button>
          <button type="button" class="icon-btn hit" id="btn-help" aria-label="操作指引">
            <img class="ico" src="./assets/icons/icon-help.png" alt="" draggable="false" />
          </button>
        </div>
      </div>

      <div id="feed"></div>
      <div class="help" id="help" hidden>下半台调能量（总和 100%）· 点瞄准环推进锁定 · 武器能量≥20 且锁定后环下可射击 · 顶栏打开导航</div>

      <div class="stage">
        <div class="target-card" id="target-badge">目标 · 12.4 公里 · 未锁定</div>
        <button type="button" class="reticle hit" id="reticle" aria-label="推进目标锁定">
          <svg class="lock-ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="trk" cx="50" cy="50" r="46" />
            <circle class="fill" id="lock-arc" cx="50" cy="50" r="46"
              stroke-dasharray="0 289" pathLength="289" />
          </svg>
          <span class="lock-label" id="lock-label">锁定 0%</span>
        </button>
        <button type="button" class="fire-chip hit" id="btn-fire" aria-label="开火" disabled>
          <img class="ico" src="./assets/icons/icon-fire.png" alt="" draggable="false" />
          <span>射击</span>
        </button>
      </div>

      <div class="nav-slate" id="nav-slate">
        <h2>导航 · 舰桥</h2>
        <div class="row"><span>系统</span><span>LHS 3447</span></div>
        <div class="row"><span>模式</span><span id="slate-mode">超巡航</span></div>
        <div class="row"><span>燃料</span><span>16.2 T</span></div>
        <div class="row"><span>通讯</span><span>空管许可通过</span></div>
        <div class="actions">
          <button type="button" id="slate-mode-btn">切换模式</button>
          <button type="button" id="slate-close">关闭</button>
        </div>
      </div>

      <div class="console" id="console">
        <div class="console-head">
          <span>能量分配</span>
          <span class="hull">船体 <strong id="hull-n">88%</strong></span>
        </div>
        <div class="pwr-row" data-sys="engines">
          <span class="lab">引擎</span>
          <input type="range" min="0" max="100" value="42" id="rng-engines" aria-label="引擎能量" />
          <span class="val" id="pwr-engines">42</span>
          <div class="pwr-btns">
            <button type="button" data-delta="-5" aria-label="引擎减">−</button>
            <button type="button" data-delta="5" aria-label="引擎加">+</button>
          </div>
        </div>
        <div class="pwr-row" data-sys="shields">
          <span class="lab">护盾</span>
          <input type="range" min="0" max="100" value="33" id="rng-shields" aria-label="护盾能量" />
          <span class="val" id="pwr-shields">33</span>
          <div class="pwr-btns">
            <button type="button" data-delta="-5" aria-label="护盾减">−</button>
            <button type="button" data-delta="5" aria-label="护盾加">+</button>
          </div>
        </div>
        <div class="pwr-row" data-sys="weapons">
          <span class="lab">武器</span>
          <input type="range" min="0" max="100" value="25" id="rng-weapons" aria-label="武器能量" />
          <span class="val" id="pwr-weapons">25</span>
          <div class="pwr-btns">
            <button type="button" data-delta="-5" aria-label="武器减">−</button>
            <button type="button" data-delta="5" aria-label="武器加">+</button>
          </div>
        </div>
        <div class="console-foot">
          <span>总计 <strong id="pwr-total">100</strong>%</span>
          <span id="fire-hint" class="warn">射击需武器 ≥20 且锁定</span>
        </div>
      </div>
    </div>
  </div>

  <script>
(function () {
  const WEAPON_MIN = 20;
  const CIRC = 289;
  const pwr = { engines: 42, shields: 33, weapons: 25 };
  const modes = ["超巡航", "巡航", "手动"];
  let modeIdx = 0;
  let hull = 88;
  let locked = false;
  let lockPct = 0;

  const $ = (s) => document.querySelector(s);
  const reticle = $("#reticle");
  const fireBtn = $("#btn-fire");
  const badge = $("#target-badge");
  const lockLabel = $("#lock-label");
  const lockArc = $("#lock-arc");
  const fireHint = $("#fire-hint");
  const feed = $("#feed");
  const hurt = $("#hurt");

  function toast(msg, cls) {
    const line = document.createElement("div");
    line.className = "line" + (cls ? " " + cls : "");
    line.textContent = msg;
    feed.prepend(line);
    while (feed.children.length > 4) feed.lastChild.remove();
  }

  function syncPwrUI() {
    ["engines", "shields", "weapons"].forEach((k) => {
      $("#pwr-" + k).textContent = String(pwr[k]);
      $("#rng-" + k).value = String(pwr[k]);
    });
    $("#pwr-total").textContent = String(pwr.engines + pwr.shields + pwr.weapons);
    updateFireGate();
  }

  function setPwr(key, newVal) {
    newVal = Math.max(0, Math.min(100, newVal));
    const others = Object.keys(pwr).filter((k) => k !== key);
    const otherSum = others.reduce((s, k) => s + pwr[k], 0);
    const maxFor = 100 - otherSum;
    if (newVal > maxFor) newVal = maxFor;
    pwr[key] = newVal;
    let total = pwr.engines + pwr.shields + pwr.weapons;
    if (total < 100) {
      pwr[others[0]] = Math.min(100, pwr[others[0]] + (100 - total));
    }
    syncPwrUI();
  }

  function canFire() {
    return locked && pwr.weapons >= WEAPON_MIN && hull > 0;
  }

  function updateFireGate() {
    const ok = canFire();
    fireBtn.classList.toggle("show", locked);
    fireBtn.disabled = !ok;
    if (!locked) {
      fireHint.className = "warn";
      fireHint.textContent = "射击需武器 ≥" + WEAPON_MIN + " 且锁定";
    } else if (pwr.weapons < WEAPON_MIN) {
      fireHint.className = "need";
      fireHint.textContent = "武器能量不足 · 请上调";
    } else {
      fireHint.className = "ok";
      fireHint.textContent = "武器就绪 · 可射击";
    }
  }

  function setLockVisual() {
    const dash = (lockPct / 100) * CIRC;
    lockArc.setAttribute("stroke-dasharray", dash + " " + CIRC);
    lockLabel.textContent = locked ? "已锁定" : ("锁定 " + lockPct + "%");
    reticle.classList.toggle("locked", locked);
    badge.classList.toggle("hot", locked);
    badge.textContent = locked
      ? "目标 · 已锁定 · 检查武器能量"
      : (lockPct > 0 ? "目标 · 锁定中 " + lockPct + "%" : "目标 · 12.4 公里 · 未锁定");
    updateFireGate();
  }

  function progressLock() {
    if (locked) {
      locked = false;
      lockPct = 0;
      setLockVisual();
      toast("锁定已解除");
      return;
    }
    lockPct = Math.min(100, lockPct + 25);
    if (lockPct >= 100) {
      locked = true;
      toast("目标已锁定", "ok");
    } else {
      toast("锁定进度 " + lockPct + "%");
    }
    setLockVisual();
  }

  function fire() {
    if (!canFire()) {
      toast(pwr.weapons < WEAPON_MIN ? "武器能量不足" : "未锁定", "warn");
      return;
    }
    const dmg = 6 + Math.floor(pwr.weapons / 8);
    toast("命中 · 伤害 " + dmg, "ok");
    if (Math.random() < 0.4) {
      const ret = Math.max(3, 12 - Math.floor(pwr.shields / 12));
      hull = Math.max(0, hull - ret);
      $("#hull-n").textContent = hull + "%";
      hurt.classList.add("on");
      setTimeout(() => hurt.classList.remove("on"), 320);
      toast(hull <= 0 ? "船体破裂" : "敌方回击 −" + ret + "%", hull <= 25 ? "danger" : "warn");
      updateFireGate();
    }
  }

  function setMode(i) {
    modeIdx = i;
    const m = modes[modeIdx];
    $("#nav-mode").textContent = m;
    $("#slate-mode").textContent = m;
    toast("驱动：" + m);
  }

  document.querySelectorAll(".pwr-row").forEach((row) => {
    const key = row.dataset.sys;
    const input = row.querySelector("input");
    input.addEventListener("input", () => setPwr(key, parseInt(input.value, 10)));
    row.querySelectorAll("[data-delta]").forEach((btn) => {
      btn.addEventListener("click", () => setPwr(key, pwr[key] + parseInt(btn.dataset.delta, 10)));
    });
  });

  reticle.addEventListener("click", progressLock);
  $("#target").addEventListener("click", (e) => {
    e.stopPropagation();
    progressLock();
  });
  fireBtn.addEventListener("click", fire);

  $("#btn-nav").addEventListener("click", () => $("#nav-slate").classList.toggle("open"));
  $("#slate-close").addEventListener("click", () => $("#nav-slate").classList.remove("open"));
  $("#btn-mode").addEventListener("click", () => setMode((modeIdx + 1) % modes.length));
  $("#slate-mode-btn").addEventListener("click", () => setMode((modeIdx + 1) % modes.length));
  $("#btn-help").addEventListener("click", () => {
    const h = $("#help");
    if (h.hasAttribute("hidden")) h.removeAttribute("hidden");
    else h.setAttribute("hidden", "");
  });

  syncPwrUI();
  setLockVisual();
})();
  </script>
  <script src="../../components/scene-kit.js" defer></script>
</body>
</html>
