<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>像素复古 — 战斗指令</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./scene.css" />
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="stage" id="stage">
        <div class="float-layer" id="floats"></div>
        <div class="party" id="party">
          <img class="sprite" src="./assets/hero.png" alt="" draggable="false" />
          <div class="shadow" aria-hidden="true"></div>
          <span class="tag">隆</span>
        </div>
        <div class="enemies" id="enemies">
          <button type="button" class="foe" data-id="slime" data-hp="30" data-max="30" data-name="史莱姆" aria-label="选择史莱姆">
            <img class="sprite" src="./assets/foe-slime.png" alt="" draggable="false" />
            <div class="shadow" aria-hidden="true"></div>
            <span class="name">史莱姆</span>
            <span class="hp-mini" data-hp-label>30</span>
          </button>
          <button type="button" class="foe selected" data-id="bat" data-hp="22" data-max="22" data-name="蝙蝠" aria-label="选择蝙蝠">
            <img class="sprite" src="./assets/foe-bat.png" alt="" draggable="false" />
            <div class="shadow" aria-hidden="true"></div>
            <span class="name">蝙蝠</span>
            <span class="hp-mini" data-hp-label>22</span>
          </button>
          <button type="button" class="foe" data-id="orc" data-hp="45" data-max="45" data-name="兽人" aria-label="选择兽人">
            <img class="sprite" src="./assets/foe-orc.png" alt="" draggable="false" />
            <div class="shadow" aria-hidden="true"></div>
            <span class="name">兽人</span>
            <span class="hp-mini" data-hp-label>45</span>
          </button>
        </div>
      </div>

      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" aria-expanded="false">?</button>
      <div class="help" id="help" hidden>点右侧敌人选定 · 右窗点指令（攻击/魔法/道具/逃跑）· 日志在左窗 · 胜负后可再战</div>

      <div class="end-banner" id="end-banner" hidden>
        <div class="title" id="end-title">胜利</div>
        <div class="sub" id="end-sub">敌人全部倒下。</div>
        <button type="button" class="btn btn-primary" id="btn-again">再战</button>
      </div>

      <div class="battle-window">
        <div class="win-left">
          <div class="log-box" id="battle-log" aria-live="polite">
            <span class="line">遭遇战开始。</span>
            <span class="line dim">选定目标后下达指令。</span>
          </div>
          <div class="vitals">
            <div class="hud-bar">
              <span class="hud-bar-label">生命</span>
              <div class="hud-bar-track"><div id="hp-fill" class="hud-bar-fill danger" style="width:72%"></div></div>
              <span id="hp-val" class="hud-bar-value">72</span>
            </div>
            <div class="hud-bar">
              <span class="hud-bar-label">魔法</span>
              <div class="hud-bar-track"><div id="mp-fill" class="hud-bar-fill" style="width:60%;background:var(--accent-2)"></div></div>
              <span id="mp-val" class="hud-bar-value">18</span>
            </div>
          </div>
        </div>
        <div class="win-right">
          <div class="cmds" id="cmds" role="menu">
            <button type="button" class="cmd focus" id="cmd-fight" role="menuitem" aria-label="攻击">
              <span class="cursor" aria-hidden="true">▶</span><span>攻击</span>
            </button>
            <button type="button" class="cmd" id="cmd-magic" role="menuitem" aria-label="魔法">
              <span class="cursor" aria-hidden="true">▶</span><span>魔法</span>
            </button>
            <button type="button" class="cmd" id="cmd-item" role="menuitem" aria-label="道具">
              <span class="cursor" aria-hidden="true">▶</span><span>道具</span>
            </button>
            <button type="button" class="cmd danger" id="cmd-run" role="menuitem" aria-label="逃跑">
              <span class="cursor" aria-hidden="true">▶</span><span>逃跑</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../components/scene-kit.js"></script>
  <script src="./scene.js"></script>
</body>
</html>
