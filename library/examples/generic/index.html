<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>通用 HUD 骨架 — 无对应风格</title>
  <link rel="stylesheet" href="../../components/components.css" />
  <link rel="stylesheet" href="../../components/phone-frame.css" />
  <link rel="stylesheet" href="../../components/game-feel.css" />
  <link rel="stylesheet" href="./tokens.css" />
  <style>
    .game-root {
      --phone-border-color: rgba(255, 255, 255, 0.1);
    }
    .game-world {
      background:
        radial-gradient(ellipse 70% 50% at 50% 40%, #1c2430 0%, transparent 70%),
        linear-gradient(180deg, #161a22 0%, #0c0e12 100%);
    }
    .obj {
      position: absolute; top: 52px; left: 12px; right: 56px; z-index: 5;
      padding: 8px 10px;
      font-size: 12px; line-height: 1.4; color: var(--text);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); pointer-events: none;
    }
    .obj strong { color: var(--accent); font-weight: 600; }
    .help-toggle {
      position: absolute; top: 48px; right: 10px; z-index: 16;
      width: 44px; height: 44px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 16px; cursor: pointer;
    }
    .help-toggle:active { transform: scale(0.94); }
    .help {
      position: absolute; top: 100px; left: 12px; right: 12px; z-index: 15;
      padding: 8px 10px; font-size: 11px; line-height: 1.5; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); pointer-events: none;
    }
    .help[hidden] { display: none !important; }
    .primary {
      position: absolute; left: 16px; right: 16px; bottom: 28px; z-index: 8;
      min-height: 56px; border: 0; border-radius: var(--radius-lg);
      background: var(--accent); color: #0c0e12;
      font-size: 16px; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer;
    }
    .primary:active { transform: scale(0.98); filter: brightness(0.92); }
    .hint {
      position: absolute; left: 16px; right: 16px; bottom: 96px; z-index: 5;
      text-align: center; font-size: 11px; color: var(--text-muted);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-world"></div>
    <div class="obj" id="obj"><strong>目标</strong> · 按你的游戏类型改此处楼型与文案</div>
    <button type="button" class="help-toggle" id="help-btn" aria-label="说明">?</button>
    <div class="help" id="help" hidden>
      本页是「无对应 pack」时的通用骨架：共享栈 + 中性 token。
      点按下方主键完成一次核心动作；正式项目请换成该类型正确的布局与循环。
    </div>
    <p class="hint">点按主键 · 热区 ≥44px</p>
    <button type="button" class="primary" id="act" aria-label="主操作">主操作</button>
  </div>
  <script src="../../components/scene-kit.js" defer></script>
  <script>
    document.getElementById("help-btn").addEventListener("click", () => {
      const h = document.getElementById("help");
      if (h.hasAttribute("hidden")) h.removeAttribute("hidden");
      else h.setAttribute("hidden", "");
    });
    document.getElementById("act").addEventListener("click", () => {
      if (window.SceneKit && SceneKit.toast) SceneKit.toast("已执行主操作", "ok");
    });
  </script>
</body>
</html>
