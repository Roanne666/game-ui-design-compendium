<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>战术军事 — 界面</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/game-feel.css" />
  <link rel="stylesheet" href="../../lib/styles/tactical-military.css" />
  <style>
    .compass {
      width:100px; height:100px; border:2px solid var(--border); border-radius:50%;
      display:flex; align-items:center; justify-content:center; position:relative;
      font-family:var(--font-mono); font-size:12px;
    }
    .compass img { width:20px; height:20px; position:absolute; top:8px; }
    .compass .deg { font-size:18px; font-weight:700; }
    .stance-group { display:flex; gap:6px; flex-wrap:wrap; }
    .stance-group .btn.active { border-color:var(--accent); background:var(--accent-soft); }
    .bottom-row { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; width:min(720px,92vw); }
    .ammo-panel { min-width:200px; }
    .icon { width:22px; height:22px; vertical-align:middle; }
    .hint { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--text-muted); letter-spacing:.08em; pointer-events:none; }
  </style>
</head>
<body>
  <div class="game-root letterbox">
    <div class="game-world has-grid"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="reticle-center"></div>
    <div class="game-hud">
      <div class="hud-anchor-tl">
        <div class="panel frame-brackets" style="min-width:240px">
          <div class="panel-title">姿态</div>
          <div class="panel-body stance-group" id="stance-group">
            <button type="button" class="btn active" data-stance="STAND">站立</button>
            <button type="button" class="btn" data-stance="CROUCH">蹲伏</button>
            <button type="button" class="btn" data-stance="PRONE">卧倒</button>
          </div>
        </div>
      </div>

      <div class="hud-anchor-tc">
        <button type="button" class="compass" id="btn-compass" title="调整方位">
          <img src="../../assets/_shared/kenney/icons/information.png" alt="" />
          <span class="deg" id="compass-deg">274°</span>
          <span style="position:absolute;bottom:10px;font-size:9px;color:var(--text-muted)">北</span>
        </button>
      </div>

      <div class="hud-anchor-tr">
        <div class="panel ammo-panel frame-brackets">
          <div class="panel-title">
            <img class="icon" src="../../assets/_shared/rpg-icons/gun.png" alt="" /> 武器
          </div>
          <div class="panel-body">
            <div class="stat-row"><span class="stat-key">弹匣</span><span class="stat-val" id="ammo-val">24 / 120</span></div>
            <button type="button" class="btn btn-primary" id="btn-reload" style="margin-top:8px;width:100%">换弹</button>
          </div>
        </div>
      </div>

      <div class="hud-anchor-bl bottom-row">
        <div style="flex:1;max-width:320px">
          <div class="hud-bar">
            <span class="hud-bar-label">耐力</span>
            <div class="hud-bar-track"><div id="stm-fill" class="hud-bar-fill success" style="width:100%"></div></div>
            <span id="stm-val" class="hud-bar-value">100</span>
          </div>
          <button type="button" class="btn btn-warning" id="btn-sprint" style="margin-top:8px">
            <img class="icon" src="../../assets/_shared/kenney/icons/play.png" alt="" /> 冲刺
          </button>
        </div>
        <div class="panel frame-brackets" style="min-width:180px">
          <div class="panel-title">状态</div>
          <div class="panel-body">
            <div class="stat-row"><span class="stat-key">姿态</span><span class="stat-val" id="stance-val">站立</span></div>
            <div class="stat-row"><span class="stat-key">方位</span><span class="stat-val" id="bearing-val">274° 西</span></div>
          </div>
        </div>
        <button type="button" class="btn" id="btn-fire" style="align-self:center">
          <img class="icon" src="../../assets/_shared/rpg-icons/bow.png" alt="" /> 点射
        </button>
      </div>

      <p class="hint">姿态 · 换弹 · 罗盘 · 冲刺消耗耐力 · 点射</p>
    </div>
  </div>
  <script src="../../lib/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let mag = 24, reserve = 120, stamina = 100, bearing = 274;
    const bearings = ["北", "东北", "东", "东南", "南", "西南", "西", "西北"];
    const stanceLabels = { STAND: "站立", CROUCH: "蹲伏", PRONE: "卧倒" };

    function syncAmmo() {
      sk.setText(sk.$("#ammo-val"), mag + " / " + reserve);
    }
    function syncStamina() {
      sk.setFill(sk.$("#stm-fill"), stamina);
      sk.setText(sk.$("#stm-val"), String(stamina));
      sk.$("#stm-fill").className = "hud-bar-fill " + (stamina > 40 ? "success" : stamina > 15 ? "warning" : "danger");
    }
    function syncBearing() {
      sk.setText(sk.$("#compass-deg"), bearing + "°");
      const idx = Math.round(bearing / 45) % 8;
      sk.setText(sk.$("#bearing-val"), bearing + "° " + bearings[idx]);
    }

    sk.$all("[data-stance]").forEach((btn) => {
      sk.on(btn, "click", () => {
        sk.$all("[data-stance]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        sk.setText(sk.$("#stance-val"), stanceLabels[btn.dataset.stance]);
        sk.toast("姿态：" + stanceLabels[btn.dataset.stance]);
        sk.pulse(btn);
      });
    });

    sk.on(sk.$("#btn-reload"), "click", () => {
      if (reserve <= 0) {
        sk.toast("备用弹药耗尽", "danger");
        return;
      }
      const need = 30 - mag;
      const take = Math.min(need, reserve);
      mag += take;
      reserve -= take;
      syncAmmo();
      sk.toast("换弹 +" + take, "success");
      sk.pulse(sk.$("#btn-reload"));
    });

    sk.on(sk.$("#btn-compass"), "click", () => {
      bearing = (bearing + 15) % 360;
      syncBearing();
      sk.pulse(sk.$("#btn-compass"));
      sk.toast("方位已更新");
    });

    sk.on(sk.$("#btn-sprint"), "click", () => {
      if (stamina < 12) {
        sk.toast("力竭 — 请喘息恢复", "danger");
        return;
      }
      stamina = Math.max(0, stamina - 12);
      syncStamina();
      sk.toast("冲刺 −12 耐力", "warning");
    });

    sk.on(sk.$("#btn-fire"), "click", () => {
      if (mag <= 0) {
        sk.toast("弹匣已空 — 请换弹！", "danger");
        return;
      }
      const burst = Math.min(3, mag);
      mag -= burst;
      syncAmmo();
      sk.toast("点射 −" + burst + " 发");
    });

    syncAmmo();
    syncStamina();
    syncBearing();
  </script>
</body>
</html>
