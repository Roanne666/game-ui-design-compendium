<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Retro — Battle Command</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/pixel-retro.css" />
  <style>
    body { min-height: 100vh; background: var(--bg); margin: 0; image-rendering: pixelated; }
    .stage { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; box-sizing: border-box; gap: 12px; }
    .enemies { flex: 1; display: flex; align-items: center; justify-content: space-around; padding-top: 48px; }
    .foe { font-family: var(--font-mono); font-size: 12px; color: var(--accent); border: 2px solid var(--border); padding: 24px 16px; background: var(--surface); }
    .party { display: grid; grid-template-columns: 1fr 200px; gap: 8px; }
    .cmds { display: flex; flex-direction: column; gap: 4px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="enemies">
      <div class="foe">SLIME</div>
      <div class="foe">BAT</div>
      <div class="foe">ORC</div>
    </div>
    <div class="party">
      <div class="panel">
        <div class="panel-title">HERO</div>
        <div class="panel-body">
          <div class="hud-bar">
            <span class="hud-bar-label">HP</span>
            <div class="hud-bar-track"><div class="hud-bar-fill danger" style="width:72%"></div></div>
            <span class="hud-bar-value">72</span>
          </div>
          <div class="hud-bar">
            <span class="hud-bar-label">MP</span>
            <div class="hud-bar-track"><div class="hud-bar-fill" style="width:40%;background:var(--accent-2)"></div></div>
            <span class="hud-bar-value">18</span>
          </div>
        </div>
      </div>
      <div class="cmds panel">
        <div class="panel-title">CMD</div>
        <button class="btn btn-primary" style="width:100%">FIGHT</button>
        <button class="btn" style="width:100%">MAGIC</button>
        <button class="btn" style="width:100%">ITEM</button>
        <button class="btn" style="width:100%">RUN</button>
      </div>
    </div>
  </div>
</body>
</html>
