<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Survival Horror — Spine Inventory</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/survival-horror.css" />
  <style>
    body { min-height: 100vh; background: var(--bg); margin: 0; color: var(--text); }
    .wrap { min-height: 100vh; display: grid; grid-template-columns: 80px 1fr; gap: 32px; padding: 40px 32px; box-sizing: border-box; }
    .spine-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 40px; }
    .spine-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--text-muted); writing-mode: vertical-rl; }
    .inv { max-width: 360px; }
    .grid-slots { display: grid; grid-template-columns: repeat(4, 64px); gap: 8px; margin-top: 16px; }
    .note { margin-top: 24px; color: var(--text-muted); font-size: 12px; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spine-wrap">
      <div class="spine-bar-vertical spine-bar">
        <div class="spine-seg vertical on"></div>
        <div class="spine-seg vertical on"></div>
        <div class="spine-seg vertical on"></div>
        <div class="spine-seg vertical warn"></div>
        <div class="spine-seg vertical danger"></div>
        <div class="spine-seg vertical"></div>
        <div class="spine-seg vertical"></div>
        <div class="spine-seg vertical"></div>
      </div>
      <div class="spine-label">VITAL</div>
    </div>
    <div class="inv">
      <div class="panel">
        <div class="panel-title">INVENTORY · 8 SLOTS</div>
        <div class="panel-body">
          <div class="grid-slots">
            <div class="slot has selected">MED<span class="qty">1</span></div>
            <div class="slot has">KEY</div>
            <div class="slot has">AMMO<span class="qty">12</span></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
          </div>
          <p class="note">diegetic spine · scarce grid · no chrome overload</p>
        </div>
      </div>
      <div class="alert warning" style="margin-top:16px">DOOR LOCKED — FIND IDC CARD</div>
    </div>
  </div>
</body>
</html>
