<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hand-drawn — Boon Select</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/hand-drawn.css" />
  <style>
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); }
    .scene { max-width:920px; margin:0 auto; padding:32px 20px; }
    .title { font-family:var(--font-display); font-size:28px; margin:0 0 8px; }
    .subtitle { color:var(--text-muted); margin:0 0 24px; font-size:14px; }
    .nodes { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
    .boon-card {
      border:2px solid var(--border); background:var(--surface); border-radius:var(--radius-lg);
      padding:16px; cursor:pointer; text-align:center; transition:transform .12s, border-color .12s;
    }
    .boon-card:hover { transform:rotate(-1deg) scale(1.02); border-color:var(--accent); }
    .boon-card.selected { border-color:var(--accent); background:var(--accent-soft); box-shadow:4px 4px 0 var(--shadow-color); }
    .boon-card img { width:56px; height:56px; margin-bottom:10px; }
    .boon-card h3 { margin:0 0 6px; font-size:15px; font-family:var(--font-display); }
    .boon-card p { margin:0; font-size:12px; color:var(--text-muted); line-height:1.4; }
    .actions { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    #boon-result { margin-top:20px; }
    .hint { margin-top:16px; font-size:11px; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="scene">
    <h1 class="title">Choose Your Boon</h1>
    <p class="subtitle">The gods offer three paths — pick one, then claim the next blessing.</p>

    <div class="nodes" id="boon-nodes">
      <button type="button" class="boon-card" data-boon="strike" data-next="Your blade thirsts — +15% attack speed on dash strikes.">
        <img src="../../assets/_shared/rpg-icons/sword.png" alt="" />
        <h3>Strike of Hermes</h3>
        <p>Dash attacks deal bonus damage and leave ink trails.</p>
      </button>
      <button type="button" class="boon-card selected" data-boon="ward" data-next="Aegis blooms — blocking restores 8 HP per perfect parry.">
        <img src="../../assets/_shared/rpg-icons/shield.png" alt="" />
        <h3>Aegis Ward</h3>
        <p>Perfect blocks heal and stagger nearby foes.</p>
      </button>
      <button type="button" class="boon-card" data-boon="flux" data-next="Chaos surge — special cooldown −20%, random element each cast.">
        <img src="../../assets/_shared/rpg-icons/fire.png" alt="" />
        <h3>Flux Ember</h3>
        <p>Specials rotate elements and refund mana on kill.</p>
      </button>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="btn-confirm">
        <img src="../../assets/_shared/kenney/icons/checkmark.png" alt="" style="width:18px;height:18px" /> CONFIRM BOON
      </button>
      <button type="button" class="btn" id="btn-reroll">
        <img src="../../assets/_shared/kenney/icons/gear.png" alt="" style="width:18px;height:18px" /> REROLL OFFER
      </button>
      <span class="badge" id="pick-label">Selected: Aegis Ward</span>
    </div>

    <div id="boon-result" class="panel panel-clipped" hidden>
      <div class="panel-title">Next Boon · Epilogue</div>
      <div class="panel-body" id="boon-text">—</div>
      <button type="button" class="btn btn-success" id="btn-continue" style="margin-top:12px">CONTINUE RUN</button>
    </div>

    <p class="hint">Pick a card · confirm · read next boon · reroll or continue</p>
  </div>
  <script src="../../lib/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let selected = sk.$(".boon-card.selected");
    const rerollPool = [
      { icon: "potion.png", name: "Nectar Sip", desc: "Potions heal over time.", next: "Vitality drip — regen 2 HP/s for 8s after potion." },
      { icon: "bow.png", name: "Artemis Reach", desc: "Ranged crits pierce one foe.", next: "Piercing shot — crits chain to a second target at 50% dmg." },
      { icon: "key.png", name: "Skeleton Key", desc: "Unlock hidden chambers.", next: "Secret paths revealed on the map for this biome." },
    ];

    sk.$all(".boon-card").forEach((card) => {
      sk.on(card, "click", () => {
        sk.$all(".boon-card").forEach((c) => c.classList.remove("selected"));
        card.classList.add("selected");
        selected = card;
        sk.setText(sk.$("#pick-label"), "Selected: " + card.querySelector("h3").textContent);
        sk.pulse(card);
      });
    });

    sk.on(sk.$("#btn-confirm"), "click", () => {
      if (!selected) {
        sk.toast("Pick a boon first", "warning");
        return;
      }
      sk.setText(sk.$("#boon-text"), selected.dataset.next);
      sk.openPanel("#boon-result");
      sk.toast("Boon claimed: " + selected.dataset.boon, "success");
      sk.pulse(selected);
    });

    sk.on(sk.$("#btn-reroll"), "click", () => {
      const cards = sk.$all(".boon-card");
      cards.forEach((card, i) => {
        const pick = rerollPool[i % rerollPool.length];
        card.querySelector("img").src = "../../assets/_shared/rpg-icons/" + pick.icon;
        card.querySelector("h3").textContent = pick.name;
        card.querySelector("p").textContent = pick.desc;
        card.dataset.boon = pick.name.toLowerCase().replace(/\s+/g, "-");
        card.dataset.next = pick.next;
      });
      sk.$all(".boon-card").forEach((c) => c.classList.remove("selected"));
      cards[1].classList.add("selected");
      selected = cards[1];
      sk.setText(sk.$("#pick-label"), "Selected: " + selected.querySelector("h3").textContent);
      sk.closePanel("#boon-result");
      sk.toast("New boons offered", "warning");
    });

    sk.on(sk.$("#btn-continue"), "click", () => {
      sk.closePanel("#boon-result");
      sk.toast("Entering next chamber…", "success");
    });
  </script>
</body>
</html>
