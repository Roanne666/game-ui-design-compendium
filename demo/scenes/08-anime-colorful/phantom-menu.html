<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Anime Colorful — Phantom Menu</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/anime-colorful.css" />
  <style>
    body { min-height: 100vh; background: var(--bg); margin: 0; overflow: hidden; }
    .stage { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; }
    .poster { background: var(--accent); clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); display: flex; align-items: flex-end; padding: 48px; }
    .poster h1 { font-family: var(--font-display); font-size: 64px; color: #fff; margin: 0; line-height: 0.95; font-style: italic; transform: skewX(-8deg); }
    .side { display: flex; flex-direction: column; justify-content: center; padding: 48px; gap: 12px; background: #111; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="poster">
      <h1>TAKE<br/>YOUR<br/>HEART</h1>
    </div>
    <div class="side">
      <div class="hero-logo" style="margin-bottom:12px">PHANTOM<span class="accent">.</span></div>
      <div class="menu-list">
        <button class="menu-item-large primary">START</button>
        <button class="menu-item-large">LOAD</button>
        <button class="menu-item-large">CONFIG</button>
        <button class="menu-item-large">EXIT</button>
      </div>
    </div>
  </div>
</body>
</html>
