<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>03 科幻太空 — 竖屏舰桥 HUD</title>
  <link rel="stylesheet" href="hud.css" />
</head>
<body>
  <div id="viewport">
    <div id="world">
      <div class="grid-overlay" aria-hidden="true"></div>
      <div class="target hit" id="target" data-type="hostile">
        <img src="./art/hostile-ship.png" alt="" draggable="false" />
      </div>
    </div>

    <div id="hurt"></div>

    <div id="hud">
      <div class="place" id="place">
        <div class="sys">LHS 3447</div>
        <div class="meta"><span id="nav-mode">超巡航</span> · 燃料 16.2 T</div>
      </div>

      <div class="target-badge" id="target-badge">目标 · 12.4 公里 · 未锁定</div>
      <div class="prompt" id="prompt">点按锁定 · 再开火</div>
      <div id="feed"></div>

      <div class="vitals" id="vitals">
        <div class="vital hull">
          <span class="lab">船体</span>
          <div class="trk"><div class="fill ok" id="hull-fill"></div></div>
          <span class="n" id="hull-n">88%</span>
        </div>
        <div class="vital shield">
          <span class="lab">护盾</span>
          <div class="trk"><div class="fill" id="shield-fill"></div></div>
          <span class="n" id="shield-n">33%</span>
        </div>
      </div>

      <div class="pwr-dock" id="pwr-dock">
        <button type="button" class="pwr-chip hit on" data-sys="engines" aria-label="引擎能量">
          <span class="lab">引擎</span>
          <span class="val" id="pwr-engines">42</span>
        </button>
        <button type="button" class="pwr-chip hit" data-sys="shields" aria-label="护盾能量">
          <span class="lab">护盾</span>
          <span class="val" id="pwr-shields">33</span>
        </button>
        <button type="button" class="pwr-chip hit" data-sys="weapons" aria-label="武器能量">
          <span class="lab">武器</span>
          <span class="val" id="pwr-weapons">25</span>
        </button>
      </div>

      <div class="nav-slate" id="nav-slate">
        <h2>导航 · 舰桥</h2>
        <div class="row"><span>系统</span><span>LHS 3447</span></div>
        <div class="row"><span>模式</span><span id="slate-mode">超巡航</span></div>
        <div class="row"><span>燃料</span><span>16.2 T</span></div>
        <div class="row"><span>通讯</span><span>空管许可通过</span></div>
        <div class="actions">
          <button type="button" id="slate-mode-btn">切换模式</button>
          <button type="button" id="slate-close">关闭</button>
        </div>
      </div>

      <div class="touch-pad">
        <button type="button" class="t-btn t-lock hit" id="btn-lock" aria-label="锁定目标">
          <img class="ico" src="./art/icons/icon-lock.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-mode hit" id="btn-mode" aria-label="驱动模式">
          <img class="ico" src="./art/icons/icon-mode.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-nav hit" id="btn-nav" aria-label="导航面板">
          <img class="ico" src="./art/icons/icon-nav.png" alt="" draggable="false" />
        </button>
        <button type="button" class="t-btn t-fire hit" id="btn-fire" aria-label="开火" disabled>
          <img class="ico" src="./art/icons/icon-fire.png" alt="" draggable="false" />
        </button>
      </div>

      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" title="操作指引">
        <img class="ico" src="./art/icons/icon-help.png" alt="" draggable="false" />
      </button>
      <div class="help" id="help" hidden>拖动环视 · 点目标或左下锁定 · 锁定后右下开火 · 中下点能量格调配 · 右侧导航/模式</div>
    </div>
  </div>

  <script>
(function () {
  const pwr = { engines: 42, shields: 33, weapons: 25 };
  const modes = ["超巡航", "巡航", "手动"];
  let modeIdx = 0;
  let hull = 88;
  let locked = false;
  let lockPct = 0;
  let lookX = 0, lookY = 0;
  let vitalsUntil = 0;

  const $ = (s) => document.querySelector(s);
  const world = $("#world");
  const target = $("#target");
  const badge = $("#target-badge");
  const prompt = $("#prompt");
  const fireBtn = $("#btn-fire");
  const lockBtn = $("#btn-lock");
  const feed = $("#feed");
  const hurt = $("#hurt");
  const vitals = $("#vitals");

  function toast(msg, cls) {
    const line = document.createElement("div");
    line.className = "line" + (cls ? " " + cls : "");
    line.textContent = msg;
    feed.prepend(line);
    while (feed.children.length > 4) feed.lastChild.remove();
  }

  function showVitals(ms) {
    vitalsUntil = performance.now() + (ms || 2800);
    vitals.classList.remove("dim");
  }

  function syncPwr() {
    ["engines", "shields", "weapons"].forEach((k) => {
      const el = $("#pwr-" + k);
      if (el) el.textContent = String(pwr[k]);
    });
    const shieldFill = $("#shield-fill");
    const shieldN = $("#shield-n");
    if (shieldFill) shieldFill.style.transform = "scaleX(" + (pwr.shields / 100) + ")";
    if (shieldN) shieldN.textContent = pwr.shields + "%";
  }

  function boostSys(key) {
    const others = Object.keys(pwr).filter((k) => k !== key);
    let take = 8;
    others.forEach((k) => {
      const give = Math.min(take, pwr[k]);
      pwr[k] -= give;
      take -= give;
      pwr[key] += give;
    });
    document.querySelectorAll(".pwr-chip").forEach((c) => {
      c.classList.toggle("on", c.dataset.sys === key);
    });
    syncPwr();
    showVitals();
    const names = { engines: "引擎", shields: "护盾", weapons: "武器" };
    toast(names[key] + " +" + (8 - take) + "%", "ok");
  }

  function syncHull() {
    const fill = $("#hull-fill");
    const n = $("#hull-n");
    fill.style.transform = "scaleX(" + (hull / 100) + ")";
    n.textContent = hull + "%";
    fill.className = "fill " + (hull > 50 ? "ok" : hull > 25 ? "warn" : "danger");
  }

  function setLock(on) {
    locked = on;
    if (!on) lockPct = 0;
    target.classList.toggle("locked", on);
    lockBtn.classList.toggle("on", on);
    fireBtn.disabled = !on;
    fireBtn.classList.toggle("armed", on);
    badge.classList.toggle("hot", on);
    badge.textContent = on
      ? "目标 · 已锁定 · 可开火"
      : (lockPct > 0 ? "目标 · 锁定中 " + lockPct + "%" : "目标 · 12.4 公里 · 未锁定");
    prompt.classList.toggle("show", !on);
    prompt.textContent = on ? "右下开火" : "点按锁定 · 再开火";
  }

  function progressLock() {
    if (locked) {
      setLock(false);
      toast("锁定已解除");
      return;
    }
    lockPct = Math.min(100, lockPct + 34);
    badge.textContent = "目标 · 锁定中 " + lockPct + "%";
    if (lockPct >= 100) {
      setLock(true);
      toast("目标已锁定", "ok");
    } else {
      toast("正在锁定… " + lockPct + "%");
    }
  }

  function flashHurt() {
    hurt.classList.add("on");
    setTimeout(() => hurt.classList.remove("on"), 320);
  }

  function fire() {
    if (!locked) {
      toast("未锁定目标", "warn");
      return;
    }
    const dmg = 8 + Math.floor(pwr.weapons / 10);
    toast("命中 · 伤害 " + dmg, "ok");
    if (Math.random() < 0.45) {
      const ret = Math.max(4, 14 - Math.floor(pwr.shields / 10));
      hull = Math.max(0, hull - ret);
      syncHull();
      showVitals();
      flashHurt();
      toast(hull <= 0 ? "船体破裂" : "敌方回击 −" + ret + "%", hull <= 25 ? "danger" : "warn");
    }
  }

  function setMode(i) {
    modeIdx = i;
    const m = modes[modeIdx];
    $("#nav-mode").textContent = m;
    $("#slate-mode").textContent = m;
    toast("驱动：" + m);
  }

  /* Power chips */
  document.querySelectorAll(".pwr-chip").forEach((btn) => {
    btn.addEventListener("click", () => boostSys(btn.dataset.sys));
  });

  lockBtn.addEventListener("click", progressLock);
  target.addEventListener("click", progressLock);
  fireBtn.addEventListener("click", fire);

  $("#btn-mode").addEventListener("click", () => setMode((modeIdx + 1) % modes.length));
  $("#btn-nav").addEventListener("click", () => {
    $("#nav-slate").classList.toggle("open");
  });
  $("#slate-close").addEventListener("click", () => $("#nav-slate").classList.remove("open"));
  $("#slate-mode-btn").addEventListener("click", () => setMode((modeIdx + 1) % modes.length));

  $("#btn-help").addEventListener("click", () => {
    const h = $("#help");
    if (h.hasAttribute("hidden")) h.removeAttribute("hidden");
    else h.setAttribute("hidden", "");
  });

  /* Drag look */
  let dragging = false, lx = 0, ly = 0;
  const vp = $("#viewport");
  function onDown(e) {
    if (e.target.closest(".hit")) return;
    dragging = true;
    const t = e.touches ? e.touches[0] : e;
    lx = t.clientX; ly = t.clientY;
  }
  function onMove(e) {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    lookX = Math.max(-18, Math.min(18, lookX + (t.clientX - lx) * 0.08));
    lookY = Math.max(-12, Math.min(12, lookY + (t.clientY - ly) * 0.08));
    lx = t.clientX; ly = t.clientY;
    world.style.transform = "translate(" + lookX + "px," + lookY + "px)";
  }
  function onUp() { dragging = false; }
  vp.addEventListener("pointerdown", onDown);
  vp.addEventListener("pointermove", onMove);
  vp.addEventListener("pointerup", onUp);
  vp.addEventListener("pointercancel", onUp);

  function tick(now) {
    if (now > vitalsUntil) vitals.classList.add("dim");
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  syncPwr();
  syncHull();
  setLock(false);
  showVitals(4000);
})();
  </script>
</body>
</html>
