<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sci-Fi Space — Bridge Holo</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/scifi-space.css" />
  <style>
    body { min-height: 100vh; background: var(--bg); margin: 0; color: var(--text); }
    .bridge { display: grid; grid-template-columns: 1fr 280px 1fr; gap: 16px; padding: 24px; min-height: 100vh; box-sizing: border-box; }
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .reticle { width: 180px; height: 180px; border: 1px solid var(--accent); border-radius: 50%; position: relative; box-shadow: 0 0 24px var(--glow); }
    .reticle::after { content: ""; position: absolute; inset: 20%; border: 1px dashed var(--border); border-radius: 50%; }
    .sys { display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
  <div class="bridge">
    <div class="sys">
      <div class="panel">
        <div class="panel-title">PWR DIST</div>
        <div class="panel-body">
          <div class="stat-row"><span class="stat-key">ENGINES</span><span class="stat-val">42%</span></div>
          <div class="stat-row"><span class="stat-key">SHIELDS</span><span class="stat-val">33%</span></div>
          <div class="stat-row"><span class="stat-key">WEAPONS</span><span class="stat-val">25%</span></div>
        </div>
      </div>
      <div class="hud-bar">
        <span class="hud-bar-label">HULL</span>
        <div class="hud-bar-track"><div class="hud-bar-fill success" style="width:88%"></div></div>
        <span class="hud-bar-value">88%</span>
      </div>
    </div>
    <div class="center">
      <div class="reticle"></div>
      <div class="ring" style="width:72px;height:72px">
        <svg viewBox="0 0 36 36">
          <circle class="ring-track" cx="18" cy="18" r="15.5" />
          <circle class="ring-fill" cx="18" cy="18" r="15.5" stroke-dasharray="70 100" />
        </svg>
        <div class="ring-label">LOCK</div>
      </div>
      <span class="badge">TARGET · 12.4 km</span>
    </div>
    <div class="sys">
      <div class="panel">
        <div class="panel-title">NAV</div>
        <div class="panel-body">
          <div class="stat-row"><span class="stat-key">SYS</span><span class="stat-val">LHS 3447</span></div>
          <div class="stat-row"><span class="stat-key">MODE</span><span class="stat-val">SUPERCRUISE</span></div>
          <div class="stat-row"><span class="stat-key">FUEL</span><span class="stat-val">16.2 T</span></div>
        </div>
      </div>
      <div class="alert">COMMS · ATC CLEARANCE</div>
    </div>
  </div>
</body>
</html>
