<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>02 黑暗奇幻 — 竖屏魂类 HUD</title>
  <link rel="stylesheet" href="hud.css" />
</head>
<body>
  <div id="viewport">
    <div id="world">
      <div class="fog"></div>

      <div class="bonfire hit" id="bonfire" data-type="bonfire">
        <img src="./art/bonfire.png" alt="" draggable="false" />
      </div>

      <div class="enemy hit" id="enemy" data-type="enemy" data-name="废墟守卫">
        <img class="body" src="./art/hollow.png" alt="" draggable="false" />
      </div>

      <div class="loot hit" id="loot" data-type="loot" hidden></div>
    </div>

    <div id="hurt"></div>

    <div id="hud">
      <div class="place" id="place">
        <div>宁姆格福 · 废墟</div>
        <div class="rest-hint">篝火近前 · 点按休息</div>
      </div>

      <div class="vitals" id="vitals">
        <div class="vital hp" id="hp-row">
          <span class="lab">生命</span>
          <div class="trk"><div class="fill" id="hp-fill"></div></div>
        </div>
        <div class="vital fp">
          <span class="lab">集中</span>
          <div class="trk"><div class="fill" id="fp-fill"></div></div>
        </div>
        <div class="vital st">
          <span class="lab">耐力</span>
          <div class="trk"><div class="fill" id="st-fill"></div></div>
        </div>
      </div>

      <button type="button" class="estus-slot hit" id="btn-estus" aria-label="黄金种子露滴">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 3h6v2.2c0 .8-.3 1.5-.9 2L12.8 9v1.2c2.4.5 4.2 2.6 4.2 5.1V21H7v-5.7c0-2.5 1.8-4.6 4.2-5.1V9L9.9 7.2c-.6-.5-.9-1.2-.9-2V3z"/>
          <path d="M10 15.5h4"/>
        </svg>
        <span class="n" id="estus-n">3</span>
      </button>

      <div class="prompt" id="prompt"></div>
      <div id="feed"></div>

      <div class="slate" id="slate">
        <h2>篝火</h2>
        <button type="button" id="slate-rest">休息</button>
        <button type="button" id="slate-leave">离开</button>
      </div>

      <div class="touch-pad">
        <button type="button" class="t-btn t-lock hit" id="btn-lock" aria-label="锁定">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3.2"/>
            <path d="M12 3v3.2M12 17.8V21M3 12h3.2M17.8 12H21"/>
            <path d="M6.2 6.2l2.2 2.2M15.6 15.6l2.2 2.2M17.8 6.2l-2.2 2.2M8.4 15.6l-2.2 2.2"/>
          </svg>
        </button>
        <button type="button" class="t-btn t-use hit" id="btn-use" aria-label="互动">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 11V7.5a1.8 1.8 0 0 1 3.6 0V11"/>
            <path d="M11.6 11V8.2a1.5 1.5 0 0 1 3 0V12"/>
            <path d="M14.6 12v-2a1.4 1.4 0 0 1 2.8 0v4.6c0 3.2-2 5.4-5.4 5.4H11c-2.8 0-4.6-1.5-5.4-3.6L4 13.2a1.3 1.3 0 0 1 2.3-1.2L8 15"/>
          </svg>
        </button>
        <button type="button" class="t-btn t-roll hit" id="btn-roll" aria-label="翻滚">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 15c2.5-4 6-6.5 11-6.5"/>
            <path d="M13.5 5.5L16.5 8.5 13.5 11.5"/>
            <path d="M6 18.5h8.5"/>
          </svg>
        </button>
        <button type="button" class="t-btn t-attack hit" id="btn-attack" aria-label="攻击">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.5 3.5l6 6-9.2 9.2-3.3.8.8-3.3z"/>
            <path d="M13.2 5.8l5 5"/>
            <path d="M4 20l3.2-3.2"/>
          </svg>
        </button>
      </div>

      <button type="button" class="help-toggle hit" id="btn-help" aria-label="操作指引" title="操作指引">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="8.5"/>
          <path d="M9.6 9.4a2.5 2.5 0 0 1 4.7 1.1c0 1.5-2.3 2-2.3 3.5"/>
          <circle cx="12" cy="17" r="0.7" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <div class="help" id="help" hidden>拖动环视 · 点敌人锁定 · 右下攻击/翻滚 · 左下按住锁定 · 点露滴回血 · 靠近篝火休息</div>
    </div>
  </div>

  <script>
(function () {
  const state = {
    hp: 620, hpMax: 1000,
    fp: 80, fpMax: 100,
    st: 100, stMax: 100,
    estus: 3, estusMax: 3,
    lock: false,
    nearBonfire: false,
    slate: false,
    enemyHp: 180,
    enemyAlive: true,
    lookX: 0, lookY: 0,
    vitalsUntil: 0,
    iFrames: 0,
  };

  const $ = (s) => document.querySelector(s);
  const world = $("#world");
  const enemy = $("#enemy");
  const loot = $("#loot");

  function feed(msg) {
    const el = document.createElement("div");
    el.textContent = msg;
    $("#feed").prepend(el);
    setTimeout(() => el.remove(), 2200);
  }

  function showVitals() {
    state.vitalsUntil = Date.now() + 2200;
    $("#vitals").classList.add("show");
  }

  function sync() {
    $("#hp-fill").style.width = (state.hp / state.hpMax) * 100 + "%";
    $("#fp-fill").style.width = (state.fp / state.fpMax) * 100 + "%";
    $("#st-fill").style.width = (state.st / state.stMax) * 100 + "%";
    $("#hp-row").classList.toggle("low", state.hp / state.hpMax < 0.28);
    $("#estus-n").textContent = String(state.estus);
    $("#btn-estus").disabled = state.estus <= 0;
    $("#place").classList.toggle("near", state.nearBonfire);
    $("#slate").classList.toggle("open", state.slate);
    enemy.classList.toggle("locked", state.lock && state.enemyAlive);
    enemy.classList.toggle("dead", !state.enemyAlive);
    if (Date.now() < state.vitalsUntil) $("#vitals").classList.add("show");
    else $("#vitals").classList.remove("show");
  }

  function setPrompt(text) {
    const p = $("#prompt");
    if (!text) { p.classList.remove("show"); p.textContent = ""; return; }
    p.textContent = text;
    p.classList.add("show");
  }

  function hurt(amount) {
    if (state.iFrames > 0 || state.slate) return;
    state.hp = Math.max(0, state.hp - amount);
    showVitals();
    $("#hurt").classList.add("on");
    setTimeout(() => $("#hurt").classList.remove("on"), 280);
    feed(state.hp <= 0 ? "死去" : "受伤");
    if (state.hp <= 0) {
      setTimeout(() => {
        state.hp = Math.floor(state.hpMax * 0.4);
        state.st = state.stMax;
        state.estus = Math.max(1, state.estus);
        feed("于废墟中苏醒");
        showVitals();
        sync();
      }, 1600);
    }
    sync();
  }

  function spendStam(n) {
    if (state.st < n) { feed("耐力不足"); return false; }
    state.st -= n;
    showVitals();
    return true;
  }

  function attack() {
    if (state.slate || !state.enemyAlive) return;
    if (!spendStam(18)) return;
    if (state.lock) {
      state.enemyHp -= 35 + Math.random() * 20;
      feed("命中 · " + Math.max(0, Math.round(state.enemyHp)));
      if (state.enemyHp <= 0) {
        state.enemyAlive = false;
        state.lock = false;
        loot.hidden = false;
        feed("敌人倒下 · 光点出现");
      } else if (Math.random() < 0.35) {
        setTimeout(() => hurt(40 + Math.random() * 30), 280);
      }
    } else {
      feed("挥空");
    }
    sync();
  }

  function roll() {
    if (state.slate) return;
    if (!spendStam(28)) return;
    state.iFrames = 8;
    feed("翻滚");
    sync();
  }

  function drinkEstus() {
    if (state.estus <= 0 || state.hp >= state.hpMax) return;
    state.estus -= 1;
    state.hp = Math.min(state.hpMax, state.hp + 280);
    showVitals();
    feed("喝下琥珀露滴");
    sync();
  }

  function useAction() {
    if (state.nearBonfire) {
      state.slate = true;
      setPrompt("");
      sync();
      return;
    }
    if (!loot.hidden) {
      loot.hidden = true;
      state.estus = Math.min(state.estusMax, state.estus + 1);
      feed("拾取 · 露滴残渣");
      sync();
      return;
    }
    if (state.enemyAlive) {
      state.lock = !state.lock;
      feed(state.lock ? "锁定 · 废墟守卫" : "解除锁定");
      sync();
    }
  }

  function rest() {
    state.hp = state.hpMax;
    state.fp = state.fpMax;
    state.st = state.stMax;
    state.estus = state.estusMax;
    state.slate = false;
    state.enemyHp = 180;
    state.enemyAlive = true;
    loot.hidden = true;
    state.lock = false;
    showVitals();
    feed("于篝火旁休息");
    sync();
  }

  function applyLook() {
    world.style.transform = `translate(${-state.lookX}px, ${-state.lookY}px)`;
  }

  function updateNear() {
    const dx = Math.abs(state.lookX);
    const dy = Math.abs(state.lookY + 4);
    state.nearBonfire = dx < 14 && dy < 12;
    if (state.nearBonfire && !state.slate) setPrompt("点按「互动」· 篝火");
    else if (!loot.hidden) setPrompt("点按「互动」· 拾取");
    else if (state.lock) setPrompt("锁定中 · 点按攻击");
    else setPrompt("");
  }

  // Pointer: look / tap
  const vp = $("#viewport");
  let drag = null;

  vp.addEventListener("pointerdown", (e) => {
    if (e.target.closest(".hit") || e.target.closest(".slate")) return;
    drag = {
      id: e.pointerId,
      x: e.clientX,
      y: e.clientY,
      moved: false,
      lookX: state.lookX,
      lookY: state.lookY,
    };
    try { vp.setPointerCapture(e.pointerId); } catch (_) {}
  });
  vp.addEventListener("pointermove", (e) => {
    if (!drag || drag.id !== e.pointerId) return;
    const dx = e.clientX - drag.x;
    const dy = e.clientY - drag.y;
    if (Math.hypot(dx, dy) > 8) drag.moved = true;
    state.lookX = Math.max(-30, Math.min(30, drag.lookX - dx * 0.08));
    state.lookY = Math.max(-18, Math.min(18, drag.lookY - dy * 0.08));
    applyLook();
    updateNear();
  });
  vp.addEventListener("pointerup", (e) => {
    if (!drag || drag.id !== e.pointerId) return;
    drag = null;
  });
  vp.addEventListener("contextmenu", (e) => e.preventDefault());

  $("#bonfire").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    state.nearBonfire = true;
    useAction();
  });
  $("#enemy").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    if (!state.enemyAlive) return;
    state.lock = true;
    feed("锁定 · 废墟守卫");
    sync();
  });
  loot.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    useAction();
  });

  $("#btn-attack").addEventListener("pointerdown", (e) => {
    e.preventDefault(); e.stopPropagation(); attack();
  });
  $("#btn-roll").addEventListener("pointerdown", (e) => {
    e.preventDefault(); e.stopPropagation(); roll();
  });
  $("#btn-use").addEventListener("pointerdown", (e) => {
    e.preventDefault(); e.stopPropagation(); useAction();
  });
  $("#btn-estus").addEventListener("pointerdown", (e) => {
    e.preventDefault(); e.stopPropagation(); drinkEstus();
  });

  const lockBtn = $("#btn-lock");
  function lockStart(e) {
    e.preventDefault(); e.stopPropagation();
    if (!state.enemyAlive) return;
    state.lock = true;
    lockBtn.classList.add("pressed");
    feed("锁定");
    sync();
  }
  function lockEnd(e) {
    e.preventDefault(); e.stopPropagation();
    lockBtn.classList.remove("pressed");
  }
  lockBtn.addEventListener("pointerdown", lockStart);
  lockBtn.addEventListener("pointerup", lockEnd);
  lockBtn.addEventListener("pointerleave", lockEnd);
  lockBtn.addEventListener("pointercancel", lockEnd);

  $("#slate-rest").addEventListener("click", rest);
  $("#slate-leave").addEventListener("click", () => {
    state.slate = false;
    sync();
  });

  const help = $("#help");
  const helpBtn = $("#btn-help");
  helpBtn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    const open = help.hidden;
    help.hidden = !open;
    document.body.classList.toggle("help-open", open);
  });

  setInterval(() => {
    if (state.iFrames > 0) state.iFrames -= 1;
    if (!state.slate) state.st = Math.min(state.stMax, state.st + 1.1);
    if (state.st < state.stMax) showVitals();
    updateNear();
    sync();
  }, 100);

  feed("废墟中回响着篝火的噼啪声");
  showVitals();
  sync();
})();
  </script>
</body>
</html>
