<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dark Fantasy — Souls HUD</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/dark-fantasy.css" />
  <style>
    body { min-height: 100vh; background: #0a0908; margin: 0; }
    .world { min-height: 100vh; background: radial-gradient(ellipse at 50% 40%, #1a1510 0%, #0a0908 70%); position: relative; }
    .hud { position: absolute; bottom: 48px; left: 48px; width: 320px; }
    .fp { position: absolute; bottom: 48px; right: 48px; width: 120px; text-align: center; }
    .fp .label { font-family: var(--font-display); color: var(--text-muted); font-size: 12px; letter-spacing: 0.2em; margin-bottom: 8px; }
    .hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: var(--text-muted); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="world">
    <div class="hud">
      <div class="hud-bar">
        <span class="hud-bar-label">HP</span>
        <div class="hud-bar-track"><div class="hud-bar-fill danger" style="width:38%"></div></div>
      </div>
      <div class="hud-bar">
        <span class="hud-bar-label">FP</span>
        <div class="hud-bar-track"><div class="hud-bar-fill" style="width:70%;background:var(--accent)"></div></div>
      </div>
      <div class="hud-bar">
        <span class="hud-bar-label">ST</span>
        <div class="hud-bar-track"><div class="hud-bar-fill success" style="width:55%"></div></div>
      </div>
    </div>
    <div class="fp">
      <div class="label">FLASK</div>
      <div class="arc-bar">
        <div class="arc-track"><div class="arc-fill" style="height:45%"></div></div>
        <div class="arc-value">2</div>
      </div>
    </div>
    <div class="hint">no permanent chrome — UI fades into the dark</div>
  </div>
</body>
</html>
