<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Synthwave — Neon Title</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/synthwave-neon.css" />
  <style>
    body { min-height: 100vh; margin: 0; background: var(--bg); overflow: hidden; }
    .stage {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      background:
        linear-gradient(180deg, transparent 55%, rgba(255,0,255,0.15) 55%, transparent 56%),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,255,255,0.08) 40px, rgba(0,255,255,0.08) 41px),
        radial-gradient(ellipse at 50% 20%, #3a0066 0%, var(--bg) 60%);
    }
    .logo { font-family: var(--font-display); font-size: 72px; letter-spacing: 0.2em; color: #fff;
      text-shadow: 0 0 12px var(--glow), 0 0 32px var(--accent-2); margin: 0; }
    .sub { font-family: var(--font-mono); color: var(--accent-2); letter-spacing: 0.35em; font-size: 12px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="sub">PRESS START · 198X</div>
    <h1 class="logo">NEON DRIVE</h1>
    <div class="menu-list" style="align-items:center">
      <button class="menu-item-large primary">START GAME</button>
      <button class="menu-item-large">HIGH SCORES</button>
      <button class="menu-item-large">OPTIONS</button>
    </div>
    <div class="loading" style="width:240px">
      <div class="loading-bar"><div class="loading-fill" style="width:66%"></div></div>
      <div class="loading-tip">INSERT CASSETTE</div>
    </div>
  </div>
</body>
</html>
