<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cyberpunk — Gameplay HUD</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/cyberpunk.css" />
  <style>
    body { min-height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
    .scene { position: relative; width: 100vw; height: 100vh; background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.03) 2px, rgba(0,255,255,0.03) 4px); }
    .top { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; gap: 16px; }
    .left { width: 280px; }
    .right { width: 220px; text-align: right; }
    .bottom { position: absolute; bottom: 20px; left: 16px; display: flex; gap: 24px; align-items: flex-end; }
    .quest { position: absolute; top: 80px; right: 16px; width: 260px; }
    .coord { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--letter-spacing); color: var(--accent-2); }
  </style>
</head>
<body>
  <div class="scene">
    <div class="top">
      <div class="left">
        <div class="hud-bar">
          <span class="hud-bar-label">HP</span>
          <div class="hud-bar-track"><div class="hud-bar-fill danger" style="width:62%"></div></div>
          <span class="hud-bar-value">620</span>
        </div>
        <div class="hud-bar">
          <span class="hud-bar-label">CYBER</span>
          <div class="hud-bar-track"><div class="hud-bar-fill" style="width:40%;background:var(--accent-2)"></div></div>
          <span class="hud-bar-value">40%</span>
        </div>
      </div>
      <div class="right">
        <div class="coord">NIGHT CITY // WATSON</div>
        <div class="coord">47.291 / -122.084</div>
        <span class="badge accent">SCAN ON</span>
      </div>
    </div>
    <div class="quest">
      <div class="alert warning">[ JOB ] Meet fixer at Afterlife</div>
      <div class="alert">OBJ: Ripperdoc · 240m</div>
    </div>
    <div class="bottom">
      <div class="panel" style="min-width:160px">
        <div class="panel-title">WEAPON</div>
        <div class="panel-body">
          <div class="stat-row"><span class="stat-key">AMMO</span><span class="stat-val">24 / 120</span></div>
          <div class="stat-row"><span class="stat-key">MODE</span><span class="stat-val">SEMI</span></div>
        </div>
      </div>
      <button class="btn btn-primary">[ QUICKHACK ]</button>
    </div>
  </div>
</body>
</html>
