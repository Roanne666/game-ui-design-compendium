<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cartoon Comic — Shop</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/styles/cartoon-comic.css" />
  <style>
    body { min-height: 100vh; background: var(--bg); margin: 0; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px; }
    .title { font-family: var(--font-display); font-size: 42px; color: var(--text); margin: 0 0 8px; text-shadow: 4px 4px 0 var(--shadow-color); }
    .cash { font-family: var(--font-mono); margin-bottom: 20px; }
    .list { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">GUN SHOP!!</h1>
    <div class="cash"><span class="badge accent">$</span> <strong>12,450</strong></div>
    <div class="list">
      <div class="store-item affordable">
        <div class="icon">🔫</div>
        <div class="info">
          <div class="name">Boomstick</div>
          <div class="desc">Big knockback. Bigger bang.</div>
        </div>
        <div class="price">$800</div>
      </div>
      <div class="store-item affordable">
        <div class="icon">💣</div>
        <div class="info">
          <div class="name">Kaboom Grenade</div>
          <div class="desc">Throw. Run. Smile.</div>
        </div>
        <div class="price">$250</div>
      </div>
      <div class="store-item locked">
        <div class="icon">🛡</div>
        <div class="info">
          <div class="name">Riot Jacket</div>
          <div class="desc">Locked — beat boss 2</div>
        </div>
        <div class="price">$2,000</div>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px">
      <button class="btn btn-primary">BUY</button>
      <button class="btn btn-danger">EXIT</button>
    </div>
  </div>
</body>
</html>
