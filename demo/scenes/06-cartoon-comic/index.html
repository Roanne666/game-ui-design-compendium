<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>卡通漫画 — 枪械商店</title>
  <link rel="stylesheet" href="../../lib/components.css" />
  <link rel="stylesheet" href="../../lib/game-feel.css" />
  <link rel="stylesheet" href="../../lib/styles/cartoon-comic.css" />
  <style>
    .game-world {
      background:
        radial-gradient(ellipse 70% 50% at 30% 60%, color-mix(in srgb, var(--accent-2) 20%, transparent), transparent),
        linear-gradient(180deg, #87ceeb 0%, #5a9e4a 45%, #3d6b2e 100%);
    }
    .game-world::before { opacity: 0.15; }
    .cash-bar {
      display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:18px;
      padding:10px 14px; background:var(--surface); border:3px solid var(--border-strong);
      box-shadow:4px 4px 0 var(--shadow-color);
    }
    .cash-bar img { width:28px; height:28px; }
    .vendor-panel {
      width:min(380px,44vw); max-height:72vh; overflow:auto;
      background:var(--surface); border:4px solid var(--border-strong);
      box-shadow:6px 6px 0 var(--shadow-color); padding:16px;
    }
    .vendor-title {
      font-family:var(--font-display); font-size:32px; margin:0 0 12px;
      text-shadow:3px 3px 0 var(--shadow-color); display:flex; align-items:center; gap:10px;
    }
    .vendor-title img { width:40px; height:40px; }
    .list { display:flex; flex-direction:column; gap:10px; }
    .store-item { cursor:pointer; }
    .store-item.selected { outline:3px solid var(--accent); transform:scale(1.01); }
    .store-item .icon img { width:36px; height:36px; }
    .store-item .icon { display:flex; align-items:center; justify-content:center; }
    .footer { margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; }
    .hint { position:absolute; bottom:8px; left:18px; font-size:11px; color:var(--text-muted); pointer-events:none; }
  </style>
</head>
<body>
  <div class="game-root letterbox">
    <div class="game-world"></div>
    <div class="meta-vignette" id="vignette"></div>
    <div class="game-hud">
      <div class="hud-anchor-tl cash-bar">
        <img src="../../assets/_shared/rpg-icons/coins.png" alt="" />
        <span class="badge accent">现金</span>
        <strong id="cash-val">$12,450</strong>
      </div>

      <div class="hud-anchor-br vendor-panel">
        <h1 class="vendor-title">
          <img src="../../assets/_shared/rpg-icons/shop.png" alt="" /> 枪械商店！！
        </h1>
        <div class="list" id="shop-list">
          <div class="store-item affordable selected" data-id="boom" data-price="800" data-name="轰隆枪">
            <div class="icon"><img src="../../assets/_shared/rpg-icons/gun.png" alt="" /></div>
            <div class="info">
              <div class="name">轰隆枪</div>
              <div class="desc">大击退。更大爆炸。</div>
            </div>
            <div class="price">$800</div>
          </div>
          <div class="store-item affordable" data-id="kaboom" data-price="250" data-name="咔砰手雷">
            <div class="icon"><img src="../../assets/_shared/rpg-icons/fire.png" alt="" /></div>
            <div class="info">
              <div class="name">咔砰手雷</div>
              <div class="desc">扔。跑。笑。</div>
            </div>
            <div class="price">$250</div>
          </div>
          <div class="store-item locked" data-id="riot" data-price="2000" data-name="防暴夹克">
            <div class="icon"><img src="../../assets/_shared/kenney/icons/locked.png" alt="" /></div>
            <div class="info">
              <div class="name">防暴夹克</div>
              <div class="desc">已锁定 — 击败 Boss 2</div>
            </div>
            <div class="price">$2,000</div>
          </div>
        </div>
        <div class="footer">
          <button type="button" class="btn btn-primary" id="btn-buy">购买选中</button>
          <button type="button" class="btn" id="btn-haggle">砍价（−10%）</button>
          <button type="button" class="btn btn-danger" id="btn-exit">离开商店</button>
        </div>
      </div>

      <p class="hint">选择商品 · 购买 · 砍价一次 · 锁定商品会提示 · 离开</p>
    </div>
  </div>
  <script src="../../lib/scene-kit.js"></script>
  <script>
    const sk = SceneKit;
    let cash = 12450;
    let haggled = false;
    let selected = sk.$(".store-item.selected");

    function syncCash() {
      sk.setText(sk.$("#cash-val"), "$" + cash.toLocaleString());
    }

    sk.$all(".store-item").forEach((item) => {
      sk.on(item, "click", () => {
        if (item.classList.contains("locked")) {
          sk.toast("已锁定 — 请先击败 Boss 2！", "danger");
          return;
        }
        sk.$all(".store-item").forEach((i) => i.classList.remove("selected"));
        item.classList.add("selected");
        selected = item;
        sk.toast("已选：" + item.dataset.name);
      });
    });

    function priceOf(item) {
      let p = parseInt(item.dataset.price, 10);
      if (haggled && item.dataset.id !== "riot") p = Math.floor(p * 0.9);
      return p;
    }

    sk.on(sk.$("#btn-buy"), "click", () => {
      if (!selected || selected.classList.contains("locked")) {
        sk.toast("请选择可购买的商品", "warning");
        return;
      }
      const price = priceOf(selected);
      if (cash < price) {
        sk.toast("现金不足！", "danger");
        return;
      }
      cash -= price;
      syncCash();
      selected.querySelector(".price").textContent = "已拥有";
      selected.querySelector(".price").classList.add("owned");
      selected.classList.remove("affordable");
      sk.toast("已购买 " + selected.dataset.name + "（−$" + price + "）", "success");
      sk.pulse(selected);
    });

    sk.on(sk.$("#btn-haggle"), "click", () => {
      if (haggled) {
        sk.toast("店主拒绝继续砍价", "warning");
        return;
      }
      haggled = true;
      sk.toast("成交！今日九折", "success");
    });

    sk.on(sk.$("#btn-exit"), "click", () => {
      sk.modal({
        title: "离开商店？",
        body: "已购商品会保留。返回漫画关卡？",
        onConfirm: () => sk.toast("下关再见！", "warning"),
      });
    });

    syncCash();
  </script>
</body>
</html>
